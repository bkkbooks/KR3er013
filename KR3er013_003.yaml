body:
  text: 卷之三火門火熱顛狂附潮熱陰虛火動附上部下部瘡瘍火熱顛狂附脈脈洪大而數或燥疾而急來往緊大堅實者為火左寸洪滑為心火洪數為小腸火左關弦大而長為肝火弦小而數為膽火左尺沉數為腎膀胱火右寸浮數為肺火洪大而數為大腸火右關洪數為胃火洪實為脾火右尺沉數為命門火沉微為命門火衰浮數為三焦火沉細浮數為陰虛火動六部脈洪有力者易治反沉難細者難治脈訣云脈浮弦而數為發熱洪數為煩熱滑數為心下壅熱弦緊而數為寒熱往來沉細數疾為熱兼寒寸緊數尺沉微為上熱下寒浮緊而滑為外熱內寒輕手微遲重按緊滑為外寒內熱兩寸浮大而數熱在心肺兩關弦滑而數熱在肝脾兩尺洪實或沉數皆為熱在下焦右寸關洪實熱在脾肺右關滑數溢過寸口為熱在胃口主嘔吐六脈短澀而數或沉細而數皆熱在陰分洪大而長或浮洪滑數皆為熱在陽分經曰脈至而從按之不鼓諸陽皆然王注云病熱而脈數按之不鼓動乃寒盛格陽而致之非熱也形症是寒按之而脈氣擊於指下盛者此為熱盛拒陰而生病非寒也又曰推而內之外而不內身有熱也傷寒論曰寸口脈微為陽不足陰氣上入陽中則灑淅惡寒尺脈弱為陰不足陽氣下陷入陰中則發熱也與難經云覆溢相乘及浮損小沉實大之義相同皆診法之至要於熱症大宜症按丹溪云素問病機一十九條屬火者五而河間推廣其說火之致病者甚多深合內經之意其曰諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之有聲癰疽瘡瘍瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閉身熱惡寒戰栗或悲笑譫妄衄衊血汙之病皆少陰君火之火乃心小腸之氣所屬也若瞀瘈暴喑冒昧燥擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘈暴病暴死皆少陽相火之熱乃心胞絡三焦之氣所屬也原病式云諸風掉眩屬於肝火之動也諸痛癢瘡瘍屬於心火之用也諸濕腫滿屬於脾火之勝也諸氣憤郁病痿屬於肺火之升也此皆火之為病出於臟腑者然也若夫五志之交攻七情之妄動其火隨起如大怒則火起於肝醉飽則火起於脾房勞則火起於腎悲哀動中則火起於肺心為君火自焚則死矣辨疑録云人稟五行各一惟火有二有君相之分君不主令相火代之寄於肝腎之內附於脾肺之間凡諸經動者皆屬於火起於肝謂之風火生於脾謂之痰火入於氣為無根之火動於腎為消陰伏火存於心肺入於血分為有餘之火散於各經為浮游之火故曰火者化也善行數變莫測其機經又曰諸寒之而熱者取之陰注云取之陰者所以補腎水之不足而制心火之有餘也東垣云發熱之症有元氣虛損而熱有五臟熱有內中外熱是故輕手捫之而熱熱在皮毛血脈也心肺主之重按至骨蒸手而熱熱在筋骨也腎肝主之不輕不重而熱熱在肌肉也脾主之又云晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名為熱入血室晝夜不分是重陽無陰也亟瀉其陽峻補其陰難經云重陽者狂六脈洪實宜以苦寒藥瀉之重陰者癲六脈沉微宜以甘溫藥補之仲景云病人身大熱反欲近衣者此熱在皮膚寒在骨髓也身大寒反不欲近衣者此寒在皮膚熱在骨髓也治宜詳別治戴氏云火之為病其害甚大其變甚速其勢甚彰其死甚暴何者蓋能燔灼飛走驀越燒爍於物莫能御之遊行於三焦虛實之兩途曰君火者心火也可以濕伏可以水滅可以直折惟黃連之屬可以制之曰相火者龍火也不可以水濕不可以直折從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣加之如黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火柴胡黃芩瀉三焦火木通瀉小腸火石膏瀉胃火黃柏瀉膀胱火此皆苦寒之味能瀉有餘之火耳若飲食勞役內傷元氣火不兩立為陽虛之病以甘溫之劑降之如參朮歸耆之屬若心火亢極鬱熱內實為陽狂之病以寒咸之劑折之如硝黃之屬若腎水受傷真陰失守無根之火妄炎為陰虛之病以壯水之劑制之如黃柏地黃玄參之屬若右尺命門火衰為陽脫之病以溫熱之劑制之如姜附之屬若胃虛過食冷物郁遏陽氣於脾土之中為火鬱之病以升散之劑發之如升麻葛根之屬又治法云小熱之氣涼以和之大熱之氣寒以取之甚熱之氣汗而發之發之不盡則逆取之又云暴熱病在心肺積熱病在腎肝虛熱不能食自汗氣短屬脾虛以甘寒溫而行之實熱能食口乾舌燥便難屬胃實以辛苦大寒藥下之火鬱而熱乃心火下陷脾土抑而不伸五心煩熱宜汗之發之心神煩亂血中伏火蒸蒸然不安宜鎮心火硃砂安神丸治之骨蒸勞熱乃五臟齊損病憔悴發熱盜汗失血宜滋陰養血苟不明此諸火熱之病施治何所依據故集其略以備參考庶免實實虛虛之禍也方三補湯治實熱實火通用虛者不宜黃芩酒炒二錢五分黃連薑汁炒一錢五分黃柏鹽酒炒二錢五分上作一服水煎食遠熱服兼有他症依後加減心火實熱加生地黃麥門冬各一錢五分生甘草五分加黃連一錢肝火實熱加川芎一錢赤芍藥一錢龍膽草一錢五分大黃三錢脾火實熱加白芍藥一錢山梔一錢五分肺火實熱加石膏天門冬各一錢五分桑白皮一錢山梔一錢五分腎火加熟地黃知母各一錢五分玄參一錢澤瀉八分減芩連小腸火加木通二錢活石一錢五分甘草梢五分赤茯苓一錢膽火加柴胡一錢五分竹茹八分青皮七分胃實火輕者加石膏知母各二錢甘草七分粳米一錢五分甚者加大黃三錢或五錢芒硝一錢大腸火加當歸一錢五分連翹槐實各一錢五分膀胱火加澤瀉一錢白茯苓一錢五分細辛五分三焦火加連翹防風荊芥山梔各一錢五分命門火盛以四制黃柏丸降之火衰以茸附丸溫之鬱火去芩柏加香附山梔各一錢五分青黛川芎各一錢心肝肺熱甚兩目紅腫疼痛加赤芍藥川芎各一錢當歸生地黃各一錢五分龍膽草甘菊花各一錢二分防風荊芥薄荷各七分心火亢極胃肝火盛狂亂譫妄加石膏二錢山梔一錢五分大黃三錢或五錢芒硝一錢即三黃石膏湯也中上二焦火熱涼膈散主之本方去黃連黃柏加山梔連翹大黃各二錢朴硝薄荷甘草各七分上焦火熱喉痛喉痹舌腫口瘡加山豆根一錢五分玄參一錢桔梗甘草各八分陽明火盛攻上頭面腫或腮頰腫牙齦腫齒痛加升麻五分白芷八分防風一錢細辛五分石膏二錢去黃柏一半少陽火盛耳腫痛頸項腫痛加川芎一錢柴胡一錢五分夏枯草牛蒡子連翹各一錢五分防風八分甘草青皮各五分太陽火盛頭痛痰盛加石膏二錢升麻五分羌活一錢半夏南星膽制各一錢五分川芎一錢本方各減半熱結下焦大小便祕不通加山梔木通各一錢五分大黃三錢或五錢甘草梢五分腸風臟毒下血痔漏等症皆胃與大腸素有積火及風熱所致加槐實膽制荊芥防風各一錢二分生地黃當歸各一錢五分地榆連翹人參白朮各一錢補而清之五淋赤白濁小便祕澀皆心肺與小腸膀胱素有鬱火復因外邪所觸騷動其火所致加木通赤茯苓各一錢五分車前子澤瀉郁李仁甘草梢各錢大黃三錢血淋尿血加當歸生地黃地榆各一錢五分發灰五分牛膝一錢氣淋氣祕加木香五分青皮一錢木通一錢五分烏藥八分癲癇狂妄屬痰與火實者本方對二陳湯加南星竹瀝薑汁先服十數劑清其痰後用牛黃琥珀丸主之虛者先用十全一補湯減去川芎官桂加麥門冬酸棗仁黃連各一錢遠志五分滋培其血氣後亦用牛黃琥珀丸主之丸方見後附方內婦人産後驚風搐搦語言恍惚治亦同上但不去川芎官桂加防風天麻白芷各一錢以上加減法亦大概耳臨症斟酌方能盡變通之妙按先賢云凡火盛者驟用寒涼必須溫散火急甚者必緩之生甘草兼瀉兼緩虛者參耆甘草亦可用人壯氣實火盛癲狂者可用前法正治或硝水冰水與之虛火狂者薑汁竹瀝制之若依前法正治立死又有補陰則火自降之說炒黃柏生地之類經曰壯火之主以制陽光是也噫虛實施治相背千里吉凶之機應若影響可不深思而明辨哉又方調中散火湯治症熱發熱虛火通用人參黃耆蜜炙各八分當歸白芍藥白朮各一錢甘草四分柴胡六分升麻五分葛根防風羌活黃芩七分上作一服薑棗煎食遠服兼有他症依後加減陰虛發熱加麥門冬黃柏知母地骨皮各一錢倍柴胡手心發熱加山梔香附各一錢川芎白芷各七分虛熱不能食自汗氣短加茯苓陳皮各八分天明時發熱加麥門冬地骨皮各八分倍柴胡肺經發熱按之熱在皮毛日西甚加石膏知母地骨皮各一錢心經發熱微重按之熱在血脈日中甚加麥門冬黃連各一錢肝經發熱重按至肉下骨上熱寅卯甚倍柴胡加青皮七分上焦發熱加知母天門冬麥門冬各一錢保定肺氣中焦發熱屬脾虛倍參朮加陳皮白茯苓各一錢下焦發濕熱或膀胱有火邪加漢防己龍膽草黃柏各一錢蒸蒸發熱晝夜不退者加知母秦艽牡丹皮地骨皮各一錢柴胡倍用晝則發熱夜則安靜四君子湯加麥門冬胡黃連秦艽地骨皮各等分夜則發熱煩躁晝則安靜四物湯對小柴胡湯一二服愈涼血解除五心煩熱四物湯加麥門冬連翹山梔薄荷潮熱陰虛火動附脈脈多沉細而數或弦澀而短或弦細而微左偏大無力為血虛右偏大無力為氣虛六脈形大力薄為氣血俱虛滑數者有汗沉澀者無汗兩尺細數者陰虛火動宜詳辨之症潮熱者若潮水之來不失其時一日一發必有定時於日晡時為多若一日三五發即是發熱非潮熱也氣虛潮熱熱在平旦肺氣主之血虛潮熱熱在晡時腎氣主之陰虛火動潮熱寢汗者皆由血氣虛損亦當從金水二臟求之大抵潮熱為虛發熱為實治各有異治平旦潮熱屬陽心肺主之人參白虎湯加黃芩日晡潮熱屬陰脾腎主之四物湯加白朮陳皮牡丹皮地骨皮知母黃柏陰虛火動潮熱脈細數八物湯加知母黃柏麥門冬柴胡地骨皮大抵潮熱宜以四物湯加柴胡黃芩生甘草辰戌時發加羌活午時加黃連未時加石膏申時加升麻夜加當歸知母晝加地骨皮人參血虛多加當歸地黃氣虛多加參朮黃耆大略如此臨症尤加詳審方八物湯治氣血俱虛寢汗潮熱川芎七分當歸一錢五分白芍藥一錢五分人參一錢白朮一錢五分白茯苓一錢甘草三分地黃一錢涼血用生補血用熟上作一服薑棗煎食遠服兼有他症依後加減一切潮熱並加黃耆黃柏知母柴胡牡丹皮地骨皮各等分男子血虛有汗潮熱本方去川芎加黃耆一錢陳皮八分遠志五味子各五分官桂三分名人參養榮湯治有汗潮熱咳嗽男子氣虛有汗潮熱本方減川芎白芍藥熟地黃白茯苓加黃耆陳皮升麻柴胡名補中益氣湯有嗽加麥門冬紫菀五味子黃柏知母更妙男子血虛無汗潮熱本方加陳皮半夏各一錢枳殼桔梗前胡紫蘇乾葛柴胡各八分名茯苓補心湯男子氣虛無汗潮熱本方去川芎芍藥地黃加黃耆地骨皮防風柴胡各等分薄荷減半名人參清氣散男子氣血兩虛有汗潮熱咳嗽加知母麥門冬牡丹皮地骨皮柴胡貝母紫菀各等分去川芎男子氣血兩虛無汗潮熱咳嗽加秦艽地骨皮柴胡各等分紫蘇薄荷各減半款冬花八分婦人血虛有汗潮熱加黃耆麻黃根各一錢婦人氣虛有汗潮熱本方去川芎地黃加柴胡荊芥薄荷地骨皮各等分婦人血虛無汗潮熱本方去參耆加秦艽知母地骨皮沙參鱉甲前胡各等分婦人氣虛無汗潮熱本方去川芎地黃加半夏柴胡各一錢乾葛七分名人參柴胡散婦人氣血兩虛無汗潮熱咳嗽咯血本方去參芎地黃加柴胡薄荷地骨皮紫菀麥門冬各等分婦人氣血兩虛有汗潮熱咳嗽本方去川芎白芍藥加半夏柴胡黃芩桔梗阿膠款冬花各八分知母麥門冬各一錢五味子薄荷各五分名知母茯苓湯男子陰虛火動骨蒸勞熱咳嗽吐紅吐痰本方去川芎人參加天門冬麥門冬知母貝母黃柏遠志陳皮阿膠北五味子各等分名滋陰降火湯此病大忌過服參耆如久服寒涼傷脾氣血俱損者參耆亦可用婦人室女經閉成勞自汗潮熱咳嗽吐紅皆由七情損傷心脾所致宜本方去參芎地黃加柴胡一錢五分黃芩麥門冬紫菀地骨皮牡丹皮貝母知母香附陳皮各等分凡火病易效亦易誤醫家當按脈辨症而慎治之上部眼耳口鼻舌牙咽喉是也脈眼病寸脈浮數關脈弦數為風熱內障寸關浮弦而澀為風濕腫癢寸脈弦而沉為氣熱癢痛弦而滑為痰火攻上寸浮關弦尺澀為血虛火盛水衰眼目昏暗耳病腎脈浮而盛為風浮而數為熱澀而濡為虛右寸滑數為肺經痰火上攻於耳口病關脈洪數脾氣通於口脾熱則口臭熱甚則口縻口瘡胃熱則唇口生瘡口內腥臭鼻病右寸脈洪數鼻乃肺之竅鼻病皆肺熱所致肺傷風熱右寸浮數而鼻塞不聞香臭舌病左寸脈滑數蓋舌乃心之苗舌病皆心熱所致心脈系舌本脾脈絡於舌傍肝脈絡舌本心熱盛則舌生瘡破裂肝熱盛則血上湧脾熱則舌強甚則滑而胎風寒所中則舌捲縮而不能言牙病屬腎虛胃火右關洪數溢過寸口兼浮者為風兼沉者為寒濡細者為濕咽喉腫痛兩寸必浮洪而數雖有數種之名率皆上焦風熱所致症按東垣云十二經脈三百六十五絡其清陽氣上散於目而為精其氣走於耳而為聽若因心煩事冗飲食失節勞役過度致脾胃虛弱心火旺盛則百脈沸騰血脈逆行邪害空竅猶天明而日月不明也夫五臟六腑之精氣皆稟受於脾上注於目脾者諸陰之首也目者血脈之宗也脾虛則五臟精氣皆失所司不能歸於目矣心者君火也主人之精宜靜而安相火化行其令相火者包絡也主百脈皆營於目既勞役運動勢乃妄行又因邪氣所並而損血脈故諸病生焉經曰目得血而能視血氣盛則精盛血氣衰則精弱精弱則水虛水虛則火動火動則東方實東方實則肝邪盛而視物不真矣所以視植物為動物者有之視動物為植物者有之然血有太過不及皆能為痛太過則目壅塞而障痛不及則無血養而枯痛目之鋭皆少陽經也血少氣多目之上綱太陽經也血多氣少目之下綱陽明經也血氣俱多惟足厥陰經連於目系而已血太過者血得熱而溢於上所以作痛治之之法風熱者發以散之血少神勞腎虛者補血滋陰以調之實者決之虛者補之辛以散之涼以清之隨其病而藥之無不愈也按諸書論耳症不一有氣聾熱聾陰虛聾膿耳聤耳氣厥而聾又挾風與勞損而聾者蓋十二經脈上絡於耳其陰諸經適有交併則臟氣逆而厥厥氣摶入於耳是為厥聾必兼眩運況耳為宗脈之所附若脈虛而風邪乘之經氣閉而不宣謂之風聾必兼頭痛如瘦悴力怯昏昏積積而暗暗然者為勞聾必兼虛怯等症此好色腎虛者有之有痰火上升鬱於耳中而鳴有熱氣乘虛隨脈入耳結為膿汁謂之膿耳或耳有津液風熱摶之結硬成核塞耳亦令暴聾為聤耳大抵耳屬足少陰之經腎之寄竅也腎氣通於耳所主者精精氣充足則耳聞而聰也若勞傷氣血精脫腎敗則耳聾矣治之之法風者散之熱者涼之腎虛者補而養之痰火者清而降之各隨其宜不可不察也口臭生瘡皆脾胃中有濁熱所致蓋脾熱則口乾燥胃熱則唇破裂又云五臟之氣皆通於口是以脾熱則口甘肝熱則口酸腎熱則口咸肺熱則口辛心熱則口苦胃熱則口淡膽熱則口酸苦皆因謀慮不決而得丹溪云鼻乃肺之竅因心肺上病而不利也有寒有熱寒邪傷於皮毛氣不利而壅塞熱壅清道所以塞而不聞香臭矣又有面鼻紅紫黑皆熱傷血而血熱所致蓋面乃陽中之陽鼻居面中一身之血運到面鼻皆為至清至精之血多酒之人酒氣熏蒸於上面鼻得酒熱之氣血為極熱血熱復遇感冷汙濁凝結不行面鼻紫黑而腫俗名酒齄鼻是也治宜清熱化滯血生新血或曰酒齄鼻者皆由肺經壅熱所致蓋肺氣通於鼻清氣出入之道路或因飲酒氣血壅滯上焦邪熱伏留不散為鼻瘡矣或肺經素有風熱雖不因酒亦自生也齆鼻塞肉亦由於此舌病乃心肝脾壅熱所致說見脈下牙齒腫痛按東垣論云齒者腎之標骨之餘上齦隸於脾土足陽明胃之脈貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱熱甚則齒動齦脫作痛不已有惡寒痛者有惡熱痛者有惡寒惡熱痛者有惡熱飲少寒飲多痛者有動搖痛者有齒袒則痛者有齒齦為疳所蝕血出而痛者有齚腫起而痛者有脾胃中有風邪但覺風而痛者有痛而臭不可近者蓋齒為關門腎之榮骨之餘也腎衰則齒豁精固則齒堅大腸虛則齒露大腸壅則齒浮挾風則攻於頭面眼目疳䘌則齲脫為痔亦有氣鬱而致者醫者誠能求其本而療之厥疾弗瘳者未之有也喉痹按子和云熱氣上行搏於喉之兩旁近外腫作以其形似是謂乳蛾一為單兩為雙也比乳蛾差小者名喉痹熱結於舌下復生一小舌名曰重舌脹熱結於舌中腫起名曰水舌脹熱結於咽喉腫繞於外且麻且癢腫而大者名曰纏喉風喉痹暴發暴死者名曰走馬喉痹其名雖殊火則一也夫少陰君火心主之脈手少陽相火三焦之脈二火皆主其脈並絡於喉氣熱則內結結甚則腫脹腫脹甚則閉閉甚則不通而死矣至於嗌乾咽痛頷腫舌本強皆君火之為也惟喉痹急連屬相火也經云甚者從之又云龍火以火逐之故古人療喉痹等症用甘桔等湯治之世醫不達此旨妄云大寒之劑或至冷草藥服之扞挌其氣而不救者吾見多矣其出血之法最為緊要但人畏針委曲旁求若病之急者即閉而死良可痛哉治河間云目疾在腑為表當除風散熱在臟為里當養血安神如暴失明昏澀翳膜眵淚斑瘡入眼暴散皆表也此風熱所幹宜表散以去之如昏弱不欲視物內障見黑花瞳散睛背久病皆里也此血少神勞腎虛所致宜養血補水安神王節齊云眼痛亦腫古方用藥內外不同在內湯藥則用苦寒辛涼之劑以瀉其火在外點洗則用辛熱辛涼之藥以散其邪故點藥莫要於冰片而冰片大辛熱以其辛性急故藉以拔出火毒而散其熱氣古方用燒酒洗眼者皆此意也大概火眼是火邪上攻於目故內治用苦寒之藥治其本也然火邪既客於目從內出外若外用寒涼以阻逆之則鬱火內攻不得散矣故點藥用辛熱而洗眼用熱湯是火抑則發因而散之從內達外法也治法云久病目昏暗熟地黃當歸為君防風羌活甘菊佐之暴發赤腫芩連防風為君以瀉火四物為佐以涼血養血羌活柴胡甘菊為使以疏風散熱血氣壅盛而痛四物加龍膽草大黃以下之肥人多是痰火宜涼血清熱行痰痛人多是血少火盛宜養血藥為主少加風藥佐之丹溪云耳聾屬少陽厥陰二經鬱熱多有氣閉者有痰火上攻而鳴或聾治宜開痰散風熱通聖散滾痰丸之類皆可用大病後與陰虛火動而聾者宜滋陰降火以四物湯加知母黃柏耳鳴宜當歸龍會丸飲酒厚味之人宜木香檳榔丸王節齊云耳鳴一症世人多作腎虛治不效殊不知此是痰火上升鬱於耳中而為鳴郁甚則壅閉矣大抵此症多因先有痰火在上又感惱怒而得怒則氣上逆而少陽之火客於耳也若腎虛而鳴者其鳴不甚治宜詳之口病或瘡皆中上二焦積熱輕者瀉黃散重者涼膈散主之口病服涼藥不愈者此酒色過度勞役不睡或因憂思損傷中氣虛火泛上無制用理中湯加附子或官桂冷服一方治口瘡以黃連六錢官桂一錢為未噙下或調付瘡上甚效口臭以黃連生甘草藿香蘭草扁豆砂仁為末清茶調下鼻塞不利有肺熱或肺經素有火邪久鬱於內遇寒便塞宜清肺降火而佐以通氣之劑亦有感冒風寒而致鼻塞聲重或流清涕者作風寒治宜表而散之鼻或紅及酒齄鼻者皆熱傷肺經以致血氣壅滯宜涼血化滯清肺藥主之舌腫舌瘡皆心熱所致治宜瀉心湯甚者黃連解毒湯舌胎者治各有法如傷寒舌胎或黃或黑者諒輕重下之詳見本門雜病舌胎宜清之黃連解毒湯或涼膈散選而用之王節齊云牙床腫痛或齒動搖或黑爛脫落世人皆作腎虛治殊不知此屬陽明經濕熱蓋齒雖屬腎而生於牙床上下牙床屬陽明大腸與胃猶木生於土也腸胃傷於美酒厚味膏粱黏滑之物致濕上攻則牙床不清而為腫為痛或出血或生蟲故齒不得安而動搖黑爛脫落矣治宜瀉陽明經之濕熱去腸胃中之伏火則牙床清寧而齒自安固矣以防風通聖散去芒硝主之丹溪云喉痹之病多屬痰熱雖有數種之名輕重之異乃火之微甚故也微者以酸耎之甚者以辛散之甚而急者惟用針砭刺出血最為上策人火以涼治之龍火以火逐之或用吐法尤妙經云咽與喉會厭與舌同在一門而用各異喉以候氣故通於天會厭管乎其上少司開闔掩其厭則食下不掩其喉必錯必舌抵上齶則會厭能閉其喉矣四者相交為用缺一則飲食廢而死矣方四物菊花湯治一切眼疾清熱養血疏風川芎七分當歸酒浸一錢五分白芍藥一錢五分淮生地一錢甘菊花一錢五分防風七分黃連八分白扁豆七分甘草生用五分甘州枸杞子八分上作一服水一鍾半煎八分食後服兼有他症依後加減肝經壅熱加龍膽草一錢黃芩一錢赤芍藥八分青皮五七分甚者加大黃酒蒸過三錢下之肺經壅熱白睛紅加桑白皮黃芩山梔麥門冬石膏各等分心經壅熱睛紅內障加赤茯苓麥門冬倍黃連膽腑熱睛紅腫痛隱澀難開加龍膽草柴胡各一錢青皮七分胃中伏火上攻赤腫脹痛加連翹黃芩石膏各一錢五分大黃三錢肝腎虛眼暗加熟地黃山藥各一錢二分黃柏八分五味子五分去黃連翳膜遮睛加草決明密蒙花各一錢木賊八分外用點藥能遠視不能近視乃血盛氣虛加人參白茯苓各一錢石菖蒲五分能近視不能遠視乃氣盛血虛倍當歸加熟地黃一錢五分風熱火眼加羌活柴胡黃芩各一錢連翹赤芍藥各八分大黃三錢目疾久服寒涼傷脾致脾胃虛損不能生血反昏暗者宜服清神益氣湯又方固本還睛丸出醫學正傳治肝腎脾肺虛損風熱乘之以致目暗不明視物昏花或翳膜朦蔽內外障痛一切眼疾並宜服之久服誠有奇效非惟明目且能滋養百骸調和五臟天門冬去心二兩淮生地黃二兩人參一兩五錢麥冬去心二兩淮熟地黃二兩當歸一兩五錢五味子七錢青相子一兩石斛一兩五錢去根牛膝酒洗一兩犀角一兩炒川芎一兩枳殼麩炒一兩黃連酒炒一兩菟絲子酒洗去土蒸熟搗碎曬乾一兩五錢枸杞子甘州者去梗一兩五錢柏子仁去殼淨炒一兩五錢決明子炒一兩五杜仲薑汁炒斷絲一兩羚羊角白者一兩黃柏鹽酒炒一兩五錢上二十一味除二冬二地酒煮搗膏柏子仁另研余藥共為細末煉蜜為丸如梧桐子大每服九十丸空心鹽酒送下忌煎炒五辛發物又方和氣飲治耳鳴久聾川芎一錢當歸一錢烏藥一錢五分陳皮八分貝母一錢黃芩酒炒一錢山梔八分桔梗七分升麻三分木通八分木香三分石菖蒲一錢五分上作一服姜三片煎熟加蔥自然汁半盞和服又方加減涼膈散治口鼻舌諸病皆由上焦壅熱所致連翹梔子黃芩石膏大黃各一錢五分防風荊芥薄荷各八分甘草四分當歸川芎白芍藥生地黃麥門冬各一錢上作一服水一鍾半煎食後服口瘡加黃連一錢二分桂二分唇瘡加同上腮腫加升麻五分白芷七分牛蒡子一錢五分倍石膏舌腫脹加白芍藥黃連各一錢玄明粉八分舌瘡加黃連青黛各一錢舌胎加同上牙縫舌根無故出血加牡丹皮側柏葉槐實各一錢牙疼加升麻五分白芷八分黃連一錢川椒七粒走馬牙疳以女人溺桶中白垢火煆一錢銅緑三分膽礬二分麝香一分研末敷上立效咽喉腫痛加黃連山豆根各一錢玄參桔梗各八分牛蒡子一錢五分升麻三分一法本方加馬蘭根夏枯草各二錢三錢大抵咽喉之症所關甚急煎藥則但能拔去火邪耳惟以針刺出血為急要法也下部淋濁疝及女人血崩帶下是也脈淋家之脈尺細而數左尺脈數婦人則陰中生瘡男子則為氣淋肺脈浮弦而澀為便閉鼻頭色黃者小便難尺寸急數為小便閉右寸肺主之左尺腎膀胱主之尺脈芤者便血尺脈實數者熱結膀胱而小便淋瀝不利也遺精白濁女人帶下赤白尺寸必洪大而澀按之無力或細微或沉緊而澀皆為元氣不足又云急疾者難治遲者易治女人兩尺弦細者必白帶洪數者必赤帶淋濁帶下皆下焦濕熱之所為也疝脈關尺弦急或寸口弦緊為寒豁大急搏為熱沉遲浮澀皆為疝痛視在何部而知其臟如心肝脾肺腎之屬各按本經脈症治之又云牢急者生弱急者死崩漏之脈兩尺洪數而疾為熱微遲弦細為寒寸微關弦尺芤為氣盛血衰大抵血崩之脈屬火者脈多洪數又云遲緩者易治急疾者難治症丹溪云淋有五皆屬於熱又云小便滴瀝痛者淋急滿不痛者謂之閉也亦有痰氣閉塞於上熱結於下宜吐以提其氣氣升則水自降而熱自除蓋氣乘其水而氣不得下輸熱結膀胱而小便淋閉不利也譬猶滴水之器必上竅通而下竅之水出焉其斯之謂歟戴氏云便濁帶下俱屬濕熱雖有赤白之異終無寒熱之分河間云天氣熱則水渾濁寒則澄清由此觀之濕熱明矣蓋寒則堅凝而熱則流通故也何疑之有哉集成云疝之一症專主肝經腎經絶無相干或曰肝經與衝任督脈所會聚於陰器傷於寒則陰縮傷於熱則縱挺不收蓋木性急速火性暴而痛亦暴也前人論疝甚多或曰膀胱或曰腎或曰小腸氣其實皆歸於肝經也大抵此病始於濕熱在經遏而至久又得寒氣外束不得疏散所以作痛若只作寒論恐為未備必兼濕熱乃可內經曰陰虛陽摶謂之崩按東垣論云由脾胃氣虧下陷於腎與相火相合濕熱下迫而致崩也亦有腎水枯竭真陰虛損不能鎮守胞絡相火故血走而崩也蓋脾胃氣血之本心者血之府脈者人之神俱不足而生火火得以乘虛而迫血妄行也宜詳治之治治法云淋屬濕熱宜五苓加山梔木通老人血氣虛而淋宜參耆歸朮帶木通山梔腎虛者補腎兼利小便不可獨用利藥死血者四物湯加牛膝主之痰氣滯於上焦宜二陳吐之若濕熱流注下焦熱結膀胱而小便閉澀用益原散以黃柏山梔澤瀉煎湯調下切當大抵淋閉之症有肺燥不能生水治宜清金車前子茯苓麥門冬黃芩之類有熱結膀胱宜瀉膀胱火黃柏知母之類有脾濕不運而精不升故肺不能生水當燥濕健脾蒼白朮陳皮之類治各有別丹溪云濁與帶同是濕熱白屬氣赤屬血治以清熱滲濕為主氣虛入參朮血虛入芎歸甚者必用吐以提其氣下用二陳加二朮白芍藥黃柏煎服丸藥以樗根白皮黃柏青黛乾薑滑石蛤粉神麯糊丸服或用六味地黃丸尤妙亦有思慮過度則水火不交快情恣欲而精元失守故尿前尿後凝結流下名曰白濁亦曰遺精宜抑火養心安脾實腎則水火相交其流固自清矣辨疑録云疝症本濕熱怒氣傷肝房勞過傷心腎胞絡之火鬱結於內蓋小腸乃多氣少血之經心氣鬱結則腑受邪肝氣一盛而子亦盛矣故二氣攻入小腸膀胱而痛作矣治用五苓散內加行氣之藥乃利小便出邪之法按藥性云豬苓澤瀉分陰陽以和心心與小腸為表裡心和則小腸之氣亦通矣白朮利腰臍間濕並死血茯苓淡滲利竅行濕桂伐肝邪伐其本也加茴香善治小腸之氣金鈴子橘核去膀胱腎氣檳榔墜下少加木通以為導引小腸之火出也治亦近理又法治疝蓋因濕熱為寒鬱而發用山梔子以降濕熱烏頭以破寒鬱二味皆下焦之藥而烏頭為梔子所引其效甚速女人崩漏多因七情之火內動或因氣所使而下急則治其標白芷湯調下百草霜甚者棕櫚灰蓮蓬灰血餘灰俱妙緩則治其本以四物湯加參朮黃耆便制香附地榆蒲黃荊芥穗各等分升麻五分屢治有效宜隨症加減用之方加減五苓散治諸淋及小便閉澀隨症加減用白朮一錢赤茯苓一錢澤瀉一錢木通一錢五分滑石一錢桂三分郁李仁八分黃芩一錢山梔子一錢甘草梢五分秋石一錢黃柏童便炒一錢上作一服水一鍾半燈心一握煎八分空心服血淋加當歸一錢五分生地黃一錢牛膝一錢藕節側柏葉各一錢去桂氣淋加青皮香附海石各一錢沉香五分結熱蓄於下焦成砂石淋加歸尾一錢黃柏加一倍大黃三錢小便血出如淋加歸身尾小薊根生地黃側柏葉藕節蒲黃生用各等分小便前後血加同上小便閉不通加車前子一錢五分大黃生三錢或五錢海金砂一錢小便澀加青皮七分黃連八分枳殼七分小便多或不禁或不時遺出以八味丸減澤瀉一半黃柏知母煎湯吞下一月即效亦可治久遠遺精白濁又方加減分清飲治赤白濁夢遺精滑及女人赤白帶下白朮白茯神麥門冬黃連黃柏益智仁川萆薢石菖蒲烏藥澤瀉牡蠣石蓮肉各等分上作一服水一鍾半薑棗煎食前服血虛加當歸地黃各等分氣虛加黃耆人參各等分陰火動加黃柏知母各等分桂三分日久者加升麻柴胡各五分龍骨煆一錢女人赤白帶加樗根白皮赤石脂各等分肥人帶是濕痰加海石半夏蒼朮川芎香附各等分瘦人無帶有即是熱加香附山梔青黛各等分思想無窮所欲不遂夢遺精滑治在心脾加半夏陳皮甘草人參遠志酸棗仁各等分夜服安神丸晨服坎離丸蓮肉湯下或以黃柏知母煎湯吞下八味丸亦可女人夜夢鬼交四物加香附茯神遠志石菖蒲牡蠣煆赤石脂各等分清晨用蓮肉湯調下妙香散又方橘核順氣湯治疝偏墜此藥劫痛行滲濕清熱白朮白茯苓各一錢澤瀉七分木通一錢青皮七分桂枝五分橘核一錢川楝子一錢山梔一錢五分川烏八分木香五分不見火檳榔七分上作一服水一鍾半煎空心服血滯加桃仁當歸各等分氣滯加沉香五分小茴香七分寒疝加吳茱萸一錢山梔川烏倍用濕鬱疝加蒼朮一錢五分木瓜一錢食積滯而成疝加山楂枳實各一錢痰涎流注成疝加半夏南星海石香附各等分又方四物調中湯治血崩因七情所傷脾胃不運腎水虧損不能鎮守胞絡相火以致水火不交而血妄下此緩則治其本也必多服乃效川芎一錢當歸白芍藥生地黃熟地黃人參黃耆白朮麥門冬阿膠炒香附各一錢五分荊芥穗黃柏黃連地榆各八分升麻三分柴胡五分陳皮一錢上十八味作一服薑棗水二鍾煎食前服渣煎食遠服又方涼血地黃湯治症同前此急則治其標也二三服即效川芎一錢當歸白芍藥生地黃黃芩各一錢五分黃柏知母藁本荊芥穗蔓荊子各一錢細辛五分黃連羌活防風各八分升麻柴胡各五分甘草紅花各三分上十八味作一服薑棗煎空心服渣食遠服瘡瘍疔瘡瘰癧脈訣云數而無力為瘡瘍集驗云脈沉實發熱煩躁外無焮腫赤痛其邪深在裡宜先疏通以絶其源浮大而數焮腫在外當先托裡恐邪氣入內也脈不浮不沉內外症無知其在經當和榮衛脈數身無熱內有癰膿脈數應當發熱而反惡寒若有痛處當發癰疽瘡瘍脈沉遲而緩者生急疾而數者死症按外科論云夫外科以癰疽發背冠於篇首為諸瘡之先者何蓋此症變化在於須臾性命懸於毫髮故也然癰疽之名雖有二十餘症其要則有二焉陰陽是也凡發於陽者為癰為熱為實發於陰者為疽為冷為虛夫陽發則皮薄色赤腫高多有椒眼數十而痛陰發則皮厚色淡腫堅硬狀如牛頸之皮不痛又有陽中之陰似熱非熱雖腫而虛赤而不燥作痛而無膿時浮時消盛而內腐陰中之陽似冷非冷不腫而實微赤而燥有膿而痛外雖不盛而內煩悶陽中之陰其人多肥肉緊而內虛陰中之陽其人多瘦肉緩而內實又有陽變為陰因草醫涼劑之過也陰變為陽因火艾熱藥之驟也然陽變陰多猶可返於陽故多生陰變陽多不能復於陽故多死間有生者此醫偶合於法百中得一耳所謂發者積於中而發於外者也人之一身所自本於五臟五臟之氣皆稟於胃氣胃為五臟之根本故胃受谷脾化之以生氣血脾主肌肉胃氣傳五臟以行血脈經絡灌溉一身而晝夜一周雖癰疽有虛實寒熱皆由氣鬱而成其因有三內因外因不內外因內因候於人迎人迎者左手關前一分是也外因候於氣口氣口者右手關前一分是也人迎氣口之脈和平則為不內外因也其原有五一天行時氣二己情內郁三體虛外感四身熱摶於風冷五食燒炙飲醇酒服丹石熱毒等藥以五者為邪氣鬱於胃中胃氣盛而體實則邪氣相摶而流注於經絡澀於所滯血脈經絡壅結而成癰胃氣弱而體虛則邪氣盛而宿於經絡凝澀流積血脈不潮內腐而成疽故曰外形如粟中可容轂外貌若錢中可安拳惡毒膿管寸長深滿膿血相黏用藥可痊臭穢無絲血敗氣衰陽絶陰盛仙難救命善用藥者當審人虛實察病冷熱推其所因究其所原而後治之內外相應不可一概而論如病發於陽而極熱必當順其氣勻其血氣順則宜通而不滯血勻則流動而自散氣乃為陽血乃為陰陰陽調和其病自安外則用涼藥而觸之內熱反盛熱盛則血得涼而易散甚則熱已痿而血凝於涼以致血不散此陽變為陰漸成壞爛之根急投溫劑以治解其外攻四圍之血路出其中間已成之膿毒然後依法以收其功如病發於陰而極冷則內用平補之藥以宣其氣滋其血助其元陽從其脾胃待其飲食進而後須順氣勻血如常法外用熱藥以潮一身之氣血回死肌拔毒氣後用溫藥以散之其極冷者或又為涼藥所誤不得已於三建湯而回陽病必旁出再作為佳此陰變為陽之候更生之兆也若內不回外症不見是為獨陰絶陽不可治矣蓋陽者氣也陰者血也陽動則陰隨氣運則血行氣耗則血死血死則病死矣冷症則用熱藥不過行其氣血氣血遇熱則行遇冷則止須斟酌用之當先以乳香輕粉救其心護其膜蓋心為一身之主宰膜為五臟之囊槖病之初起毒上攻心之胞絡故先嘔逆而後癰疽或先癰疽而後嘔逆者皆由毒攻於胞絡根於心也心主受毒神無所舍元氣昏瞑毒之始萌傍腐肌肉治若不早毒氣透膜膜透則元氣泄臟腑失養精神枯槁脈自壞絶病有至盛內見五臟可得其生者膜完故也病有至微肌肉未潰而死者膜先透也是以救心護膜當為治者之先務亦外科之良法也此乃論癰疽之要其神聖功巧不可具述非尋常醫流一草一木一針一刀所可以得其要者也方加味托裡散治發背癰疽無分腦乳附骨等處及諸疔瘰癧一應腫毒腫未成即散已成即潰敗膿自出腐肉自去痛苦自減大有神效非常功也人參黃耆桔梗防風並去蘆川芎當歸官桂厚朴白芷各一錢甘草五分白芍藥木香大腹子烏藥枳殼紫蘇各一錢上作一服水一鍾半生薑二片蔥白一根煎至七分加酒一呷病在上食後服病在下食前服兼有他症依後加減病不退加白朮白茯苓熟地黃各一錢不進飲食加砂仁七分香附一錢痛不住加乳香沒藥另研煎熟放下各一錢水不幹加知母貝母各一錢瘡不穿加皂角刺一錢咳嗽加陳皮半夏杏仁各一錢大便祕加大黃三錢枳殼一錢小便澀加麥門冬木通車前子各一錢燈草二十根腳氣加木瓜黃柏各一錢又方仙方活命飲治外科一切病症已成即潰未成即散二三服立效輕者一服即效豫用此方治乳癰瘰癧大有奇效滴乳另研藥熟化下防風白芷貝母赤芍藥當歸尾明沒藥研皂角刺天花粉甘草節穿山甲炮以上各一錢陳皮金銀花各三錢病在背俞皂角刺為君就本方加作三錢在腹募白芷為君加作三錢在胸次加栝蔞仁去殼二錢在四肢金銀花為君依本方疔瘡加紫河車草根三錢瘰癧加夏枯草三錢乳癰加夏枯草三錢青皮一錢上作一服無灰酒五茶鍾裝入有嘴瓶內以厚紙封口勿令泄氣煎至三大鐘去渣作三次服接連不斷隨瘡上下食前後服能飲酒者服藥後再飲三五杯此藥並無酒氣不動臟腑不傷氣血忌酸薄酒鐵器服後側臥覺痛定回生也神效不可具述真人偈云真人活法世間稀大惡癰疽總可醫消毒只如湯潑雪化膿漸使肉生肌陰功何止萬人活神效何須刻日期留下仙方誠信授存仁修制上天知按此方不問陰陽虛實善惡腫潰或大痛或不痛先用此劑大勢已退然後隨症調治其功甚捷誠仙方也又方瘰癧炙法不問遠年近日一切瘰癧但炙立愈男左女右手以草心於中指第二節起比至臂上挨掌第一橫紋止剪斷再將草心於百勞穴骨尖上比起至草心盡處是穴以墨記之於墨上炙一歲一壯立愈氣門諸氣脈脈訣云沉脈為氣沉極則伏澀弱難治沉滑兼痰沉弦兼怒沉數兼熱沉遲兼寒沉濡兼濕浮弦兼風沉澀而結為郁沉而有力為氣實沉而無力為氣虛隨各部見之為本經之病臨症宜詳審之下仿此症經云諸痛皆因於氣百病皆生於氣怒則氣逆喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結此九氣之不同也古法治九氣以所不勝者制之如怒則以悲勝之之類是也治辨疑録云喜樂恐驚耗散正氣怒憂思悲鬱結邪氣結者開之木香香附之類散者益之人參黃耆之類世人多泥於氣無補法之語不審虛實往往多用燥利之藥若氣實者用之為當氣虛不補邪何由行方四君子湯氣主方扶胃降火補虛固本主男子用若女子氣虛亦宜用之人參補中益氣去蘆一錢五分白朮扶胃健脾炒二錢白茯苓養心利水去皮一錢甘草和中降火炙四分上用姜一片棗一枚煎服兼有他症依後加減勞瘵咯血加山藥黃耆粟米阿膠各等分吐血後虛損者加黃耆一錢五分白扁豆一錢麥門冬一錢二分心煩口渴加麥冬一錢二分竹葉一錢山梔一錢五味子九粒心熱加麥門冬茯神黃連各八分潮熱往來加柴胡地骨皮各一錢黃芩八分腹痛加白芍藥一錢五分乾薑炒官桂各七分厚朴八分青皮五分胃冷加丁香附子制砂仁各等分氣痛加木香玄胡索各八分當歸一錢有痰加陳皮去白貝母半夏薑製各一錢二分去人參氣虛甚者加黃耆一錢五分熟附子一錢暑月亦加脾胃虛弱加陳皮山藥當歸各一錢黃耆一錢二分遍身疼痛加當歸一錢五分木香五分北五加皮一錢去人參半身右邊不遂加薑汁竹瀝各半盞腹脹不思飲食加砂仁白豆蔻枳實各七分去人參氣虛成痿加蒼朮黃柏黃芩木瓜各八分心煩不定加辰砂酸棗仁遠志各七分麥門冬一錢咳嗽加杏仁桑白皮各七分五味子十粒貝母栝蔞仁陳皮各八分去參朮暑月病熱口渴唇乾譫語脈虛細而遲加黃耆麥門冬各一錢五分五味子九粒川歸白芍藥附子制熟各一錢氣短小便利加黃耆去茯苓中風氣虛加黃耆有痰加薑汁半盞竹瀝一盞久瘧熱多寒少加黃耆一錢五分柴胡知母地骨皮各一錢病後虛熱加麥門冬川歸黃耆各一錢升麻柴胡各三分脾困氣短加砂仁木香各五分白扁豆黃耆各八分盜汗不止加黃耆陳麥曲各一錢五分麥門冬酸棗仁各八分當歸一錢二分自汗不止加黃耆一錢五分當歸麥門冬熟地黃麻黃根各八分心血虛不眠精神恍惚加當歸酸棗仁各一錢黃耆一錢二分圓眼三個去殼四肢懶惰嗜臥加白扁豆川藥砂仁當歸陳皮各八分氣血虛眩運加黃耆天麻半夏荊芥穗各一錢水瀉不止加麩曲木香砂仁肉豆蔻各七分夏月加黃連扁豆炒車前子澤瀉加七分四肢惡寒有熱加麻黃桂枝川芎當歸各一錢去人參婦人安胎加黃芩當歸阿膠艾葉減半各一錢枳殼五分漏胎加續斷地榆當歸白芍藥荊芥穗黃芩各八分産後瀉痢加厚朴蒼朮白扁豆砂仁肉果各八分産後脾胃弱加砂仁白扁豆山藥連子陳皮各一錢小兒脾胃虛弱不納食易瀉加山楂肉果砂仁厚朴蒼朮陳皮各八分小兒諸疳加胡黃連銀柴胡使君子肉山楂各一錢小兒慢驚加全蠍白附子天麻各七分薄荷葉七片男婦虛勞有熱加當歸白芍藥熟地各一錢柴胡秦艽地骨皮牡丹皮各八分黃柏蜜炒五分青蒿三分男婦氣虛渴加木瓜乾葛烏梅各一錢男婦五心煩熱面色痿黃加當歸白芍藥柴胡麥門冬各一錢小兒痘瘡淡白不起者氣虛也加黃耆八分官桂五分木香三分大人小兒夏月吐瀉加藿香白扁豆陳皮厚朴蒼朮乾葛各八分木香三分或五分中脘寒痛或手足爪甲青四末厥者加乾薑一錢去茯苓甚者加附子一錢久瀉痢元氣下陷者加升麻五分元氣脫者去升麻加附子制熟一錢五分老人氣短小便短少加黃耆吞滋腎丸思慮過傷心脾晝則困倦夜反不寐加黃耆當歸麥門冬酸棗仁圓眼肉各一錢仍服天王補心丹遺精白濁氣虛者加山藥蓮子芡實各等分諸瘡內托加黃耆防風各一錢連喬金銀花黃柏牛蒡子各八分諸瘡瘍後氣血虛損者加當歸白芍藥黃耆黃柏各分諸虛眩運眼旯黑花加天麻半夏川芎當歸各等分脾胃不和加砂仁厚朴各七分陳皮蒼朮各一錢嘔逆噁心加半夏生薑陳皮各八分砂仁五分丁香三分皮黃加黃柏蒼朮各一錢五分婦人有孕惡阻加陳皮枳殼砂仁各等分婦人赤白帶屬氣虛者加蒼朮一錢升麻五分芡實八分氣虛潮熱加麥門冬地骨皮柴胡各八分黃芩七分氣虛惡寒加黃耆一錢桂枝五分背惡寒同下元冷極加乾薑附子炮各等分去茯苓上四君子湯加減方法也須量病輕重虛實臨症斟酌方劑大小庶無實實虛虛之誤倘收未備惟達者正之幸甚血門諸血脈經云脈洪滑為血盛脈澀弱為血虛脈如瀉漆之狀者為亡血脈芤為失血細弦澀按之無力為脫血浮弱按之絶為下血煩咳脈芤者為吐血沉弦而數為衄血諸血症身涼脈靜者生身熱脈大者死腸澼下膿血弦絶則死滑大則生症丹溪云有吐血咯血衄血唾血大小便血之異又女人血崩血漏大抵皆由火盛致血錯經妄行脈必大而芤或因怒氣而得者經云怒則氣逆傷肝甚則嘔血脈必弦大而芤下血崩漏亦屬熱與虛蓋熱則流通虛則下漏脈必急疾而數宜加詳審治按經云血從上出皆是陽盛陰虛有升無降血隨氣上越出上竅宜補陰抑陽氣降則血自歸經血從下走皆由內外有所感傷濁熱凝停於胃內隨氣下流亦妄行之義或云大便見血為內傷絡脈所致小便見血為損傷心腎陰火妄動所致女人崩漏皆由七情損傷衝任所致三者皆宜清氣降火養心理脾為主蓋氣清則血和心脾旺則血有所統攝而自無妄行之患矣方四物湯血主方生血去熱補虛益精主女人用男子血虛亦宜用之川芎清陽和血行血肝經藥春天倍用女人加此味去蘆八分川歸潤中和血養血腎經藥冬月倍用去蘆酒浸曬乾一錢五分白芍藥緩中破血心脾經藥夏月倍用酒炒一錢二分地黃涼血用生補血用熟滋陰生血肺經藥秋月倍用薑汁浸曬乾一錢男子加此味上為㕮咀每服姜一片水煎食遠服隨有他症依後加減此方春宜加防風夏宜加黃芩秋宜加天門冬冬宜加桂枝此常服順四時之氣而加減未有不中者也血虛腹痛微汗惡風加官桂七分倍芍藥嗽痰加桑白皮杏仁麻黃貝母各等分大便祕加桃仁大黃麻仁枳殼減半余各等分血虛頭眩加天麻防風荊芥穗各一錢虛寒脈微氣難布息不渴便清加乾薑附子各一錢中濕身重無力身冷微汗加蒼朮白朮白茯苓各一錢二分筋惕肉瞤屬血虛也加天麻人參各一錢傷寒筋惕肉瞤自有本條轉筋屬熱加酒芩紅花木瓜蒼朮各等分兩脅脹滿加枳實半夏各八分白朮一錢去地黃身上虛癢加黃芩防風煎調浮萍末一錢小便祕澀屬血虛加茯苓澤瀉各八分牛膝一錢甘草梢五分盜汗屬陰虛者加麥門冬知母黃耆浮麥麻黃根各等分自汗加人參黃耆麻黃根各一錢桂枝五分勞瘵陰虛火動加白茯苓貝母陳皮款冬花杏仁黃柏知母各一錢甘草三分有熱再加秦艽地骨皮各一錢陰虛喘嗽或吐紅者加知母貝母黃柏五味子十二粒人參麥門冬桑白皮地骨皮牡丹皮款冬花紫菀各等分如肺火盛者去人參換沙參陰虛發熱煩渴不能坐臥加麥門冬山梔黃柏知母各一錢陰虛潮熱加柴胡知母黃芩地骨皮各一錢半身不遂左邊加桃仁紅花各八分薑汁半盞竹瀝一盞血痢加黃連荊芥穗地榆各一錢木香五分枳殼七分風虛眩運加天麻秦艽羌活各一錢腳氣衝心加炒黃柏一錢口乾煩渴加麥門冬烏梅各一錢四肢冷氣痛加良薑玄胡索木香吳茱萸各等分血氣虛弱起則無力而倒加白朮陳皮人參各一錢血虛刺痛五心熱加山梔香附烏藥各一錢官桂青皮各五分血虛甚者加人參附子各一錢暑月再加麥門冬八分五味子十粒腹中積血氣塊加木香五分三稜莪朮乾漆各八分乍寒乍熱加人參白茯苓柴胡各一錢血虛成痿加蒼朮黃柏下補陰丸老人性急作勞兩腿痛加桃仁陳皮牛膝各一錢甘草生五分入薑汁半盞服三四劑而安少年患痢用濕藥大過致痛叫號此惡血入經絡也加桃仁紅花牛膝黃芩陳皮各八分生甘草五分入薑汁半盞水酒煎服三四帖或十數帖而安午後嗽即陰虛嗽也加黃柏知母天門冬栝蔞仁貝母各八分貪勞人秋深發熱渾身發熱手足皆疼如煆晝輕夜重倍川芎芍藥加人參一錢五分五味子十五粒如病加喘手足仍疼再加人參白朮牛膝桃仁陳皮各一錢生甘草五分檳榔七分生薑三片煎服五十帖而安衄血加黑山梔仁黃芩麥門冬牡丹皮扁柏葉各一錢入童便半鍾又法本方加麻黃三錢蔥白三根一服汗即止吐血加牡丹皮黑山梔仁童便浸香附犀角藕節京墨各等分入童便半鍾煎又法以患人吐出血取起烙干研為細末以當歸煎湯調下此吳球子血導血歸之法也咯血加麥門冬一錢五分童便二盞薑汁半盞青黛一錢山梔仁炒黑一錢唾血加天門冬麥門冬知母貝母百部熟地黃各一錢黃柏八分桔梗遠志各五分咳血痰火傷血也加貝母栝蔞仁青黛香附杏仁阿膠各八分童便二盞薑汁半盞腎虛肺痿咳血加天門冬麥門冬知母貝母紫菀桔梗玄參杏仁阿膠薏苡仁各等分痰涎血出於脾也本方去川芎地黃加黃耆黃連甘草陳皮山藥薏苡仁各等分大便下血即腸風下血也熱者本方加炒山梔牛膽槐實黃連枳殼阿膠荊芥穗升麻少余各等分虛者加人參白朮各一錢五分黑乾薑升麻各五分陳皮八分甘草三分小便溺血加山梔木通小薊琥珀各等分或本方煎調下牛膝膏亦妙按小便血痛者為血淋自有本條不痛者為溺血也小兒尿血本方煎調發灰一錢五分生甘草末五分或本方煎調五苓散加棕櫚灰髮灰各一錢大人小兒俱妙血淋加木通大黃各一錢五分桃仁紅花各一錢車前子琥珀各八分赤茯苓甘草梢澤瀉青皮各七分或本方調下牛膝膏女人血崩加白朮黃連地榆各一錢五分虛崩加人參白朮黃耆麥門冬山藥陳皮各等分升麻甘草各三分血虛眼暗或腎水虛不能遠視加甘菊花枸杞子各一錢五分風熱赤腫火眼加防風甘菊花黃連黃芩龍膽草各分痔漏加人參白朮黃連生地黃槐實制條芩各一錢荊芥穗枳殼各七分升麻甘草生各三分腸風臟毒加同脫肛血虛加阿膠枳殼各八分升麻三分下焦無血小便澀數加黃柏知母牛膝甘草梢各等分瘧疾若間一日連發二日或日夜各發加人參白朮黃耆知母柴胡青皮各等分老人氣短小便不通加人參黃耆各一錢煎吞滋腎丸性急人味厚常服燥熱之藥左脅紅點痛必有膿在內加桔梗生甘草少香附多生薑煎服十餘帖痛處腫針出膿再用本方十餘帖調理老人因疝多服烏附熱藥發疽淋痛叫號困憊加牛膝濃煎大劑服五七帖中風血虛加薑汁半盞竹瀝一盞能食去竹瀝加荊瀝筋骨痛及頭痛脈弦如瘧狀加羌活防風北五加皮各八分喉乾躁痛加玄參桔梗荊芥黃柏知母各等分立已血虛頭痛加天麻細辛甘菊花各八分倍川芎血虛兩脅肋痛加木香玄胡索各七分官桂青皮各四分枳殼六分香附一錢小腹繞𤹷痛加官桂木香玄胡索沒藥各等分瘀血結塊作痛者加桃仁一錢五分大黃三錢芒硝一錢五分下盡黑血痛即止婦人血滯同此加用男婦虛勞氣弱加人參白朮陳皮黃耆各一錢二分甘草三分喘嗽胸滿晝輕夜重加枳實麻黃杏仁半夏各一錢二分煩躁加人參知母各八分石膏一錢五分竹葉二十片心血虛不得眠去川芎加人參黃耆酸棗仁圓眼肉麥門冬石菖蒲各等分煎服仍服硃砂安神丸或補心丹婦人下元虛冷無子息加附子制肉蓯蓉蘄艾香附各等分以下並婦人症血氣上衝心腹肋下滿悶經水閉加木香檳榔青皮烏藥紅花各五七分赤白帶腰腿疼痛加防風白芷赤石脂黃柏蒼朮烏藥各等分臍下冷腹痛腰脊痛加木香五分玄胡索吳茱萸各八分官桂五分苦楝七分香附一錢氣衝經脈月事頻並臍下痛加官桂香附倍芍藥經水欲行臍腹絞痛加玄胡索牡丹皮檳榔各八分木香吳茱萸紅花各五分經水逼多別無他症加黃芩白朮荊芥穗各等分經水如黑豆汁色加黃芩黃連荊芥穗各等分經水少而色紅和加紅花五分倍當歸熟地黃癥瘕血積加三稜莪朮官桂乾漆瓦楞子煆粉各等分經水適來適斷往來寒熱者加小柴胡湯胎動加艾葉香附子紫蘇大腹皮白朮黃芩枳殼各等分血枯經閉加桃仁紅花鹿角屑各一錢倍當歸熟地黃下血過肌肉黃瘦加人參黃耆白朮茯苓甘草少官桂五分陳皮各等分婦人損傷血氣或憂鬱所傷致五心煩熱加麥門冬黃芩柴胡百合地骨皮山梔香附各等分經水或前或後加牛膝澤蘭葉益母草各等分赤白帶日久不止加人參白朮藁本牡丹皮川續斷各等分經水過期者血虛也加參耆白朮陳皮各一錢升麻四分經水不及期者血熱加芩連之類肥人兼痰治加半夏茯苓貝母陳皮山梔香附之類經水紫黑有塊者加芩連香附各等分經水將行作痛者血實兼郁加桃仁紅花牡丹皮玄胡索黃連香附各等分經水行後作痛加參朮各一錢紅花三分經水不調而血色淡白者亦虛也加參朮阿膠各等分軀脂生滿經閉者加南星半夏香附黃連各等分去地黃臨經時遇煩惱作心腹腰脅痛不可忍者加桃仁紅花玄胡索香附青皮各等分經水過多旬余不止加荊芥穗續斷黑乾薑炭各八分炙甘草四分虛者再加參朮調理經水色如黃漿水者此胃中濕痰也加半夏陳皮茯苓甘草細辛蒼朮各等分經水下如屋塵水者加續斷蔓荊子赤石脂各等分經水感寒本方去地黃加白芷柴胡乾葛紫蘇各等分婦人血虛往來潮熱加柴胡白茯苓地骨皮各八分荊芥薄荷各六分甘草三分胎痛皆由血少加砂仁香附紫蘇葉各八分半産多在三個月或五個月者加人參白朮陳皮阿膠艾葉條芩甘草少余各等分瘦弱婦人子宮乾澀加阿膠香附黃芩紅花少余各等分婦人性急血下如注倦甚加香附側柏葉童便煎妊娠調理加黃芩白朮各一錢五分枳殼七分砂仁五分胎損不安或胎漏加白朮黃芩地榆阿膠艾葉香附續斷枳殼各等分胎痛加香附紫蘇梗砂仁枳殼各一錢倍熟地黃妊婦寒熱加小柴胡湯去半夏氣虛再加參朮各一錢五分臨月服催生加大腹皮陳皮白朮黃芩紫蘇梗葉香附白芷甘草少余各等分或用益母丸瘦婦血少胎弱難産加枳殼乳香木香各五分甘草三分益母草一錢血餘灰一錢或用兔腦丸産後補虛加參朮陳皮各一錢甘草炙四分乾薑五分去芍藥如發熱再加茯苓柴胡各八分産後去血過多昏運加荊芥穗二錢去芍藥地黃産後生腸不收由氣血虛加人參白朮黃耆甘草升麻去芍藥地黃産後著惱加香附一錢五分乾薑炒青皮各五分去芍藥地黃産後驚風加茯苓天麻防風黃耆官桂甘草各等分去地黃有痰加半夏陳皮各一錢産後痢加黃芩桂枝枳殼木香檳榔各七分去地黃産後多汗加黃耆一錢桂枝五分産後血風四肢瘛瘲加天麻荊芥穗各一錢産後惡露欲行不行作痛加牡丹皮玄胡索紅花澤蘭葉官桂各等分五靈脂産後咳嗽加旋覆花前胡杏仁白茯苓陳皮去地黃芍藥産後心虛怔忡不定言語錯亂加人參茯神遠志麥門冬各一錢甘草三分去白芍藥地黃産後惡露不行結成塊疼痛不可忍加沒藥血結官桂桃仁紅花各等分莪朮五靈脂産後浮腫加白朮白茯苓陳皮大腹皮各一錢去地黃鯉魚湯煎産後臍腹痛加炒乾薑官桂香附沒藥各等分産後血塊痛加蒲黃玄胡索牡丹皮各等分官桂少許産後瀉本方去當歸地黃加白朮茯苓陳皮各一錢甘草少乾薑白扁豆各七分乳不通加白芷青皮各七分木通穿山甲炙各一錢惡露不止加炒黑蒲黃白芷百草霜荊芥穗地榆各等分小兒血熱加黃連連翹各六分小兒痘瘡不活血少故也加黃耆一錢桂三分紫草五分小兒尾骨病加山藥知母酒炒桂少許癧瘡加青皮柴胡海藻昆布黃芩貝母香附各一錢諸瘡內托加黃耆連翹黃柏各等分諸瘡發散加防風羌活荊芥連翹牛蒡子各等分諸瘡毒潰後血虛加人參黃耆白朮甘草各等分婦人吹乳乳癰加蒲公英一錢五分金銀花石膏貝母香附青皮連翹甘草節各八分血風瘡加防風黃柏金銀花連翹牛蒡子苦參各等分甘草少上四物湯加減方法也詳病虛實增損用之思過半矣
