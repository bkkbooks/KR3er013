body:
  text: 跋先高祖春嚴公幼孤而貧生而有大志性嗜書力不能就孰私蓄雞積卵以易書讀或勸之習星卜以為活公不應固強之公熟思之日吾寧業醫將活人耳徒自活耶遂專志讀醫書稍長從平湖陸聲野先生遊盡發其祕活人指不勝屈暇則著書有活人心鑑虛車録養生類要脈症治方等書惟養生類要昔已梓行余悉存笥中遊於北都遭太醫之嫉卒年未四十先曾祖居易公暨先君咸世傳其學先君素欲以公所遺諸書梓以問世自少力肩家政勤勞於外有志未逮及耄而始得經風休息於家先以脈症治方一書付剖劂氏余將次第以成益脈症治方者按脈審症因症辨治而後定方其理至淺而至深其言至簡而至備俾初學者見之瞭如指掌即三折肱者究不能出其範圍洵乎為下學上達之功也故梓之尤急也無何書垂成而先君忽見背時不肖持偕仲弟斌匍匐歸里痛摧心脾是書未遑寓目賴從兄天士詳加校閲纖悉無訛其未成者仍十之二三屬持急續成之持願自茲糊口四方得菽水以供母氏余悉梓成諸書以成先君之志奈年來烽煙未靖謀生無策又未易言此因思先高祖甫離襁褓而遂失怙家無升斗之儲未當一日就訓熟師而能成不朽之業垂不朽之書持等受先人之庇承父澤之遺而有志莫酬其賢不肖為何如耶然使天假先君數年則諸書皆已告成而天胡奪之速豈以諸書過於淺天之祕故天不欲使見於世耶抑吾父欲與世公之而天反欲祕之耶然而吾父之志固未嘗一日去諸懷也是不肖持之責也夫元孫志持百拜敬跋
