熟地黃四兩附子二兩面裹煨牛膝一兩五錢山藥三兩肉蓯蓉二兩杜仲二兩五錢去皮炒去絲上為末煉蜜為丸如梧桐子大每服三十丸或五十丸溫酒鹽湯任下食前服以食壓之八味丸益陰強腎山藥二兩白茯苓一兩五錢牡丹皮去木兩半山茱萸去核二兩澤瀉一兩五錢熟地黃四兩附子麵裹煨桂心各一兩上為末煉蜜為丸每服七八十丸空心鹽水送下天王補心丹養心安神生血人參黃耆當歸白朮熟地各一兩五錢甘草五錢麥門冬茯神各一兩遠志七錢酸棗仁一兩二錢上為末圓眼肉四兩熬膏入煉蜜四兩搜和為丸辰砂三錢金箔十片為衣如小龍眼大每服一二丸白湯化下氣門方計方二條二十味木香流氣飲治諸氣痞塞不通胸膈膨脹面目四肢浮腫半夏香附厚朴枳殼青皮紫蘇陳皮各八分甘草肉桂丁皮草果各四分莪朮大腹皮藿香白芷赤茯苓白朮木瓜檳榔各七分木香木通各一錢麥門冬石菖蒲人參各五分上作一服水二鍾姜三片棗一枚煎八分食遠熱服木香分氣丸治氣不順脾胃心腹脅肋脹滿嘔吐等症木香檳榔青皮陳皮乾薑薑黃當歸白朮玄胡三稜莪朮赤茯苓肉果各等分上為末麵糊為丸如梧桐子大每服八九十丸空心鹽酒下血門方計方二條補陰丸滋陰補腎養血生精黃柏炒知母炒龜板各三兩酥炙熟地五兩白芍藥酒炒枸杞子鎖陽天門冬去心各二兩五味一兩乾薑三錢冬五錢上為末加豬脊髓三條和藥搗勻煉蜜丸如梧桐子大每服七十丸漸加至九十丸空心鹽湯送下牛膝膏治便血血淋牛膝去蘆二兩以水五鍾煎至一鍾入射少許空心服痰門方計方二條豁痰湯治一切痰疾此方與滾痰丸相表裡用治痰之聖藥也柴胡去苗一錢五分半夏制一錢五分片黃芩一錢五分甘草五分人參八分有火不用蘇葉帶梗厚朴薑製南星各八分薄荷姜活枳殼各五分木香二分上作一服姜三片煎服滾痰丸治一切痰火大黃酒蒸黃芩酒炒各八兩青礞石煆一兩沉香五錢上用薄糊丸如梧桐子大每服五七十丸食後滾白湯下郁門方計方一條四磨飲治一切鬱氣痞悶不快木香檳榔枳實各一錢沉香減半上四味以滾水一碗作一次磨服酒磨亦妙醫案先魯大父春嚴公性嗜醫少從平湖陸聲野先生遊盡發其祕活人指不勝屈每遇奇疾而奏奇效者則筆之以示子弟十餘年間存案千餘條自比遊遭大醫之嫉遂散失無存近從所遺殘書帙中僅搜獲數十條因附梓以公同好是亦江海之一勺耳然其全味從可知矣曾孫象先百拜謹識一男子素酒色過度患傷寒初用發散得汗稍解繼而大熱六七日晝輕夜劇六脈沉細而數無力此陽症得陰脈法所難治遂告以該用附子彼家驚訝請他醫用石膏並芩連等藥更甚群議欲用大黃豫急走告曰仲晾書云承氣入胃陰盛乃亡敢用大黃以殺人乎彼家自謂必死哀泣求救於豫豫遂用濃薑汁探之以安衆心服下稍靜遂用附子五錢乾薑五錢以蔥白汁轉送一服後大汗熱退身涼而愈籲若用大黃立刻斃矣生殺之機反掌喑耳可不慎哉一女人年三十餘經不調已半載矣忽夫經商遠歸狂遂不行三四月後腹大如盤幾醫皆云是孕彼家亦自謂是孕無疑但日漸黃瘦晡時潮熱請豫診視兩寸細數兩關微弦而澀兩尺短澀而微或見敬伏豫告曰非孕脈乃血聚結成氣塊之症若是孕兩尺當流利往來不絶訣云尺按不絶此為有孕叔和云澀脈如如刀刮竹女人得之乃敗血為病彼不信至秋七八月間腹如雙胎狀至一年不生漸大如豉復請豫診視其脈如舊更加瘦弱遂用調脾胃補元氣藥二十餘劑待稍健再用桃仁承氣湯加歸尾赤芍藥五靈脂之類三大劑行下黑物如水浸木耳狀竟能走動調理半年而安後復經調受孕次年冬生一子壯健倍常一男子素過飲酒常患內痔出膿血不止請醫用峻藥熏搽內服寒涼躁藥痔雖少愈而咳嗽聲啞潮熱喉痛疊作飲食不思遂致危篤請余診視六脈細澀而緊右寸獨大面青辱赤謂其家人曰此痔患流毒而然也蓋肺與大腸為表裡肺移熱於大腸大腸積熱而生痔此時則大腸熱復歸於肺故有此諸症以麥冬清肺飲間以人參養榮湯各十餘劑晚用犀角一錢柏枝湯下月餘全好一婦人年五十餘素自奉甚厚常有脾泄病忽患胸脅脹痛口乾煩渴虛汗如雨舌上時有黑胎大小便遺出不知初用黃連人參白虎湯二帖而煩渴止舌胎去再用麻黃根散加歸耆參朮大劑數服虛汗止胸脅寬而痛減再用十全大補湯去桂加麥冬調理二十劑而安一婦年四十四五兩脅胃脘更換作痛脹滿脅止則胃脘痛胃脘止則脅痛每痛則虛汗如雨水漿不入口不能呼惟揚手擲足而已六脈沉伏初延醫用理中湯加青皮柴胡枳殼愈痛或云諸痛不宜補以其有火故也遂更醫用越鞠二陳加青皮柴胡藿香枳桔蒼朮倍山梔一服愈劇六脈愈虛弱如蛛絲之狀豫視之曰事急矣非參耆不可遂用大劑參耆歸術陳皮一服而痛減半遂飲食繼用補中益氣去升麻調理得痊至四年上又因憂慮病發大痛如初虛汗惡食嘔吐再依前用參耆一劑其痛愈甚又加喘急氣壅此參耆助火也乃用桂枝大黃湯一劑已寬十之三再用白朮茯苓陳皮甘草青皮柴胡藿香桂枝黃芩香附山梔仁二三劑仍用十全大補湯調湯調理二月而安籲同是病也同是治也何先後之效不同蓋先病者虛也後病者鬱火也苟不察此寧免虛虛實實之禍哉一男子因勞力飲食不節復感寒頭痛發熱肢節痛無汗惡寒遂用麻黃湯加乾葛白芷一服汗出熱退頭痛體痛未除又加胸脅脹嘔吐再以小柴胡加枳桔木香陳皮脅脹嘔吐稍定虛汗煩躁渴甚用人參白虎湯煩渴雖止又復頭疼發熱小腹急痛詢之大小便利意必是外減去而內傷未除再用大柴胡湯下二三行諸症悉去後用補中益氣湯數服而安一婦人年三十餘因乍洗澡胃風患頭痛發熱自汗惡風煩躁而渴先因自用薑蔥煎醋表汗重虛腠理愈加冷汗不止請豫治診其六脈細數無力兩寸略大初用桂枝湯加川芎白芷黃芩石膏煩躁略安而冷汗與渴未止續用人參白虎湯而渴止頭疼冷汗反甚知其榮衛俱虛遂用十全大補湯去桂加麻黃根二錢數帖而安一男子年近四十因官事奔走受熱患血痢日夜十五六次中脘連小腹痛如刀割水不入者二日診其六脈弦細而數遂用四物湯加黃連枳殼地榆二服而痛稍止痢亦減三五行仍然不食知其熱毒積深再用枳殼大黃三倍大黃湯兼用盒臍法大利死血一桶許痛略止能食薄粥一二盞續用豆蔻香連丸一二兩而痢俱止後用苓參白朮散一料方得全安一男子年五十餘因食冷肥肉數片又食冷粥二碗次早鬔頭看木匠因感胃寒邪遂頭痛發熱惡寒無汗此內傷外感俱重先用麻黃湯加川芎白芷蔥白一服而汗出頭痛發熱仍舊又加胸膈脹滿知其表已解而里未消復用大柴胡下之而前症略寬其燥渴反劇再用白虎湯一服而煩渴止病全愈一童子年十五稟弱患胃脘當心而痛發作有時夜重日輕初因食豬舌一片遂痛起醫家遂用藿香正氣散加消導之藥一劑不效又用桂枝芍藥湯加乾薑烏梅川椒亦不效請余視余因記丹溪心痛條云始痛宜以溫散久則鬱熱宜以寒涼藥治之再用桂枝大黃湯痢三四行遂痛止後用調脾胃藥得痊一女年十一患胃脘陳痛六脈沉澀初時醫者用桂枝芍藥湯加青皮藿香柴胡半夏等藥不效又用木香分氣丸其痛愈劇如請余治余細詢之因久坐石凳看戲故得此痛遂用茅氏五積散二劑而安此女先一年冬月曾因食生冷胃脘痛用藿香正氣散下木香丸五六丸而安籲病同而感受各略治之安可執定一方一法耶一小兒上吐下瀉日夜無度用錢氏白朮散去木香加扁豆一服而止後連治數人皆效又一小兒年未適急驚垂死以荊芥薄荷燈心竹葉金銀煎下玉樞丹半粒而愈一婦人年六十餘素有氣痛之症每惱怒必發近因勞役過食麵傷兼有惱怒忽大痛久水不納初用藿香半夏曲陳皮香附扁豆芍藥桂枝枳實等藥服下不多時大痛藥皆盡吐飲食不進雖少進亦吐後於前方加黃連五分方解石二錢滑石八分入銀一塊同煎用作三次徐徐服遂不吐亦少進飲食後用寬中下氣藥數服而安蓋此症有火填塞胃口故用連膏去其火假銀性使下行是以藥食皆得進而病安也一婦人年四十五六因與人相爭投水患身熱頭痛胸悶嘔惡手足不能動履身如被杖診之六脈洪大重按皆濡初用五積散二劑熱痛皆正但濕未去故手足未利身體仍痛再用川芎當歸赤芍熟地厚朴蒼朮陳皮甘草半夏枳殼香附烏藥真桑寄生續斷羌活獨活防風蘄蛇每劑二兩作大劑十帖而安再用六味地黃丸加木瓜蒼朮一料除根一男子患傷寒因勞役而得初起如瘧狀發熱頭痛嘔連惡寒六脈弦數而緊無汗初用柴截散一服不效再用小柴胡加枳桔繼以胸蒲而痞嘔不止大渴見水就吐余視之知其邪火在膈上作吐遂以人參白虎湯加黃連一劑熱退膈寬嘔吐即除後以兩尺脈弱右關沉濡以補中益氣加麥冬黃柏知數劑全愈一婦人年四十八九三年前因惱怒患吐酸水嘈雜上膈膨悶中脘隱痛嘔惡六脈弦澀此氣膈也初用四物去地黃二陳加白朮扁豆黃連香附八劑後加人參粟米食後用黃連乾炒一兩白朮二兩枳實一兩木香五錢半夏橘紅蘿蔔子薑汁浸蒸餅丸服食前用人參一兩白朮一兩茯苓八錢甘草三錢白芍一兩當歸一兩御米一兩山藥一兩蓮子一兩蘆根汁人乳薑汁童便蜜少許熬膏丸各服一斤相間服三月全愈一男子年五十因憂鬱繼因勞役患胸膈脹悶飲食少進每食必屈曲而下大便閉結口臭舌乾診之六脈弦澀豫曰此火盛燥血脾土受傷若不治必成膈也遂用大劑四物加白朮桃仁間以二陳加姜炒黃連山梔二十劑而大便潤五十劑而胸膈寬食前用養胃丹人參一兩白朮一兩茯苓一兩陳皮一兩五錢去白當歸白芍半夏曲黃連扁豆山藥御米粟米各一兩甘草五錢外用蘆根自然汁薑汁竹瀝童便人乳牛乳羊乳蜜各一盞共和為丸空心服下午用保和丸加木香黃連吳萸同炒枳實老米糊丸食後服調理半年全愈一婦人患崩一日忽下一物如豬肚狀大小腹急痛下午發熱嘔惡不食診之六脈沉澀豫云此陰㿗也因崩久氣血虛而脫下遂用八物湯去地黃加升提藥外用疏風藥熏洗三日全收再用十全大補湯去桂並用紫石英丸調理至一月復元此病往往産後亦有之治法當與此同一婦人年五十餘素善飲患心膈一塊脹滿作痛又無塊形飲食急不能下必屈曲乃下診其脈浮大而數右三部略弦多作痰膈治二陳加連術枳殼等藥不效忽一日頭大痛請余治余用頭痛藥遂止鼻內又出血再用清肺藥二帖鼻血不出數日口內又吐紫黑血數口豫再診之前浮大而數細診兩頭實中央虛乃芤脈也右三部亦然遂悟其必積血在胸中也再用桃仁承氣湯大劑服一日一夜下黑血十餘次膈遂十寬其九再用和脾胃並疏氣養血藥調理二月而安一少婦年十九經未通諸藥不效診之六脈沉滑觀其人肥而白知其下焦有結痰塞血海隧道以此不通遂用茅氏大通經散三帖而通仍不甚多繼用四物二陳加南星蒼朮紅花服至下五劑而全通利也一男子年四十餘因下冷水洗澡久浸水中患頭痛發熱身重如被杖無汗六脈洪數初令服九味羌活湯倍蒼朮二服微汗而病未解遂更朱醫用麻黃髮表藥大汗熱雖小退頭痛愈劇越五日再請豫視豫曰先六脈洪數故用微汗今則脈沉數又見胸腹脹大是里症也宜急下之今反汗之是重竭其陽也用大承氣湯下之入大黃五錢乃得通利熱退身涼而乾嘔大作再用半下湯加黃連入薑汁一服乃止豫再教服調理脾胃藥彼不聽豫曰餘邪未盡正氣未回不服調脾胃藥必有他疾出後經半月果患赤痢用黃芩芍藥湯加檳榔枳殼術香肉果二服痢止再用參苓白朮散煎服數帖而安一男子年二十八九家貧以備工為活因勞役飲食失節患頭痛發熱嘔吐無汗初用九味羌活湯一劑微汗出頭痛半止熱亦稍退越五日彼再用豬油煎醋吃復頭痛發熱胸膈脹悶大渴大汗診其脈滑數再以大柴胡入大黃三錢不動渣內又三錢遂得四五次膈寬熱退惟小腹痛群謂是用大黃太過故也豫不以為然再用桂枝大黃湯其家堅不肯服豫告曰彼因下焦有火兼有積食留滯作痛若不滌去終為後患若有疏虞余可力保遂服一大劑復痢黑色穢物半桶其痛遂止衆皆赧然後用調理脾胃藥數劑而安一男子年近三十先患傷寒其人素虛醫者以藥酒煎強發其汗外用繩札其十指刺血遂至汗多亡陽更醫以平補藥劑調半月略好後因過食熟牛肉並汁遂成食後發熱冷汗如雨四肢厥冷上下過於肘膝每厥則陰莖連囊俱縮盡厥回緩則漸伸一日夜三五發又且夢泄無度日間小解後若陽舉其精隨泄出晝則略安夜臥不寐豫診其脈六部皆虛豁如指大重按全無豫曰此陰陽俱虛之極也按經云陰虛則厥陽虛則熱非大補不可遂用人參三錢白朮三錢黃耆二錢歸身一錢五分熟附二錢五分其父云前者分參尚不能服豈能用如許多參且並用附乎堅不肯服豫曰豈不聞先賢云邪輕劑輕邪峻劑峻此大虛必用大補今邪盛正虛而用少參以雜於寒涼藥中宜其服之不效也此藥與症相投若少差誤誰敢為保其家稍解遂煎藥一服是夜遂覺安靜而厥亦減半其父曰神也乃信用此藥調至半月後去附子加參至五錢麥冬一錢五分一月全安一婦人患瘧二日一發已二年矣諸藥不效余診之六脈洪數無力知其氣血虛極也遂用人參白朮各三錢歸黃耆各二錢九稜鱉甲酥炙一錢五分地骨皮一錢青蒿七分熟附子一錢柴胡五分升麻三分服二劑減半四劑全愈一婦人素多惱怒忽患頭痛胸膈連兩脅脹痛者數日又幹嘔服行氣止痛之藥二帖不效反劇余往診之兩寸弦兩關弦帶芤兩尺澀帶數知其積血作脹痛遂用犀角地黃湯加藕節黑梔側柏葉二服略好再以前方加大黃二錢當歸一錢桃仁三十粒不去皮尖研如泥服二劑大便下黑血三五次胸脅頓覺後以八物湯加減調理一月而安一男子因傷署兼勞役患瘧痢並作又噤口余先用枳殼大黃湯一大劑蕩其積熱次用盒臍法吸其熱毒次用胃風湯加肉果黃連地榆煎吞下香連丸如此二服而痢止再以大劑補中益氣加扁豆三倍柴胡山藥鱉甲數服瘧止後以參朮歸耆熬膏調理得痊一婦人年三十餘患哮喘咳嗽氣急痰壅晝夜不能臥一年發三五次遇寒愈甚余初以麻黃石膏杏仁貝母蘇葉青皮枳殼桔梗亭藶子大腹皮四劑而痰喘定再用保和湯加減十餘劑後以清肺丸並真白丸子三藥空心並臨臥時服各半料竟除根一男子年四十餘患傷寒五六日汗下失宜咳逆大作垂死腹急大渴飲水大便稀小便澀少六脈滑數乃熱結中下二焦停飲在上故作咳逆以大劑二陳湯加竹茹一錢五分黃連一錢二分柿蒂二十個煎服二劑遂愈但渴未止再以黃連白虎湯二大劑全安一男子年五十餘素患吐酸嘈雜二月患傷寒兼夾食診之氣口入迎俱大以藿香正氣散服一劑外感已去內傷未除又惹動故積患胃口大痛遂用二陳加吳萸炒黃連香附青皮白芥子官桂黑乾薑炭一劑而痛止次日小腹大痛又用桂枝芍藥湯加大黃枳殼其痛又止又移胸脅背大脹急痛不能點指診之兩關散大知是瘀血遂用桃仁承氣湯連服二劑下紫黑血一二斗背寬而胸脅仍脹口內血腥遂用犀角地黃湯一劑繼用四物加香附童便制丹皮丹參扁柏葉黑梔仁連服數劑得痊以當歸膏一料調理復元一男子年三十餘患傷寒頭痛無汗發熱誤藥失汗熱蘊於內作出遍身紅紫斑遂用防風通聖散去硝黃黃柏活石加牛蒡子二劑熱退斑沒仍虛汗大渴咽喉腫痛再用人參白虎湯加玄參升麻少許二劑而痛渴俱止後用小柴胡湯去半夏加白朮當歸麥冬五六劑而安一婦人年二十六七因惱怒火攻上頸耳頭面俱腫醫家用防風通聖散一劑而腫退越三月發瘧間日一發先寒後熱甚重不知人事將欲垂死豫診之六脈弦緊兩關尤堅徑知其肝木太過而乘脾土故瘧作也先用越鞠二陳湯加柴胡黃芩白芍藥白朮未發日服一劑次用人參白朮柴胡青皮歸身白芍藥黃芩半夏川芎甘草草果烏梅馬齒莧薑棗煎發日五更空心服其瘧當日即止後用四君子湯加當歸白芍藥香附貝母陳皮青皮數劑而安一男子體質素弱三月患傷寒汗吐下俱行脾胃傷損病愈後又失於調理至五月因事勞役一夕忽然暈去手足厥冷不知人事口吐延沫冷汗如雨淮水不入豫診之兩寸浮小兩關浮大如指重按全無兩尺短澀不勻豫告之曰此極虛之候也非大補不能活遂先用荊芥穗五錢加薑汁竹瀝各一盞先灌下稍定再用人參三錢黃耆二錢歸身白朮各二錢五分麥冬一錢五分五味一錢熟附子二錢作大劑煎服連服二劑遂得復生後以十全大補湯去桂加天麻一錢防風八分調養全愈一天長縣鍾水村人年三十餘歲形肥質厚素不嗜酒色偶因勞役繼以外慮忽患中風左手足不遂痰涎壅盛口能言而頭痛如斧劈大小便利診之六脈洪滑有力不數此痰火類中風也遂先用至寶丹丸為引導次用煎藥南星半夏各二錢陳皮白朮白茯苓白芍藥各八分黃芩石膏各一錢當歸一錢五分甘草五分天麻川芎羌活防風各八分殭蠶全蝸紅花各五分作大劑用薑汁竹瀝傳送一服而減半外用滾痰丸下午服後以此方隨症加減數劑全安一少婦稟弱素多病二月初産甚艱後患左胯大痛如雞嘴咬之狀小腹急痛見食氣即吐飲食俱不能進或作血虛治或作鬱火治皆不效一醫作虛治用八物湯用參止五七分多即喘促氣悶皆謂鬱症不宜用參止以四物二陳加香附等藥與八物相間服至三月形體羸憊其痛愈甚請豫視之六脈洪大重按全無乃極虛之候也遂以參三錢耆一錢五分白朮一錢陳皮七分當歸一錢甘草三分白茯苓一錢熟附五分彼力云不宜用參多余解之曰大虛大補小虛小補今大虛而反用小補故邪氣不伏反作喘悶衆皆唯唯遂煎前藥一劑作三次服其痛遂十減其七是夜亦安寢仍以此方服二十劑加參至五錢力得全愈一男子年二十八患疸症遍身面目如金色口渴日潮羸瘦診其六脈輕取浮弦重按短澀前醫家按古法以蒼朮為君加入茵陳五苓散內佐以木通山梔數服不效又一醫以珀琥丸愈劇余診其脈細詢其狀乃知素以酒色並行金水二臟受傷久矣從治其標不治其本病奚能安乃以四物加便制黃柏知母並枸杞麥門冬甘菊花大劑一百餘劑始全愈但兩日昏朦不能見物後用人參固本丸加黃柏知母間以六味地黃加甘菊花各一料相間服後目亦復明身體如舊一男子年四十餘傷酒感寒胃脘痛如刀割嘔吐昏悶七日飲勺不入諸藥服下即吐出頃刻不能留余診之六脈沉微無力知其飲傷於上寒傷於下寒熱相博為關格之症也故諸藥物不納乃先以理中湯加藿香半下陳皮煎一服吞下四積保生錠二丸令以小杯緩服一二時不吐即索粥脈即起後以六君子湯十劑全愈一女年七歲患小腹痛捻上心連兩脅後背俱痛諸藥不效余診視見其面上白點知其蟲痛無疑身極瘦弱不能勝追蟲之劑乃先以理中湯加烏梅川椒連進四服次用檳榔散使君肉煎湯調下乃得全愈仍用參苓白朮散調理一富室少婦因郁久傷血血虛氣滯虛火時動經事兩三月一行每欲行必大痛數日色淡而少下午唇頰赤不發熱中脘痞悶惡食強食即吐診之六脈弦澀兩寸浮滑以六君子湯加厚朴砂仁香附倍之數帖稍安每經前後則用四物湯加木香玄胡索紅花牡丹皮經後用八物湯倍加香附空心服八珍丸加香附沉香益母草膏為丸服半年全愈次年生一子一婦人年近四十八月間生産子死腹中歷八日方産出産後小腹內如梭大一塊直搶上心口痛不可忍至夜尤甚凡醫皆用行血破血破氣香燥之劑愈服愈劇至十一月初豫為診視六脈弦澀而數兩關尤甚知其肝木乘脾中氣下陷乃用理中湯加熟附人參附用一錢一劑繼用加味益母丸一服遂愈後用參朮歸芍為君陳皮香附桂枝沉香為引十餘劑全愈一男子年三十六七素質強健嗜酒因事忤意醉後復大怒遂胸膈窒塞喉中一塊如梅核狀咯不出咽不下診其六脈弦緊而滑兩尺尤大知其伏火鬱痰沖礙清道遂用二陳加山梔白豆蔻蘆根煎服數帖稍寬再用梨汁韭汁蘿蔔汁薑汁萃汁蘆根汁生葛根汁白蜜各一碗八味熬膏外用白朮半斤人參四兩白茯苓四兩為末和勻入灌內鹽泥封固放鍋內煮三炷香取出去火毒每日清晨上午下午滾水調服晚用滾痰丸一錢茶下如此調治半年全安此法治中年膈食皆妙一族叔因事奔走勞役謀慮太過損傷心脾素又有汗經肥氣之疾春初因怒感寒大吐藥食不入診其脈沉遲弦澀不定初醫用香砂養胃湯次半夏竹茹湯加丁香後用治中湯皆不應請余治豫曰煩躁悶亂面青頰赤唇目俱黃脈反沉遲乃陽症得陰脈也法難調治遂先用理中湯參附各用五分探之服下稍安半日後復吐豫堅議欲用附子以回陽抑陰其眷屬倣徨不決賴親友力替遂以參附各三錢加入真武湯內外灸氣海十餘壯且灸且服藥後得汗周身狂燥遂息吐亦尋止但昏沉六日不省人事惟啜飲湯而已至七日方醒此由陰盛於內陽消於外得附子而陽氣初回不定故昏沉耳後以參朮歸耆為君佐以枸杞子麥門冬酸棗仁圓眼肉之類上下午服晨用鹿角膠二三錢調理百日全安
