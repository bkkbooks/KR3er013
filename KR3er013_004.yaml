body:
  text: 卷之四痰門諸痰脈脈滑者多痰脈滑大為痰火寸口洪滑為痰右寸浮滑而疾為痰嗽兩關洪滑而細為胃中濕痰宜下之左寸關弦滑為痰厥頭痛關脈滑大者膈中有痰宜吐之病人諸藥不效兩關脈或伏或大者痰也按經云浮滑為風痰沉滑為痰氣緊滑為寒痰或結或伏為郁痰又曰痰飲又脈弦甚者飲也脈浮滑而緊為痰嗽病人眼皮及眼下如灰煙黑者痰也症按丹溪云有熱痰食積痰風痰老痰寒痰郁痰之異又云諸病尋痰火痰火生異症痰之為物隨氣升降無處不到王節齊云痰屬濕乃津液所化因風寒濕熱之感七情飲食所傷以致氣逆濁液變為痰也或吐咯上出或凝滯胸膈或留聚腸胃或客於脈絡四肢隨氣升降遍身上下無處不到但有新久輕重之殊耳新而輕者形色清白稀薄氣味亦淡久而重者黃濁稠黏凝結咳之難出漸成惡味宜詳辨之治按節齊云痰生於脾胃宜實脾燥濕為主又曰痰隨氣而升宜順氣為先分導次之蓋氣升屬火故順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食積痰則消之在上者吐之在中者下之中氣虛者因中氣以運之若攻之太重則胃氣虛而痰愈甚矣用者詳之方二陳湯痰主方總治一身之痰如要上行加引上藥如要下行加引下藥陳皮和脾消痰溫中去白一錢五分白茯苓利竅行濕和中去皮一錢二分半夏燥濕除痰溫中薑製一錢二分甘草和中瀉火炙三分上作一服姜三片煎不拘時服兼有他症依後加減春月宜加川芎夏加黃連秋加知母冬加生薑熱痰加青黛黃連栝蔞仁枳實各等分濕痰加黃芩蒼朮白朮枳實香附倍半夏余各等分酒痰加青黛栝蔞仁葛粉蒼朮黃連扁豆各等分食積痰加白朮枳實山楂神麯白豆蔻仁各等分風痰加南星白附子殭蠶皂角天麻各等分竹瀝薑汁頑痰加海石栝蔞仁香附青礞石煆金色或煎或丸寒痰加白朮一錢五分薑汁半盞枳殼南星白附子各八分殭蠶牙皂各五分郁痰加蒼朮川芎香附栝蔞仁海石各等分痰厥頭痛加川芎七分石膏一錢五分倍半夏痰因火逆上降火為先加白朮一錢五分枳實一錢黃芩黃連各八分軟石膏煆一錢五分血虛有痰加天門冬麥門冬知母當歸香附栝蔞仁各等分竹瀝一盞姜汗半盞帶血者再加黃芩白芍藥桑白皮各八分眩暈嘈雜者火動其痰也加梔子黃芩黃連白朮各一錢脾虛宜補中氣以運痰加人參白朮白芍藥神麯麥芽各等分兼升提內傷挾痰加人參白朮當歸黃耆白芍藥各等分兼竹瀝一盞薑汁半盞傳送喉中有物咯不出咽不下此痰結也加海石栝蔞仁杏仁桔梗連翹香附玄明粉各等分竹瀝薑汁各半盞痰在脅下加白芥子貝母青皮各等分竹瀝薑汁各半盞風嗽加川芎七分細辛五味各五分款冬花貝母各一錢寒嗽加杏仁麻黃旋覆花貝母桔梗各等分痰嗽加桑白皮杏仁貝母栝蔞仁各一錢五味子五分熱嗽加桑白皮地骨皮天門冬黃芩貝母各等分嗽而脅肋痛加枳殼桔梗香附青黛白芥子各等分傷風咳嗽生痰加黃芩前胡紫蘇桔梗川芎白芷各等分食鬱有痰加南星香附黃連枳實各等分中脘停痰不下作嘔加砂仁黃連枳實各八分薑汁半盞頭眩加川芎白芷天麻各八分寒熱往來屬痰加黃芩八分柴胡一錢嘔逆屬寒加丁香砂仁各七分薑汁一盞屬加黃連薑汁竹瀝脾胃不和加白朮白扁豆砂仁各等分心下怔忡屬痰加麥門冬枳實竹茹各等分脾黃加白朮厚朴蒼朮各一錢草果七分胃脘有熱吞醋吐酸水加黃連吳茱萸炒白扁豆白朮各一錢厚朴蒼朮各八分青皮五分砂仁五分諸心痛並胃脘痛加白芍藥醋炒香附黑乾薑蒼朮厚朴各等分桂少許肥人嘈雜加撫芎蒼朮白朮梔子各等分聞食氣即嘔加砂仁白朮各八分青皮五分鼻塞聲重加麻黃杏仁桔梗桂枝少濕症兼痰加酒芩羌活蒼朮各等分痰流注胸背腰脅作痛加南星蒼朮白朮川芎當歸羌活各八分濕痰成痿加蒼朮白朮黃芩黃柏各等分便濁屬痰加黃柏蒼朮白朮各八分升麻三分柴胡五分赤濁再加白芍藥木通各八分小便不通本方加香附木通煎服探吐即通婦人脾痛後二便不通此痰隔氣聚所致加木通一錢五分煎服再服探吐關格寒在上熱在下有痰本方探吐之項強微動則痛加酒洗黃芩羌活紅花各八分頸下生核屬痰加連翹桔梗柴胡貝母牛蒡子青皮各等分臂下有核作痛加連翹川芎皂角刺防風黃芩各八分蒼朮一錢白芷六分經水過期色淡者痰多也加川芎各一錢腹痛再加白芍藥一錢阿膠八分艾葉七分官桂五分孕婦惡阻本方用半夏曲加砂仁七粒青皮五分血運因氣血俱虛痰火流上作運加芎歸參朮天麻荊芥穗各等分氣虛有痰加參朮各一錢竹瀝一盞薑汁半盞氣實有痰加香附枳殼枳實各一錢荊瀝一盞薑汁半盞血虛有痰加當歸天門冬知母栝婁仁香附童便制各一錢血實熱有痰加黃芩白芍藥桑白皮各一錢俱用竹瀝薑汁脾虛者宜補中益氣以運痰加參朮歸耆各一錢白芍藥八分升麻三分柴胡五分痰在脾里膜外或四肢經絡之中俱加貝母白芥子各一錢竹瀝一盞韭汁薑汁各半盞以開之小兒驚風多痰加南星白附子天麻全蠍殭蠶牙皂薄荷各七分薑汁竹瀝共一盞小兒尾骨痛有痰加知母黃柏澤瀉各八分前胡五分木香三分中脘痰火吐酸水加黃連吳萸炒錢青皮六分白朮一錢二分乾薑三分痰膈加貝母香附黃連吳萸炒一錢木香五分扁豆八分蘆根汁二盞竹瀝一盞薑汁半盞痰流注經絡臂膊腰腿作痛加南星蒼朮烏藥各一錢羌活木香各七分當歸白朮各一錢五分白芥子八分諸痰火加貝母黃芩黃連白朮枳實各等分或煎或丸痰火鬱於喉內作痛加貝母黃芩黃連山豆根玄參桔梗各等分甘草生三分痰火妄行迷塞心竅身熱狂言如見鬼神者加黃芩黃連枳實各一錢石膏二錢甚者加大黃三五錢下之諸癇症加黃連南星川芎白附子各一錢雄黃辰砂各五分為末後放入哮喘加麻黃一錢五分杏仁一錢桔梗桑白皮各七分貝母一錢二分石膏二錢五分諸瘧皆屬於痰俗云無痰不作瘧加柴胡青皮各一錢常山一錢二分草果七分烏梅五個作嘔加藿香扁豆生薑各等分吞酸加黃連吳萸炒一錢枳實八分頭風加川芎當歸天麻荊芥穗防風各等分眉骨痛屬痰兼火加黃芩白芷蔓荊子各等分中風痰涎牙關緊急加南星白附子天麻防風各一錢竹瀝薑汁皂角七分中痰加同上痰厥加當歸白附子各一錢桂枝牙皂乾薑炒黑各五分竹瀝薑汁蔥汁各一盞上二陳湯加減方法也須量病人虛實斟酌用之庶無差忒用者宜致思焉郁門諸郁脈郁脈多沉弦或結伏又沉澀為血鬱沉伏為氣鬱沉細為濕鬱沉數為熱鬱沉滑為痰鬱氣口緊盛為食鬱又憂鬱則脈澀怒鬱則脈弦思鬱則脈緩時一止名曰結脈症丹溪云氣血沖和百病不生一有拂鬱諸病生焉又云諸病皆生於郁治之可開注云郁者結聚不得發越也當升不升當降不降當變化不得變化故傳化失常而鬱病作矣大抵諸病多有兼郁者或郁久而生病或病久而生郁凡治氣血痰火之病必兼鬱而治之斯無憋矣治經云木鬱則達之謂吐之令其條達也火鬱則發之謂汗之令其疏散也土鬱則奪之謂下之令無壅滯也金鬱則泄之謂滲泄解表利小便也水鬱則折之謂抑之制其升達也此治郁大法惟火所屬不同隨其經而治之故曰火鬱則發當看何經隨其經而治之也丹溪云郁病有六氣血痰濕熱食也氣鬱則開之其症胸脅痛脈沉而澀者是也血鬱則行之或消之其症必能食便紅四肢無力脈沉澀是也痰鬱則消而導之其症動則喘寸口脈沉而滑是也濕鬱則燥之利之其症周身走痛或關節痛陰寒則發脈沉細而濡是也熱鬱則清之其症目瞀小便赤煩咳脈沉細而數是也食鬱則消之其症噯酸腹飽不能食左寸脈平和右寸脈緊盛是也假令食在氣上氣升則食自降余仿此凡久惡寒亦須解鬱郁開病亦隨愈方越鞠丸郁主方解諸郁清熱消痰順氣蒼朮寬中燥濕去蘆一錢五分神麯消食下氣炒一錢川芎和血順氣去蘆一錢香附開鬱散結童便浸醋炒一錢五分山梔清熱利痰降火炒一錢二分上作一服水煎或為末水為丸如緑豆大每服八十丸白湯送下蓋氣血痰三症多有兼郁而鬱有六隨症加減凡諸郁春宜加防風夏加苦參秋加吳茱萸冬加吳茱萸乾薑炭氣鬱加白朮陳皮各八分木香檳榔各七分烏藥一錢虛者兼用四君子湯血鬱加當歸白芍藥各一錢桃仁紅花青黛鬱金各八分虛者兼用四君子湯痰鬱加南星牛膽制海石栝蔞仁各一錢貝母一錢五分桔梗七分白芥子八分痰盛者兼用二陳湯濕鬱加防風白芷羌活白茯苓各八分倍蒼朮熱鬱加黃連吳茱萸炒八分青黛八分甚者加酒蒸大黃二錢五分食鬱加山楂神麯各一錢五分砂仁陳皮枳實各八分針砂一錢醋炒木鬱用梨蘆或瓜蒂散吐之吐後以本方加白朮陳皮白芍藥各一錢青皮五分火鬱本方加防風羌活柴胡葛根各八分升麻五分發之冬月再加麻黃一錢五分蔥白三根土鬱用桂枝芍藥厚朴陳皮枳殼各等分大黃三錢下之下後以四君子湯加芍藥香附陳皮調理金鬱加茯苓澤瀉各一錢利之水鬱加白朮一錢五分陳皮大腹皮各一錢青皮五分紫蘇梗六分怒郁左關脈弦加木香檳榔青皮白芍藥各等分思郁右關脈結加白朮陳皮石菖蒲各一錢木香沉香各五分憂鬱右寸脈短澀加貝母一錢五分陳皮枳實烏藥蘇子各八分木香檳榔各五分寒鬱加吳茱萸乾薑各八分木香沉香各五分蔥白三節悲哀太甚而鬱加貝母一錢五分茯神遠志石菖蒲木香砂仁各七分右越鞠丸加減方法也須量虛實新久斟酌用之庶無誤矣補門諸虛脈形大力薄為虛損浮大無力為陽虛細數無力為陰虛寸脈浮軟而弱為上虛尺短澀而微為下虛左尺短澀不均為血虛右寸沉微為氣虛六脈細微者盜汗六脈細數者潮熱右關脈弦大為脾虛又男子右尺脈細微如絲者為陽衰精竭女人左尺細微如絲者為陰衰經閉皆不治也症按集成云虛損之症皆由色欲過度喜怒不節起居不時飲食失宜有所勞傷皆損其氣血蓋氣衰則火旺火旺則乘其脾土而胃氣散解不能滋營百脈灌溉臟腑衛護周身故虛損之症生焉病則百脈煩疼腰痛腳軟胸滿短氣心煩不安耳鳴目眩咳嗽寒熱交作自汗盜汗遺精白濁飧泄食少食亦無味不長肌膚或睡中驚悸午後發熱倦怠無力女子則崩漏帶下經閉不行咳嗽吐血發熱皆虛損之候也治經云虛者補之損者益之又云形不足者溫之以氣參朮茸附之類精不足者補之以味鹿角膠地黃之類氣虛則補氣普用四君子湯血虛則補血兼用四物湯氣血俱虛十全大補湯痰嗽者清肺麥門冬黃芩貝母之類陰虛發熱者滋陰降火黃柏知母地骨皮之類用者詳之方十全大補湯治氣血虛損隨症輕重加減人參二錢五分白朮三錢黃耆一錢五分蜜炙甘草四分白茯苓一錢二分川芎七分當歸一錢五分熟地黃一錢白芍藥一錢二分桂三分如虛甚者加熟附一錢以行參耆之功上用薑棗煎食遠服老人但覺小水短少即是病進本方去黃耆熟地甘草加牛膝陳皮春倍川芎夏加麥門冬一錢黃芩八分秋冬加炒黑乾薑五分倍當歸此丹溪先生養母之法也男婦大病後氣血虛損脾胃不足本方去芎桂加山藥陳皮麥門冬各等分男子真陰虛損加黃柏知母麥門冬地骨皮各等分婦人胎産虛損本方去桂加香附一錢五分煎調鹿角膠服大吐血後虛損加麥門冬側柏葉各一錢去黃耆川芎桂男子遺精白濁或夢遺精滑加黃柏知母俱童便浸炒各一錢山藥芡實鹿角霜各一錢五分龍骨五分婦人赤白帶下日久或湛濁黃瘦潮熱加升麻柴胡各五分男婦心虛手振加麥門冬酸棗仁天麻各一錢白芷五分去桂心脾血虛晝則怠墮嗜臥夜不能寐加麥門冬酸棗仁山藥各等分遠志減半圓眼肉五個去芎桂健忘怔忡加麥門冬陳皮竹茹各等分去芎桂腳軟無力加牛膝黃柏木瓜防己去川芎各等分脾胃虛弱畏寒易泄加陳皮一錢乾薑五分倍白朮去川芎當歸地黃肝虛眼目昏暗加黃連扁豆甘菊花各等分去耆桂男子左尺既虛右尺亦微命門火衰陽事不舉加熟附子一錢沉香五分氣血兩虛眩運加半夏天麻各一錢自汗盜汗加麻黃根一錢五分去桂婦人胎産有汗加同上瘡瘍潰後或平後氣血俱虛用本方加防風八分去桂婦人産後諸疾加黑乾薑八分去芍藥産後惡露不行腹疼加牡丹皮紅花乾薑炒各八分去參耆産後惡露不止加赤石脂續斷地榆各等分婦人胎動或痛或漏加黃芩枳殼阿膠艾葉砂仁各等分去桂婦人經水澀少或行或作痛氣血虛也用本方小兒諸疳加胡黃連使君肉山楂蘆會各等分去黃耆桂川芎或丸或散皆可此十全大補湯加減法也又方加減人參固本丸養心補脾清肺滋腎天門冬去心二兩麥門冬去心二兩生地黃二兩山藥一兩五錢枸杞子一兩去梗五味子去梗五錢熟地黃二兩四錢另用酒煮人參一兩去蘆上五味正方黃柏四制一兩五錢知母同上制一兩五錢上為末煉蜜為丸如梧桐子大每服九十丸空心白湯送下兼有他症依後加減有汗加黃耆知母各一兩有痰火加貝母黃芩各一兩二錢遺精白濁夢遺加鹿角膠鹿角霜菟絲子各一兩山茱萸一兩五錢龍骨五錢上熱下寒加附子制一兩乾薑五錢炮沉香三錢陰虛火動加知母龜板各一兩五錢虎脛骨牛膝各一兩咳嗽加知母貝母當歸各一兩五錢阿膠杏仁各一兩俱妙吐血加牡丹皮紫菀薏苡仁各一兩腰痛加杜仲破故紙肉蓯蓉各一兩下元虛冷陰痿加熟附子一兩桂五錢腳膝無力加牛膝木瓜虎脛骨各一錢眼暗或翳膜失明加白芍藥當歸甘菊花各一兩五錢川芎黃連各一兩生甘草四錢一方加犀角羚羊角各八錢決明子青葙子菟絲子石斛枳殼各一兩名固本還睛丸治肝腎虛損眼疾有效命門火衰陽事不舉精氣虛竭加熟附一兩五錢鹿茸一兩沉香五錢男婦上盛下虛久無孕育加熟附鹿茸巴戟牛膝各一兩海狗腎一副婦人再加當歸蘄艾香附各一兩五錢又方六味地黃丸治男婦腎虛寢汗潮熱煩蒸骨痿婦人經水不調赤白帶下山藥二兩山茱萸去核二兩白茯苓去皮牡丹皮去木澤瀉各一兩五錢淮慶熟地黃四兩酒煮搗爛上為末蜜丸梧了大每服九十丸空心清米湯送下下焦虛寒加熟附一兩桂心一錢名八味丸上焦熱加麥門冬一兩五錢去心五味八錢下部濕熱加木瓜黃柏蒼朮各一兩五錢又方大造丸治男婦諸虛百損五勞七傷此身衰以類補之義也夫紫河車者即胎衣也一名混沌皮蓋兒在胞中臍繫於胞受胞之養胞系母腰受母之陰丹經云父精母血相合而成乃受造化生成之物真元氣也人從此生用以補人固非草木金石所可比也古方治虛勞甚者用之良有以也但非常得之物或者有所嫌忌故世人不知用耳一族兄其虛弱僅存形跡面色痿黃以此味配諸藥為方名大造丸服之不二料而體貌頓異後連生四子一婦人年僅六十時以衰憊因病合此丸加血藥服之而強健自此每自制服紫河車殆有百餘料壽至九十勝中年人物且以其藥散諸親屬取濟甚衆一人大病愈後久不作呼聲服此藥不久而呼聲出矣一人足不能履地服此藥半年而能行矣大抵此藥用於女人尤妙豈紫河車本自出而各從其類焉者耶若女人月事不調兼小産難産及多生女少生男者夫婦服之而生子者歷歷可數制方又另有法又有隻用紫河車一味為丸治失心風膈症無不應驗臨危將絶氣者紫河車首經二味為丸一服可更活二三日蓋此補益之功極其至妙用之百法百中有不期然而然者矣久服耳聰目明鬢烏髮黑延年益壽有奪造化之功豈但小補已哉故曰大造丸合諸藥亦有至理詳注於後紫河車一具須男用女胎女用男胎初産甚妙其次壯盛婦人亦可用米泔水洗淨新瓦上焙乾敗龜板用大的年久自死者佳以童便浸三七將酥炙黃色淨用板二兩此藥大有補陰之功又能補心黃柏用鹽酒炒褐色淨用一兩五錢蓋邪火止能動物不能生物欲用陽藥滋補非徒無益而為害匪輕此藥能滋腎水配前藥滋陰補腎之最者也用為紫河車之佐不亦宜乎桂仲用酥炙去絲淨用一兩五錢此藥主腎虧損腰痛餘瀝牛膝去蘆酒浸曬乾淨用一兩三錢此下部藥引諸藥下行為使者也合前四味足少陰腎經藥也古方加陳皮名滋腎丸加紫河車名補天丸是也地黃用肥大沉水懷慶出者佳蒸熟焙乾淨用二兩五錢入砂仁末六錢白茯苓二兩作一塊用稀絹包入銀罐內用好酒煮七次去砂仁茯苓只用地黃蓋地黃得砂仁茯苓及黃柏則入少陰腎此四味名天一生水丸祕而不傳如無銀罐瓦罐代之天門冬去心一兩二錢麥門冬去心一兩二錢夏加五味子去梗七錢人參去蘆一兩前四味入手太陰肺經藥也二門冬保肺氣不令火邪侵降肺下行生腎源其性有降無升得人參則補而降本草云多主生子此也古方加生地黃名固本丸又麥門冬五味子三味名生脈散此方配合之道專以補元氣為主要得首經二盞最為生化之源用補肺腎二經得人參補氣地黃補血紫河車以成大造也凡藥須擇新鮮真正道地者而製藥又須如法不則無效上藥除地黃另用木臼搗之各藥共為細末酒打米糊為丸共搗千餘下丸如梧桐子大每服八九十丸空心及臥時用清米湯或薑湯白湯鹽酒送下婦人服之加當歸二兩去龜板若男女患怯症者去人參如有遺精白濁並婦人赤白帶下加牡礪煆粉一兩五錢又方斑龍丸治真陰虛損老人虛弱尤宜常服鹿角膠十兩鹿角霜十兩白茯苓去皮五兩柏子仁去殼淨炒十兩菟絲子酒浸蒸搗為餅曬乾淨用十兩熟地黃十兩懷慶肥大者酒煮搗膏補骨脂炒五兩上為末以鹿角膠用好酒二大碗洋化為丸如梧桐子大每服七十丸漸加至九十丸空心清米湯送下鹽湯亦可熬鹿角膠霜法用新鹿角三對重十斤將角鋸二寸長一段於長流水內浸三日刷去塵垢如無長流水以大鉢頭浸日三次換水亦可每角十斤用黃蠟五兩桑白皮十兩楮實子二十兩新汲水四十碗共入瓦壇內用桑柴一百二十斤熬煉三晝夜水乾旋添熟水勿令露角三日後取出將細布絞淨其角汁用文火收之滴水成珠即成膠其枯角曬乾磨為末即成霜也大病後極虛之人用人參一兩鹿角膠五錢煎服亦大補益産後加當歸同煎亦妙老人加白茯苓亦效一法每角十斤制如前裝入鉛壇內放入釜中著水浸過壇口下五六寸封蓋令密用桑柴煮七晝夜每日添熟水一次待七日滿取出濾去渣將清汁另放一處再用人參十兩甘州枸杞二十兩另用水二十碗同熬約干將藥渣絞淨復將渣舂碎再用水十五碗又熬干濾淨將二汁和前鹿角汁一處以白炭火緩緩熬至滴水成珠不散用瓷罐收貯每服一二錢空心白湯點服治虛勞損極效附載名方風門方計方九條大秦艽湯治血虛中風及一切血虛風症川芎川歸白芍藥羌活獨活防風黃芩白朮白茯苓各一錢細辛五分白芷生地黃熟地黃各八分秦艽天麻各一錢五分上作一服姜三片煎溫服如天陰雨加姜七片春夏加知母一錢羌活愈風湯治中風內外邪已除宜服此藥以行導諸經久服大風悉去初覺風動服此不致倒僕羌活甘草蔓荊子川芎防風細辛枳殼人參麻黃枸杞甘菊花薄荷黃耆前胡地骨皮黃芩獨活川歸知母厚朴柴胡半夏杜仲白芷熟地防己各一錢白茯苓秦艽白芍各一錢五分石膏生地黃蒼朮各二錢桂心五分上作一服水二鍾姜五片煎空心服吞下二丹丸為之重劑臨臥時服渣吞下四白丹為之輕劑動以安神靜以清肺假令一氣之微汗用愈風湯三兩麻黃一兩作四服一服後以粥投之得微汗則佳如一旬之通利用愈風湯三兩大黃一兩亦分四服臨臥時一服得微利為妙常服之藥不可失四時之轉運如春初大寒之後加半夏一錢木通二錢柴胡人參各一錢此迎而奪少陽之氣也夏加石膏黃芩知母各一錢此迎而奪陽明之氣也季夏加防己白朮各一錢茯苓一錢五分以勝脾土之濕也秋加厚朴一錢藿香五分桂三分此迎而奪太陰之氣也冬加附子五分桂三分當歸一錢以勝少陰之氣也此四時加減之法也三化湯治中風外有六經之形症先以續命湯隨症治之內有便溺之阻隔後以此湯導之厚朴薑製大黃枳實羌活各等分上每服一兩姜三片煎服桃仁承氣湯治血症小腹急胸脅脹痛宜此下之桃仁二十枚桂枝一錢芍藥一錢五分甘草五分大黃三錢芒硝七分上作一服姜煎先煎藥熟後入芒硝溶化服烏藥順氣散治中中風順氣疏風麻黃陳皮烏藥各一錢殭蠶川芎枳殼甘草炙白芷桔梗各八分乾薑五分上用薑棗水一鍾半煎八分食遠溫服瓜蒂散治中風痰涎塞盛以此吐之瓜蒂赤小豆各等分上各研為細末合和再研勻每服一錢以香豉一合水一鍾煎七分調下取吐為度蘇合香丸治中風順氣化痰並治傳尸瘵疾鬼疰瘴瘧瀉痢赤白小兒驚風等症沉香丁香訶梨勒煨用皮麝香青木香安息香另為末用無灰酒一升熬膏香附子炒蓽茇白朮白檀香各二兩薰陸香另研蘇合香油和入安息香膏內龍腦另研各一兩硃砂另研飛過烏犀角鎊各一兩上藥和勻用安息香膏並煉蜜和丸如芡實大蠟包每服大人一丸小兒半丸隨症調引下硃砂安神丸治心風失志健忘言語錯亂硃砂七錢另研黃連膽汁炒一兩當歸一兩甘草三錢上用淮生地黃二兩熬膏入少蜜為丸金箔為衣丸如緑豆大每服三十丸蓮子湯下牛黃清心丸治風熱驚風南星制半夏曲各一兩甘草五錢牛黃一兩另研辰砂七錢另研雄黃五錢另研麝香三錢另研人參一兩五錢白朮一兩五錢白茯苓一兩五錢山藥四兩黃連膽汁炒一兩五錢當歸川芎麥冬防風白芍藥各一兩黃芩柴胡杏仁桔梗各八錢犀角末七錢大棗五十個乾薑五錢肉桂五錢金銀箔各五帖龍腦一錢珍珠五錢另研琥珀五錢另研羚羊角末七錢上藥除另研外余共為細末薄荷二兩麻黃三兩熬膏入煉蜜為丸如芡實大硃砂金箔為依每服大人一丸小兒半丸隨症調引下寒門方計方三十條人參白虎湯治傷寒煩渴不已石膏八錢知母五錢甘草一錢五分人參三錢上作一服入粳米半合同煎服小柴胡合白虎湯即小柴胡湯加石膏知母粳米是也黃耆建中湯黃耆蜜炙芍藥各二錢五分桂枝一錢五分甘草一錢五分上作一服薑棗煎臨熟加飴糖三茶匙同服小承氣湯治傷寒五六日不大便腹脹滿不惡寒潮熱狂言而喘大黃三錢厚朴一錢五分枳實二錢上作一服姜三片煎將熟後下大黃同煎一二沸溫服大承氣湯治胃實譫語五六日不大便腹滿煩渴並少陰舌乾口燥大黃五錢或七錢厚朴五錢枳實二錢芒硝一錢上作一服硝黃後下煎法同前小陷胸湯治小結胸黃連三錢半夏六錢栝蔞仁去殼三錢上作一服姜五片水二鍾煎至一鍾通口服大陷胸湯治傷寒五六日不大便舌乾煩渴日晡潮熱心下至小腹硬滿而痛手不可按此大結胸也以此下之大黃量虛實虛者三四錢實者六七錢煨用芒硝虛者一錢實者二錢甘遂另為末虛者五分實者一錢上作一服先用水一鍾煎大黃至七分次下芒硝再煎一二沸去渣入甘遂末和勻溫服如人行十里若