四肢厥而手足爪甲青症集成云中寒者寒邪直中三陰也非比傷寒邪從外循經而入以麻桂輩微表而安以病不甚虛也中寒則倉猝感受因其腠理疏豁一身受邪難分經絡無熱可散溫補自解此大虛也不急治即死矣大抵一時為寒所中則昏不知人事口噤失音四肢僵直攣急疼痛或浙浙惡寒或翕翕發熱汗出或唇青厥逆中脘及臍腹疼痛此皆中寒之候也治蘊要云寒中太陰則中脘疼痛宜理中湯加附子寒中少陰則臍腹疼痛宜五積散加吳茱萸寒甚脈沉足冷者四逆加吳茱萸厥陰則小腹疼痛宜當歸四逆湯加吳茱萸甚者倍加附子如極冷唇青厥逆無脈濃縮者用蔥尉法或茱萸炒尉並灸臍中及氣海開元二三十壯待脈漸應手足溫暖乃可生也如倉猝無藥急用茱萸一合煎濃湯灌下亦妙大抵寒者溫之治宜姜附等藥以散寒氣不可妄施吐下如舌卷囊縮者不治方附子理中湯治中寒及一切寒症隨症加減用人參二錢白朮二錢甘草五分乾薑炮二錢附子麵包煨二錢上用水一鍾半煎至八分食遠服寒中太陰依本方寒中少陰加吳茱萸二錢寒中厥陰加當歸芍藥桂枝各一錢五分吳茱萸二錢沉寒痼冷加丁香一錢官桂一錢五分沉香七分心腹冷痛加官桂吳茱萸白芍藥玄胡索各一錢五分木香一錢胃寒咳逆加丁香一錢柿蒂一錢五分婦人血虛寒加當歸官桂艾葉吳茱萸各一錢五分益志一錢男婦下元冷極久不孕育加鹿茸官桂茱萸各一錢五分蘄艾一錢沉香一錢久瀉元氣虛脈微欲絶者加黃耆二錢小兒冷瀉加肉豆蔻一錢五分丁香七分腳膝冷痛加鹿茸牛膝官桂各等分或丸或煎腰冷如冰加鹿茸杜仲破故紙肉蓯蓉各等分或丸亦可精清如水精冷如冰加肉蓯蓉韭子鹿茸各等分海狗腎一具溫疫大頭病附脈脈訣云瘟病之脈散而難名如太陽脈浮陽明脈長少陽脈弦太陰脈細少陰脈沉厥陰脈微緩之類又云陽脈濡弱陰脈弦緊更遇溫氣變為瘟疫陽脈洪數陰脈實大更遇溫熱變為瘟毒者危凡瘟病大熱脈沉澀細小足冷難治洪大有力或浮大者可治脈不浮者為傳染若左寸浮大右寸浮緩而盛按之無力者宜補中帶表而治之症夫瘟疫之症多由房勞太過腠理閉泄少陰不藏觸冒冬時殺癘之氣嚴寒之毒中而即病曰傷寒不即病者寒毒藏於肌膚至春變為瘟病至夏變為熱病也又有時行不正之氣如春應暖而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫此非其時而有其氣是以一歲之中無分少長病皆相似者此則時行之氣即瘟疫也外症頭痛壯熱口渴不惡寒治丹溪云治法有三有宜補宜散宜降人參白朮防風羌活蒼朮並大黃黃芩黃連石膏活石人中黃之類主之又吳氏云凡尺寸脈浮者發於太陽也宜人參羌活散加葛根紫蘇蔥白生薑以汗之或有自汗身疼者九味羌活湯主之尺寸俱長者陽明也宜葛根解肌湯或十味芎蘇散汗之尺寸俱弦而數者少陽也宜小柴胡加減主之如兼太陽羌活散加柴胡黃芩兼陽明小柴胡加葛根升麻主之抑考瘟病先因傷寒熱未除更感時行之氣而為瘟疫也治與傷寒不同蓋瘟病因春時溫氣而發初非寒傷於表也乃鬱熱自內而發於外故宜辛平之劑以發散之況時令已暖不可用麻黃如時令尚寒少佐之亦可凡瘟病發於三陽者多三陰者少若發於三陰者必有所因也或食寒物內傷太陰而得之或因過欲先傷少陰而得之治制皆與傷寒各條同惟發表不同耳又有大頭天行病乃濕熱在高巔之上並陽明邪熱大甚資實少陽相火而為之視其腫勢在何部隨經治之用防風羌活酒芩酒蒸大黃隨病加減治之不可用降藥方人參敗毒散治瘟疫及大頭病初感服此藥散之人參一錢五分白朮二錢白茯苓一錢甘草五分羌活一錢五分防風一錢五分柴胡一錢五分前胡一錢黃芩一錢枳殼八分蒼朮一錢二分桔梗七分上作一服用生薑三片棗一枚水二鍾煎一鍾熱服微汗為度又方三黃石膏湯治疫症燥渴將欲發狂者石膏三錢黃芩黃連黃柏各一錢五分麻黃一錢五分寒用多暖用共之山梔一錢熱甚者加大黃三錢上用水二鍾粳米一撮煎服連進三五服即愈又方普濟消毒飲子治瘟疫熱毒清熱解毒大頭病頭面腫亦可服柴胡一錢五分黃連炒黃芩炒玄參生甘草桔梗連翹鼠黏子白芷馬勃川當歸各一錢殭蠶七分升麻七分板藍根一錢如無以藍葉代之或真青代亦可上作一服姜三片水煎徐徐服如虛加人參一錢五分大便祕加酒蒸大黃二錢又方闢瘟丹凡春夏秋間預服以免疫氣傳染或初感服此藥得小汗亦愈防風去蘆一兩五錢川芎當歸白芍藥白朮麻黃石膏滑石黃芩連翹梔子各一兩桔梗荊芥薄荷各八分玄胡粉一兩五錢大黃煨二兩鬼箭羽馬勃管仲各一兩二錢上為細末臘雪水或冰水為丸如彈子大每服一丸薑蔥湯下得周身微汗即解此藥用五月五日六月六日或冬至臘日焚香禮斗至誠修合無不應驗合時忌與婦人雞犬孝子見之內傷脾胃附脈脈大而無力為內傷氣口脈大於人迎二倍或三倍其急大而數重按無力為勞後內傷右關脈弦滑而沉或弦大而數或浮滑而疾者為飲食內傷也右關弱甚或隱而不見者為脾胃虛損也左關脈緩右關脈弦者為肝木乘脾土也右關脈數為胃熱弦滑為胃寒脈結為思傷脾也症謹按東垣論人迎脈大於氣口為外傷氣口脈大於人迎為內傷外傷則寒熱齊作而無間內傷則寒熱間作而不齊外傷惡寒雖近烈火不能除內傷惡寒得就溫暖則解外傷惡風乃不禁一切風寒內傷惡風惟惡些小賊風外傷症顯在鼻故鼻氣不利而壅盛有力內傷症顯在口故口不知味而腹中不和外傷則邪氣有餘故發言壯厲且先輕而後重內傷則元氣不足出言懶怯且先重而後輕外傷手背熱手心不熱內傷則手心熱手背不熱東垣辨法大略如此有內傷而無外感有外感而無內傷以此辨之則判然矣又王節齊云東垣以飲食勞倦傷為內傷不足之病謂因傷飢失飽傷損脾胃所致蓋人之所藉以生者脾胃為本必賴飲食滋養若調養失宜勞後過傷失其所養則脾胃氣虛不能升達降下陰分而為內熱非有飲食停蓄者也故用補中益氣等藥若飲食停積不化郁發為熱乃是不足之中繼之有餘此為飲食所傷宜消導之又或先因飲食而後犯於房勞或先因勞役而後犯於飲食此皆不足之中兼之有餘須於數者之間審察明白也治丹溪云世之病此者為多但有挾痰者有挾外感者有熱鬱於內而發者有飲食所傷者皆以補元氣為主看所挾而兼用藥挾痰者補中益氣加半夏以薑汁竹瀝傳送挾外感者補中益氣加發散如防風羌活白芷之類挾食者補中益氣加消導如山楂枳實之類氣虛熱甚者少加附子以行參耆之功又盧氏云若內傷外感兼病而相合者則其脈症必並見而難辨尤宜細密求之若顯內症多者則是內傷重而外感輕宜以補養為先而發散次之若顯外症多者則外感重而內傷輕宜以發散為急而補養次之此東垣未之及也因並贅於此用者詳之方補中益氣湯治勞役所傷時作虛熱四肢無力怠惰嗜臥人參去蘆一錢五分黃耆一錢五分蜜炙甘草五分陳皮八分當歸一錢二分白朮一錢二分升麻四分柴胡五分上作一服姜一片棗一枚水二鍾煎八分食遠服氣血虛甚者加熟附子一錢五分以竹參耆之功陽旺則生陰也挾外感加防風羌活各一錢五分乾葛白芷川芎各八分倍柴胡挾痰者加半夏一錢五分茯苓一錢薑汁半盞竹瀝一盞兼鬱熱者加川芎山梔香附各等分腹中痛者加白芍藥一錢二分官桂六分腹中惡寒冷痛者加桂心五分腹中惡熱喜寒而痛者加白芍藥一錢二分黃芩八分夏月腹痛不惡熱加炒黑乾薑七分藿香一錢薄桂三分天時熱腹痛者加白芍藥山梔各一錢桂三分天時寒腹痛加半夏一錢益智仁八分乾薑五分桂三分頭痛加蔓荊子川芎各八分細辛五分頂腦痛加藁本七分諸頭痛並用此四味足矣臍下痛甚者加熟地黃一錢其痛立止如不止者乃大寒也更加桂心五分咽乾加葛根七分麥門冬一錢心下刺痛加香附一錢當歸倍用精神短少加麥門冬一錢五分五味子七分夏月亦加救天暑傷庚金有痰嗽加貝母杏仁栝蔞仁款冬花各一錢去參耆虛者勿去咳嗽春加款冬花佛耳草各一錢川芎五分夏加麥門冬一錢五分五味子五分或七分秋冬加連節麻黃一錢久嗽肺中伏火去人參黃耆加石膏一錢五分黃芩一錢食不下乃胸中有寒或氣澀滯加青皮七分木香五分陳皮一錢冬月更加草豆蔻益志各五分夏月更加姜炒芩連各七分秋月更加檳榔砂仁各五分春月更加川芎藿香各七分心下痞滿加枳實黃連各八分白芍藥一錢桂二分腹脹加枳實八分木香砂仁各五分厚朴七分秋月加乾薑肉桂各五分去甘草脅痛或急縮春月乃肝木盛以致生火加青皮枳殼各一錢倍柴胡余月加山梔蒼朮香附貝母各一錢青皮枳殼黑乾薑各五分大便祕加當歸一錢五分桃仁一錢大黃煨二錢腳軟乏力或痛加黃柏防己各一錢桂三分時時發熱乃下元陰火蒸發也加生地黃一錢黃柏八分大便虛坐或了而不了腹中迫急氣虛血澀也加木香檳榔各五分倍用當歸身熱沉重雖小便多亦加茯苓澤瀉各七分黃柏五分蒼朮一錢脾胃不和加茯苓半夏各八分砂仁扁豆各六分生薑三片注夏加白芍藥茯苓黃柏各八分厚朴蒼朮各一錢去柴胡升麻痰厥頭痛此太陰脾經所作也加半夏石膏各一錢五分川芎八分薑汁二匙蔥汁二匙若挾外感重以本方加本經發散之藥治之如見太陽症加羌活藁本桂枝各等分如見陽明症加葛根一錢倍升麻如見少陽症加黃芩半夏各一錢川芎八分倍加柴胡一錢如見大陰症加枳實厚朴各一錢如見少陰症加栝蔞根一錢生甘草五分如見厥陰症加川芎一錢若變症發痰加玄參乾葛各一錢倍升麻思慮傷心脾神氣不安夜臥不眠加茯神八分遠志六分麥門冬酸棗仁各一錢辰砂七分為末臨服投入圓眼五個自汗加桂枝七分浮麥一撮盜汗加知母麥門冬麻黃根各一錢骨蒸勞熱日久虛損加牡丹皮地骨皮黃柏知母熟地黃各八分倍柴胡去升麻久患冷瀉冷痢或元氣下脫者加乾薑炒黑五分熟附八分肉果一錢如身有疼痛及身腫或風濕相搏一身盡痛者加羌活防風藁本各一錢升麻蒼朮各八分勿用五苓散所以然者蓋風藥已能勝濕故別作一服與之如病去勿再服蓋風藥能損人元氣故也如心下痞脈遲緩加半夏黃連枳實各八分如脈弦四肢滿閉便難而心下痞加柴胡黃連各八分青皮五分心下痞而嘔逆加生薑二片黃連陳皮八分冬月加藿香丁香七分心下痞腹中氣上逆者是衛脈逆也加黃柏五分黃連五分中脘當心痛加草豆蔻仁冬一錢夏五分多吐白沫胃口上停寒也加益智仁八分如救胸水瀉伏火加白芍藥一錢黃連五分秋冬不用男婦發熱或捫之而肌表熱者此表症也只服本方二三服得微汗則涼矣又方香砂養胃湯治飲食所傷脾胃不和四肢困倦發熱人參一錢白朮一錢五分茯苓八分陳皮八分半夏八分甘草三分厚朴八分蒼朮八分藿香八分砂仁七分枳殼八分桔梗七分上作一服姜二片棗一枚水一鍾半煎八分食遠服傷酒頭痛嘔吐加黃連扁豆川芎各八分葛根一錢二分傷肉食加草果枳實山楂麥芽各八分砂仁五分傷豆粉面食辛辣濕熱之物加黃連連翹山楂麥芽各八分神麯八分砂仁六分傷生冷西瓜乳酪寒濕之物加川烏防風各五分砂仁白豆蔻仁各七分丁香四分乾薑五分山楂一錢飲食間著惱悶不快加香附一錢木香青皮檳榔各五分濕痞滿悶加澤瀉蘿蔔子各八分病後多食心煩加山梔一錢黃連枳實各五分食積作痛或痞積氣塊加三稜莪朮各八分枳實官桂白芍藥香附各一錢木香檳榔各五分翻胃吐後作痛加半夏曲大腹皮木香乾薑二味減半扁豆茱萸炒過黃連各一錢青皮五分又方平胃散去濕強脾健胃厚朴一錢蒼朮一錢五分陳皮一錢甘草五分上作一服姜一片紅棗一枚水一鍾半煎八分食遠服濕傷脾胃或久瀉久痢胃弱者加人參白朮各一錢五分白茯苓一錢四時泄瀉加茯苓一錢澤瀉訶子肉果各八分冬月加乾薑五分四時赤白痢疾加木香檳榔各七分黃連枳殼肉果各八分四時瘧疾加白朮人參半夏柴胡黃芩各一錢檳榔草果青皮烏藥各八分烏梅三個欲截再加恆山一錢二分風痰加南星半夏各一錢荊芥細辛各七分頭風或旋運加半夏天麻各一錢白芷藁本各八分冷淚及眼上風熱加木賊荊芥甘菊花各等分小便赤澀加赤茯苓荊芥山梔木通各等分氣塊或痞加白朮一錢五分枳實二稜莪朮各一錢水氣腫滿加桑白皮大腹皮茯苓木通各等分冷熱氣痛加茴香木香各八分山梔香附各一錢乾薑炒黑桂各五分腸風下血加黃芩枳殼川續斷荊芥穗各等分素有痰涎加半夏茯苓各一錢腰痛加杜仲八角茴香各一錢膝痹加菟絲子羌活桑寄生各一錢酒傷脾胃加藿香砂仁各七分扁豆黃連半夏各八分乾葛一錢傷食加豆蔻仁砂仁枳實山楂各八分白朮一錢遇久雨水濕加白朮茯苓澤瀉各八分桂四分胃寒加乾薑肉桂各六分丁香三分濕傷脾胃困弱不思飲食加黃耆人參白朮各一錢傷寒時疫頭痛加防風羌活川芎各一錢蔥汁一盞藿香半夏各八分渾身拘急有熱加地骨皮麥門冬各一錢心下痞滿不快加木香七分枳實一錢去甘草咳嗽飲食減少加黃耆白朮歸身各一錢脈緩病急怠惰嗜臥四肢不收或大便泄瀉此濕勝也加人參白朮黃耆各一錢升麻三分防風五分男婦脾胃不和心腹脅肋脹滿刺痛口苦無味胸滿氣短嘔啞吞酸面黃體重怠惰嗜臥骨節煩疼自利完穀不化易飽易飢霍亂五噎八痞反胃膈氣加白朮半夏曲黃連吳茱萸炒過各一錢五分木香五分砂仁五分婦人腹痛加木香一錢五分烏藥當歸白芍藥各一錢官桂五分赤白帶下加川歸黃柏黃耆白朮白茯苓各一錢小兒嘔吐泄瀉面黃肌弱加山楂白朮各一錢五分為末米湯調下每服二錢小兒吐逆頻並手足心熱不進乳食加半夏曲神麯白朮各一錢五分山楂二錢為末每一錢棗湯調下又方參苓白朮散和中健脾消食人參去蘆一兩五錢白朮炒二兩砂仁炒一兩甘草炙五錢白扁豆炒一兩山藥一兩五錢薏苡仁炒一兩五錢桔梗炒一兩白茯苓去皮一兩五錢蓮子去心一兩五錢上為末每服二三錢食遠清米湯調下或蜜丸亦可本方一斤加山楂末半斤名二妙調脾散治大人小兒食積傷脾瀉痢膨脹嘔吐脾胃不和等症有效此蕪湖夏小兒家傳方血不和加當歸一兩五錢香附一兩氣不和加陳皮一兩木香五錢脾胃不快嘔吐加藿香半夏曲各一兩胃寒加乾薑一兩內桂五錢丁香三錢瀉後調理脾胃加厚朴蒼朮陳皮各一兩病後調理脾胃加黃連吳萸炒一兩木香五錢石蓮肉一兩瘧後調理脾胃加陳皮白芍藥各一兩青皮五錢産後調理脾胃加炒黑乾薑七錢當歸香附各一兩膈症脾胃虛損加牛胎一具為末蘆柴根搗汁打淮安口子末糊為丸紅棗湯下魯試有效又方枳朮丸一運一動一補一消乃理脾之聖藥也白朮四兩陳土炒過去土不用枳實去穰麩炒二兩上為末荷葉包老米飯煨熟搗爛為丸如梧桐子大每服八十丸食遠清米湯送下有痰在膈上滿悶不快加陳皮去白一兩半夏薑製二兩名橘半枳朮丸破滯氣消積開胃進飲食加木香一兩五分名木香枳朮丸飲食太過或食間著惱以致心腹滿悶不快加香附一兩童便進炒神麯蒼朮山梔撫芎各一兩五錢木香五錢名越鞠枳朮丸傷肉食濕面辛辣味厚之物加黃連大黃黃芩三味俱酒蒸妙山楂神麯陳皮各二兩木香一兩名三黃枳朮丸傷生冷並冷物加蒼朮半夏陳皮各二兩草豆蔻砂仁各一兩木香五錢丁香三錢若元氣素弱食飲難化食已即腹內不和疼痛泄瀉此胃虛有寒也加人參白芍藥陳皮山楂神麯各二兩木香砂仁各一兩素有痰火胸膈鬱塞或吞酸吐酸嘔吐嘈雜或酒積或泄瀉結痛此皆濕熱也加木香各五錢黃連吳萸炒白芍藥陳皮各二兩生甘草五錢夏加石膏冬加乾薑七錢炒有食積痞塊堅硬在腹內者加山楂二兩黃連厚朴莪朮阿魏昆布各一兩木香五錢檳榔八分痞積氣塊在腹脅者加黃連吳萸炒一兩五錢木香一兩莪朮阿魏各一兩五錢瓦龍子煆一兩鱉甲一兩勉強多食致心腹痞悶不快加山楂神麯陳皮各一兩五錢厚朴砂仁各一兩傷冷食不消腹痛溏瀉加半夏陳皮各一兩砂仁乾薑炮大麥芽山楂各一兩濕熱痞悶加茯苓澤瀉連翹蘿蔔子炒各一兩五錢心口胃脘痛加乾薑砂仁各一兩丁香四錢素有痰火人加半夏橘紅各一兩五錢白茯苓黃芩黃連各一兩若胸膈不利服辛香燥藥以致上焦受傷胃脘乾燥而嘔噎膈等症作矣加黃連吳萸炒山梔薑汁炒白芍藥當歸各一兩五錢石膏桔梗各一兩生甘草五錢膈上頑痰膠結及大便燥祕加當歸白芍藥黃芩各一兩五錢枳殼桔梗石膏玄明粉各一兩生甘草五錢若能食好食但食後反飽難化此胃旺脾陰虛也加白芍藥酒炒二兩人參黃連香附各一兩五錢石膏一兩生甘草木香各五錢老人脾虛血燥易飽易飢大便難加白芍當歸各一兩五錢人參一兩山楂麥芽桃仁去皮尖另研各七錢升麻甘草各五錢此老人常服之藥也瀉痢後虛膨加人參白茯苓陳皮各一兩五錢木香五錢小兒瀉痢不止加山楂二兩訶子肉果黃連燒酒浸炒各一兩木香