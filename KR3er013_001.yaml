body:
  text: 卷之一風門中風癱瘓癘風驚風附傷風中風附癱瘓癘風驚風脈脈訣云浮為中風又云陽浮而滑陰濡而弱者為中風寸浮而滑者為痰微而弱者為虛緩而澀者為血虛微而遲或沉者為氣虛浮大為風浮數為熱浮遲為寒浮緩而澀為皮膚不仁浮滑散大為癱瘓浮弦急數為驚風發搐大抵六經之脈亦與傷寒同但少瘥耳症內經曰風之傷人也或為熱中或為寒中或為偏枯半身不遂是也或為癘風或為驚搐皆風之所為也抑考風有中腑中臟中血脈之異中腑者面如五色惡風惡寒拘急不仁或中身之後或中身之前皆易治中臟者唇吻不收舌卷不轉而失音鼻不聞香臭眼昏耳聾大小便閉皆難治中血脈者口眼歪斜語言謇澀口吐涎沫又有寒中熱中癱瘓癘風驚風之類此皆屬濕熱或痰火兼血虛也亦有氣中因七情所傷與中風相似若作風治殺人多矣蓋中風者身溫且多痰涎中氣者身涼而無痰涎有此不同丹溪云真中風邪者甚少若陰虛陽乏痰火內熾或內傷飲食變為卒暴僵仆之病類乎中風則常有之世醫不分悉以風治殺人多矣又云真中風邪西北人有東南之人只是濕土生痰痰生熱熱生風也張仲景云風之為病當半身不遂經絡空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎闢不仁邪在於絡肌膚不仁在經則重不勝入腑則不識人入臟則吐沫難言劉河間云中風者非為肝木之風實甚而卒中之亦非外中於風由乎將息失宜心火暴甚腎水虛衰不能制之則陰虛陽實而蒸熱拂鬱心神昏冒筋骨不用而卒倒無知也或因喜怒思悲恐五志過極皆為火甚故也李東垣云中風者非外來風邪乃本氣自病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有之若壯歲體肥則間有之亦是形盛氣衰所致亦有賊風襲虛而傷者說者謂昔人主乎風河間主乎火東垣主乎氣丹溪主乎濕而有昔人三子各得其一之說殊不知河間之論實具於火類之下而不以風言且別注中風論治甚詳東垣謂自內傷氣且曰亦有襲虛挾風而分在腑在臟之異丹溪謂因於濕熱必曰外中者亦有三子何嘗偏於火氣濕而言無中風也耶愚謂風者乃六淫之一流行於四時浩蕩於天地上下八方無所不至人居其中猶魚在水水淡則魚瘦氣乖則人病體之虛者即感而傷之但所受淺深不同八方虛實有異耳治東垣云中腑者多著四肢有表症而脈浮惡風寒拘急不仁或肢節廢治宜汗之中臟者多滯九竅唇緩失音耳聾鼻塞目瞀大便祕結或氣塞涎上不語昏危多致不救治宜下之中血脈則口眼歪斜三者治各不同若中血脈而外有六經之形症則從小續命湯加減以發其表調以通聖辛涼之劑若中腑而內有便溺之阻隔肢不能舉口不能言此中經也宜大秦艽湯羌活愈風湯補血以養筋癱瘓者有虛有實經謂土太過則令人四肢不舉此膏粱之疾非肝腎之虛宜瀉之令土平而愈三化湯調胃承氣湯選而用之脾虛亦令人四肢不舉治以十全四物去邪以留正也至於子和用汗吐下三法治之蓋吐者如水鬱則達之謂吐之令其條達也汗者風隨汗出也下者推陳致新也失音悶亂口眼歪斜者以三聖散吐之如牙關緊急者鼻內灌之吐出涎沫口自開也次用涼膈散調之大抵風本為熱熱勝則風動宜靜勝其燥以養陰血為主陰血旺則風熱無由而作矣須按此法治須少汗亦須少下多汗則傷其衛多下則損其榮故經有汗下之戒尤宜審之丹溪云中風大率主血虛有痰或挾火與濕熱治法以順氣祛痰清熱疏風發散吐下之類為先補養次之更以傷中感三者辨別輕重為治乃妙在左屬死血四物加杏仁紅花之類甚者桃仁承氣湯下之在右屬痰與氣二陳加南星貝母薑汁竹瀝之類氣用烏藥順氣散痰壅盛者或口眼歪斜不能言語皆用吐法瓜蒂藜蘆蝦汁之類詳輕重用之氣虛卒倒用參耆補之挾虛濃煎參湯加竹瀝薑汁血虛宜四物補之挾痰亦加薑汁竹瀝半身不遂在左在右治法如前氣血二藥並加薑汁竹瀝癘風是受天地間不正之氣得之者須分上下氣受之則在上血受之則在下氣血俱受則上下皆然蓋皆不外乎陽明一經陽明者胃與大腸也治宜先瀉濕熱之劑清之在血補血在氣補氣治用疏風散毒藥治之婦人胎産驚風乃血虛生內熱熱則生風因七情所觸而動也宜四物湯隨症加減益母丸烏金丸闢巽錠子皆可選用小兒驚風有急有慢慢驚屬脾虛所主宜溫補參朮湯化下硃砂安神丸急驚屬痰熱宜涼瀉以牛黃清心丸或利驚丸主之七情氣中者憂愁不已氣多厥逆初得便覺涎潮雍塞牙關緊急宜以蘇合香丸灌之使醒然後隨證調之闢巽錠子亦好用者觸類而長之思過半矣方小續命湯治諸風中風四時加減通用麻黃一錢去節根人參五分去蘆黃耆一錢當歸一錢酒洗川芎八分杏仁八分去尖防己八分附子八分炮官桂六分防風一錢五分去蘆甘草三分白芍藥一錢上用姜五片棗一枚水二鍾煎一鍾去渣食前熱服太陽經中風有汗加桂枝湯無汗加麻黃湯陽明經中風加葛根湯少陽經中風加羌活柴胡各一錢或小柴胡湯太陽經中風加乾薑八分倍附子少陰經中風加桂枝八分倍附子厥陰經中風加連翹羌活各八分胎前中風加荊芥穗天麻桑寄生各一錢去桂附産後中風加荊芥穗各一錢桃仁紅花澤蘭葉各八分中風無汗而拘急者加羌活白芷蒼朮各一錢去桂附中風汗多而恍惚加黃耆一錢茯神一錢遠志七分去麻黃杏仁桂附四肢拘急疼加大麻秦艽羌活各八分痰涎壅盛加南星半夏各一錢五分薑汁一盞竹瀝二盞春月宜倍用麻黃川芎夏月宜加石膏倍用黃芩秋月宜倍用當歸加生地黃薑汁浸三日焙乾冬月宜倍用附子加乾薑七分又方防風通聖散四時通用治諸風熱防風一錢五分川芎八分川歸一錢白芍藥一錢白朮一錢二分麻黃一錢二分石膏一錢滑石八分桔梗八分連喬八分黃芩八分梔子八分荊芥七分薄荷七分大黃二錢看虛實芒硝一錢甘草五分上作一服姜三片棗一枚水二鍾煎一鍾食遠熱服風痰壅盛加南星半夏各一錢五分天麻白附子各七分熱痰加二陳湯入薑汁半盞竹瀝一盞氣虛卒倒加參耆各一錢五分去麻黃石膏滑石桔梗連翹梔子薄荷芒硝大黃口乾有熱加柴胡葛根天花粉各八分頭痛加用川芎石膏各一倍半夏一錢五分半身不遂在右者加痰藥在左者加血藥並用薑汁竹瀝能食者去竹瀝加荊瀝傳送抽搐加天麻白芷各一錢殭蠶全蠍各七分肢節寒濕疼痛加羌活蒼朮各一錢桂少五分肌肉蠕動加天麻羌活白芷各一錢蠍梢五分七情所傷成氣中者中烏藥枳殼香附紫蘇各一錢去麻黃石膏滑石連翹芒硝大黃飲酒被風頭痛如破加黃連葛粉半夏蒼朮各八分去麻黃滑石連翹芒硝大黃風傷於肺喘急咳嗽加半夏貝母杏仁金沸草款冬花各八分去硝黃滑石破傷風在表則以辛散之去硝黃加薑蔥在裡則以苦泄之去麻黃汗下後通利氣血驅逐風邪本方煎調羌活末全蠍末各一錢諸風潮搐小兒急慢驚風大便祕結邪熱暴甚腸胃乾燥寢汗咬牙目睛上攛睧語不安轉筋驚悸本方倍大黃梔子煎調茯苓末全蠍末各一錢腰脅走注疼痛本方加硝石羌活末各一錢煎調車前子末海金砂末各一錢木香末五分打挾傷損肢節疼痛腹中瘀血不下加當歸大黃倍用桃仁煎調乳香沒藥各一錢頭旋腦熱鼻塞濁涕時下加黃連辛夷薄荷煎服內經曰膽多熱於腦則辛頞鼻淵濁涕下不已也氣逆者本方去活石連翹硝黃加枳殼煎調木香末一錢小便淋閉去麻黃加木通車前子各一錢煎調木香末五分大便結燥或祕去麻黃桔梗加桃仁麻仁枳殼倍當歸生癮疹或赤或白加麻黃蔥白三根升麻七分牛蒡子連翹各一錢出汗即愈去芒硝以其咸走血而肉凝不得汗故也解利四時傷寒內外所傷者本方一兩對益原散一兩蔥白十莖鹽豉一合生薑半兩水一大碗煎五七沸溫服一半以筋探吐吐罷後熱服一半汗出立解癘風加牛蒡子苦參各一錢五分全蠍天麻羌活白芷各八分蘄蛇肉二錢去硝黃冒風症右關弦而緩帶浮者是本方去硝黃黃芩連喬石膏活石麻黃桔梗荊芥薄荷加人參白茯苓入粟米煎好冒風湯也諸瘡瘍清熱散毒加牛蒡子苦參金銀花各一錢婦人吹乳加金銀花木通貝母蒲公英各一錢二分穿山甲青皮各五分甘草節六分楊梅瘡與便毒初起或誤服輕粉用此散熱解毒加木通白蘚皮五加皮金銀花皂角刺各八分或一錢土茯苓二兩芭蕉根三錢又方開關散治諸中風中痰中氣牙關緊急痰涎壅盛者先用此散灌之然後隨症用藥荊芥穗一兩皂角去皮弦子一錢五分麝香一字另研共為末每服方寸匕薑湯調灌下又方闢巽錠子治大人諸風小兒急慢驚風四時皆可用防風五錢去蘆天麻五錢膽南星七錢白附子炮五錢川烏炮五錢乾薑煨三錢川芎五錢白芷五錢白茯神五錢去木人參五錢去蘆白朮五錢木香五錢薄荷五錢去梗殭蠶二十一個全蠍二十一個牛黃三錢片腦五分硃砂一兩半另研為衣麝香二錢上件除硃砂起以下五樣各另研余藥為細末用麻黃一斤甘草四兩蜜二兩熬作膏子稀稠得宜將藥末和勻印作錠子金箔為衣或丸如龍眼大蠟包尤好藏久每服用一錠隨症依後引下治大人中風中痰中氣厥症並用薑湯調灌下左癱右瘓荊芥湯下風狂顛癇金銀湯下大人小兒傷寒傷風傷濕並薑蔥湯熱調下得微汗即解破傷風溫酒調下小兒急驚風薄荷湯下小兒慢驚風濃棗湯下婦人産後驚風益母草湯下婦人産後心虛恍惚如見鬼邪金銀湯下婦人産後血暈昏迷童便煎薑湯下傷風脈人迎與右寸浮大而緩兩關尺浮緩而澀脈訣云傷風之脈陽浮而緩陰濡而弱症河間云傷風之症身熱頭痛項強肢節煩疼或目疼乾嘔鼻鳴手足溫自汗惡風又云傷風則惡風理必然也蓋風喜傷衛衛者陽氣也風邪客之則腠理反疏不能衛護故自汗而惡風也外症頭疼肢熱咳嗽鼻塞聲重或流清涕或鼻塞不聞香臭者是也治大抵傷風屬肺者多治法必以解表清熱降氣行痰為主先用解表清熱薑蔥紫蘇葉黃芩葛根之類次用消痰止嗽杏仁貝母款冬花前胡之類若汗出㿉寒而加頭項強痛者桂枝葛根湯主之若無汗煩躁不解無表症者雙解散主之方芎芷葛蘇散春夏傷風宜服川芎白芷乾葛蘇葉陳皮半夏各一錢桔梗前胡淡豆豉各七分甘草三分上用水一鍾半生薑三片蔥白三根煎至八分食後熱服微汗即解身熱不退加柴胡一錢黃芩八分頭疼甚加石膏一錢細辛五分升麻三分巔頂痛加羌活藁本各八分眉稜痛加防風蔓荊子各七分肩背痛因風邪者加防風羌活當歸各一錢胸脅不利加枳殼香附各八分咳嗽生痰加桑白皮杏仁知母貝母款冬花金沸草各八分喘急氣壅加麻黃石膏各二錢五分杏仁枳殼各八分鼻塞或流清涕加菊花辛夷蘇梗各八分細辛五分又方參蘇散秋冬秋冬傷風宜服人參蘇藥桔梗葛根前胡淡豆豉陳皮半夏茯苓枳殼甘草減半金沸草加黃芩各等分桂枝五分杏仁七分上用姜三片蔥白三根棗一枚水一鍾半煎八分食後熱服微汗即解咳嗽加五味子五分款冬花貝母各八分天門冬栝蔞仁各一錢久嗽肺火加桑白皮杏仁黃芩石膏麥門冬五味子各等分喘急氣壅加蘇子麻黃杏仁石膏各一錢頭疼加川芎一錢細辛五分發熱加柴胡一錢黃芩八分潮熱惡寒加麻黃一錢桂枝七分嘔吐加藿香八分砂仁七粒寒月再加乾薑五分丁香三分胸膈痞悶加枳實白朮香附各八分肩背痛加羌活當歸烏藥各八分汗出㿉寒加桂枝葛根各八分無汗煩躁不解加麻黃一錢五分杏仁八分姜三片蔥三根挾食者加白朮陳皮枳實山楂麥芽各八分四肢疼痛加防風羌活蒼朮各八分房勞傷風加當歸白朮各一錢痰多嗽不止加貝母南星栝蔞仁杏仁各八分寒門傷寒中寒瘟疫大頭病附內傷脾胃附傷寒脈人迎脈必緊盛或浮或緊無汗太陽尺寸俱浮陽明尺寸俱長少陽尺寸俱弦太陰尺寸俱沉細少陰尺寸俱沉厥陰尺寸俱微緩又浮大屬陽沉細屬陰傷寒熱盛脈大者生沉小者死已汗沉小者生浮大者死脈訣云陰陽俱盛重感於寒變為溫瘧陽脈浮滑陰脈濡弱更遇於風變為風濕陽脈洪數陰脈實大更遇濕熱變為濕毒病發熱脈沉細表得太陽名曰痓痓有剛柔二種有汗名柔痓無汗名剛痓病太陽關節即痛而煩脈沉名曰濕痹病太陽身熱疼痛名曰中暍病發汗身內熱名曰風溫其症脈陰陽俱浮自汗身重多眠小便不利症謹按內經曰凡傷於寒者則為病熱熱雖甚不死若兩感於寒而病者必死尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強也尺寸俱長者陽明受病也當二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三陽經受病未入於府者可汗而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三陰經皆受病已入於府可下而已若更感異氣變為他病當依舊壞症病而治之若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與大陰俱病則腹滿身熱不欲食譫語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五臟六腑皆受病則榮衛不行臟腑不通即死矣又按仲景傷寒論曰冬氣嚴寒萬類潛藏君子當固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣者皆能為病以傷寒為毒者以其最為殺癘之氣也自霜降後至春分前感寒而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病也是以辛苦之人春夏多溫熱病者皆由冬時觸寒所致非時行之氣也若春時應暖而反寒夏時應熱而反涼秋應涼而反熱冬應寒而反溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也若天令溫暖而感之是為冬溫如春時天令溫暖而壯熱為病者乃溫病也如天氣尚寒冰雪未解感寒而病者亦曰傷寒若春末夏秋之間天氣暴寒而感之為病者此乃時行寒疫也如夏至後壯熱脈洪者謂之熱病也然又有溫瘧風溫溫毒溫疫中寒中風傷風中濕中暑中暍濕毒濕溫痰症腳風內傷食積虛煩陰虛陽乏亦皆發熱狀似傷寒故世俗不辨悉以傷寒治之殺人多矣且溫病熱病乃因伏寒而變既變不得復言為寒也其寒疫乃天之暴寒與冬時嚴寒又有輕重不同時氣是天行疫癘之氣又非寒比也溫病乃山澤蒸氣暑乃炎日之火風乃天之賊邪皆傷於人者也有中者為重傷者猶輕也溫瘧風溫又系傷寒壞症更感異氣所變治亦不同且諸症似傷寒者各有其因豈可通謂傷寒而混治之耶且名不正則言不順名尚不正豈可以言治乎幸東垣發內外傷辨之論救千古無窮之弊其功盛已哉又按東垣內外傷辨曰夫傷寒者其寒邪多傷於太陽之經而後傳變故先頭疼身痛而發熱其脈見於左手人迎脈必緊盛或浮緊而無汗其寒熱齊作而無間晡時必劇乃邪氣盛潮作之時精神有餘語言壯厲口鼻之氣俱盛手背熱而手心不熱乃邪氣勝此為有餘當瀉不當補也內傷則見於右手氣口脈必緊盛手心熱而手背不熱燥作寒已不相併但有間耳日晡時必減乃胃氣得令潮作之時精神困倦少氣懶語身無大熱脈不緊數但大而無力是陽氣自傷不能升達降下陰分而為內熱是陽虛也此為不足宜補不宜瀉也若勞心好色內傷真陰陰血既傷則陽氣偏勝而變為火矣是為陰虛火動或盜汗遺精咳嗽寒熱或於午後發熱身無痛處惟覺困倦其脈細數無力宜補陰降火傷食者因飲食停滯而發熱氣口脈亦緊盛或右關短滑太抵傷食則惡食理必然也又或噫氣吞酸或惡食氣或欲吐不吐或噁心痞悶按之則痛或胃口作疼或停食而復感寒者則氣口人迎之脈俱大也亦頭痛發熱惡寒拘急中脘痞悶或吐或嘔或痛者為傷食也若發熱脈浮緩而有汗者謂之傷風也必口氣粗合口不開面光不慘惡風不惡寒也虛煩者謂虛熱心中鬱郁不安故謂之煩但只不惡寒頭身不痛脈不緊數此為異耳痰症者乃停痰留飲凝結中脘亦令人寒熱狀如傷寒若痰在上焦則寸沉滑或沉伏痰在中焦則右關滑大兼氣鬱則沉而滑挾食則短而滑也凡關脈滑大者膈上有痰可吐之腳氣之症亦發寒熱或嘔逆或舉體轉筋足脛焮赤而腫者是有瘀血症為跌撲損傷初時不覺過七八日或十餘日則寒熱始作但脅下及小腹必疼手不可近若血上衝而昏迷不省良久復蘇此瘀血也溫病者春時地天道和暖若壯熱煩渴而不惡寒者溫病也若夏至以後時令炎暑患壯熱煩渴而不惡寒者熱病也時氣乃天行溫疫四時不正之氣人感之則長幼一般病也亦與傷寒相似蓋傷寒因寒而得之此乃瘟疫之氣不可與傷寒同論也寒疫者乃天之暴寒為病四時之中或有風寒之作感而即病者寒疫也亦與傷寒相似但略輕耳冬溫者因冬時有非節之暖即時行之氣也若發斑者亦曰溫毒也中暍即中熱也蓋傷大陽經與傷寒相似故曰中暍必汗出身熱而渴或身重而疼也中暑者熱傷於心脾之經而不在大陽其候面垢自汗身熱煩渴脈虛或背微寒蓋暑喜傷心心不受邪則包絡受之包絡本相火也以火助火故熱甚而昏也或小便不利或嘔吐頭疼胸膈痞滿或腹痛又有傷暑之症雖屬外感卻類內傷與傷寒大異蓋寒傷形寒邪客表有餘之症故宜汗之暑傷氣元氣為熱所傷而耗散乃不足之症故宜補之東垣所謂清暑益氣是也又有因時暑熱而過食冷物以傷其內過取涼風以傷其外此則非暑傷人乃因暑而自致之病宜辛熱解表或辛溫理中之劑卻與傷寒治法相類者也風濕者春夏之交病如傷寒肢體重痛轉側則難小便不利因陰雨畢濕或引飲多有此症宜五苓利之忌汗下有瘡瘍者凡瘡瘍初生必寒熱交作必須視其身體有無瘡頭仔細詳辨不可便作傷寒治之凡脈浮數當發熱而漉浙惡寒若飲食如常而有痛處必生惡瘡常見俗醫妄名流注傷寒褊考諸書並無此名何其謬哉凡此之類外形相似內實不同治法多端不可或謬必須審其果為溫病熱病及溫疫也則用河間法果為氣虛傷食及內傷也則用東垣法果為陰虛及痰火也則用丹溪法果為正傷寒例病也則遵用仲景法如此則庶無差誤以害人性命矣世俗但見發熱之症一概認作傷寒治之悉用汗藥以發其表汗後不解遽用下藥以疏其里設是虛症豈不死哉故經曰實實虛虛損不足而益有餘如此死者醫殺之耳仁者鑑此豈不痛歟治愚考仲景治傷寒著三百九十七法一百一十三方然究其大要無出乎表裡虛實陰陽寒熱八者而已若能明究其的則三百九十七法瞭然於胸中也何以言之有表實有表虛有裡實有裡虛有表裡俱實有表裡俱虛有表寒裡熱有表熱裡寒有表裡俱熱有表裡俱寒有陰症有陽症病各不同要辨明而治之其脈浮緊發熱惡寒身疼而無汗者表實也宜麻黃湯以汗之若脈浮緩發熱惡風身疼而有汗者表虛也宜桂枝湯以和之設腹中鞭滿大便不通譫語潮熱脈實者裡實也宜大柴胡大小承氣之類看虛實下之或腹鳴自利有寒有熱者裡虛也如表裡俱實者內外皆熱也脈浮洪身疼無汗宜防風通聖散汗之若口渴飲水舌燥脈滑者人參白虎主之若弦大而滑者小柴胡合白虎主之如表裡俱虛自汗自利者宜人參三白湯或黃耆建中湯加人參白朮主之脈微細足冷者加附子以溫之如表寒裡熱身寒厥冷脈滑數口燥渴白虎湯主之如裡寒表熱者面赤煩躁身熱自利清穀脈沉者以四逆湯溫之如表裡俱寒而自利清穀身疼惡者此內外皆寒也先以四逆救里後以桂枝治表如陰症發熱則脈洪數而爆渴矣大抵麻黃桂枝之類汗而發之葛根升麻之類因其輕而揚之承氣陷胸之類引而竭之瀉心十棗之類因中滿而泄之在表者汗之在裡者下之半表半裡者和之表多里少者和而少汗之里多表少者和而微下之在上者吐之中氣虛而脈微者溫之全在活法以施治也若表裡汗下之法一或未當則死生系反掌之間可不深思而明辨哉按陶氏傷寒啓蒙云發熱惡寒頭項痛腰脊強則知病在太陽經也身熱目痛鼻乾不得眠則知病在陽明經也胸脅痛耳聾口苦舌乾往來寒熱而嘔則知病在少陽經也腹滿咽乾手足溫或自利不渴或腹滿時痛則知病在太陰經也引衣倦臥惡寒或舌乾口燥則知病在少陰經也煩滿囊縮則知病在厥陰經也潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發斑黃狂亂五六日不大便則知病在正陽明胃府也設若脈症不明誤用麻黃令人汗多卞陽誤用承氣令人大便不禁誤用姜附令人失血發狂正為寒涼耗其胃氣辛熱損其汗液燥熱助其邪熱庸俗狐疑莫此為甚蓋傷寒之邪實無定體或入陽經氣分則太陽為首其脈必浮或入陰經血分則少陰為先其脈必沉浮而有力無力是知表之虛實沉而有力無力是知里之虛實中而有力無力是知表裡緩急脈有浮沉虛實症乃傳變不常全在活法二字不可拘於日數但見太陽症在直攻太陽但見少陰症在直攻少陰但見真寒直救真寒見此三症便作主張不必悉具當知如何處治此為活法若同而異者明之似是而非者辨之在表者汗之散之在裡者下之利之在上者因而越之陷下者升而舉之從乎中者和解之直中陰經者溫補之若解不開不可攻裡日數雖多但有表症而脈浮者尚宜發散此事不明攻之為逆經云一逆尚引日再逆促命期若表症解而里症具者不可攻表日數雖少但有裡熱症而弦實者急當下之此事不明禍如反掌經云邪熱未除復加燥熱猶抱薪積火矣如直中陰經真寒症無熱惡寒不渴只宜溫補切禁寒涼之藥此事不明殺人甚速經云非從無益而反害之陰症似陽者溫之陽症似陰者下之陽毒者分輕重下之陰毒者分緩急溫之陽狂者下之陰厥者溫之濕熱發黃者利之下之血症發黃者潰之下之譫語者下之溫之中滿者消之瀉之結胸者解之下之太陽症以少陰者溫之少陰症似太陽者汗之衄血者解之止之發喘者汗之下之咳嗽者利之解之正傷寒者大汗之大下之感寒或冒寒者微汗之微下之勞力感寒者溫散之溫極病者微解之大下之此經常之大法也有病一經已用熱藥而又用寒藥如少陰症用白虎湯四逆散寒藥者又少陰用四逆湯真武湯熱藥者庸俗狐疑拒能措手哉嗚呼能發傷寒之症名而得傷寒之方脈如此視切乃為良醫始在寒藥如少陰乃傳經熱症也熱藥治少陰乃直中陰經真寒症也辨名定經明脈識症驗症用藥真知在表而汗真知在裡而下真知直中陰經而溫如此而汗如彼而下又如彼而溫辛熱之劑投之不瘥寒涼之藥用之必當病奚逃乎須分輕重緩急老少虛實久病新發婦人胎産室女經水大凡有胎産傷寒不與男子傷寒同治法無胎産者治相同婦人經水適來適斷即是熱入血室但宜和解表裡久病者過經不解壞症也新發者始病也老者血氣衰少者血氣壯緩者病之輕急者病之重寒藥熱服熱藥涼服其中和之劑則溫而服之戰汗分為四症要知邪正盛衰類傷寒四症照常法例治之雖云發蒙實登仲景之楷梯也又按陶氏傷寒見症識病條云傷寒之邪從表入里里必達外見症之由所屬必相應庶無誤也且如頭痛項強身熱者太陽症也無汗麻黃湯有汗桂枝湯頭搖者里病也隨症治之頭汗者里有瘀血必發黃也犀角湯茵陳湯面戴陽者下虛也姜附湯面慘不光傷寒也麻黃湯面光不慘傷風也桂枝湯面上乍黑乍白唇口生瘡狐惑也治以桃仁雄黃之類面如錦紋者陽毒也大青一物湯或陽毒升麻隨機選用舌上有黃白胎內熱也或黑者熱極也並用黃連解毒湯鼻燥漱水不下或目䁚溺血也犀角地黃湯目睛黃小腸熱也茵陳五苓散加木通懊憹者胃虛也梔子豉湯微吐之喜怒如狂蓄血也桃仁承氣湯下之肉瞤筋惕汗下虛也宜溫經益陽身如被杖陰毒也正陽散甘草湯一身盡痛多眠或微腫難轉者風濕也甘草附子湯蒼朮白虎湯身目俱黃濕熱疸病也茵陳五苓散身如蟲行表虛也黃耆加桂湯背惡寒陰勝陽也人參附子湯不眠因汗下多而神虛也酸棗仁湯坐而伏者短氣也宜補之下利清穀內寒也附子理中湯咽中生瘡上實下虛也黃連加桂治之舌生刺熱甚也黃連解毒湯又手冒心因汗多而血虛也黃耆建中湯腹滿自利手足溫者邪入太陰也理中湯舌卷濃縮邪入厥陰也大便實承氣湯手足厥茱萸四逆湯溫之以上乃大要耳臨症詳而用之思過半矣方麻黃湯治太陽無汗脈浮緊者宜此汗之麻黃三錢桂枝二錢杏仁一錢五分甘草一錢上作一服姜五片蔥白三根棗三枚水二鍾煎至一鍾去上沫熱服以衣被蓋取汗熱熱遍身至手足心即止不必再服如須臾汗未出宜吃熱稀粥一碗以助藥力汗出即止如未出再煎一服加淡豆豉一撮如前汗之三服汗不出者難治必用蒸法大抵此方只宜用於天令寒冷之時若炎暑之月則當通變不可執用此方又宜葛根蔥白淡豆豉或雙解散等辛涼之劑以發散也本經頭疼發熱惡寒無汗而喘者加川芎防風羌活白芷蒼朮白芍藥各一錢本經惡寒發熱身癢面赤者加柴胡芍藥各一錢五分本經頭痛發熱惡寒胸中飽悶者加枳殼桔梗各一錢又方桂枝湯治太陽症自汗脈浮緩者宜服桂枝白芍藥各三錢甘草二錢上作一服姜三片棗二枚水煎溫服如汗不止加橫耆二錢如喘急加柴胡杏仁各一錢五分如胸中飽悶加白朮二錢枳殼桔梗各一錢又方葛根湯治陽明經病宜解之陽明府別用承氣下之葛根三錢柴胡二錢黃芩桂枝各一錢五分芍藥二錢上作一服水二鍾姜三片棗二枚煎一鍾溫服本經惡寒甚者去黃芩加麻黃二錢冬春宜用麻黃夏秋宜用蘇藥一錢本經有汗而渴者加石膏知母各二錢粳米一錢本經頭痛加川芎白芷各一錢五分又方小柴胡湯治少陽症往來寒熱胸脅痛而嘔柴胡三錢黃芩半夏人參各二錢甘草炙五分上作一服姜三片棗一枚水二鍾煎一鍾溫服本經小便不利加茯苓一錢五分本經脅痛加青皮枳殼各一錢本經渴加天花粉知母各一錢五分本經嘔吐者加薑汁一盞竹茹二錢本經嗽加五味子一錢金沸草一錢五分人參減半本經痰多加栝蔞仁貝母各二錢五分人參減半本經寒熱似瘧加桂一錢本經齒燥無津液加麥門冬五味子天花粉各半本經壞症加知母鱉甲各一錢五分本經症心下飽悶未經下者非結胸乃表邪傳至胸中猶當作表治加枳殼桔梗各一錢五分未效本方對小陷胸湯加枳桔一服豁然此陶公之心法也豫魯用亦效虛煩類傷寒症本方加竹葉一錢石膏炒粳米各一錢半本經與陽明合病加葛根二錢芍藥一錢五分婦人熱入血室加當歸一錢五分紅花一錢男子加生地黃一錢五分又方大柴胡湯治陽明內實大便難不惡寒反惡熱柴胡三錢黃芩芍藥枳實各二錢半夏錢半甘草五分大黃壯者五錢虛者三錢上作一服姜三片棗一枚水二鍾將諸藥先煎將熟再下大黃煎四五沸約一鍾熱服以微利為度若大滿大實者依後加減利之本方加桂枝二錢名桂枝大黃湯去黃芩本方加芒硝二錢厚朴一錢五分去柴胡黃芩半夏甘草名大承氣湯只加厚朴名小承氣湯加桃仁二錢名桃仁承氣湯此數方皆宜量虛實斟酌用之又方理中湯治太陰自利不渴實多而嘔腹滿鴨溏霍亂人參二錢白朮二錢乾薑二錢甘草一錢上作一服水一鍾半煎服或丸名理中丸諸結胸或太陰症下之胸而鞭加黃芩一錢五分枳殼一錢五分桔梗一錢寒實結胸本方加枳實名枳實理中湯腹滿下利加附子二錢名附子理中湯動氣左右上下加桂二錢去水吐多者加生薑去朮下多者倍術小便不利加茯苓二錢渴加烏梅三個腹痛加桂枝一錢五分芍藥二錢又方四逆湯治直中陰經寒症以此溫之附子五錢乾薑四錢甘草二錢上作一服水煎溫服附子若加至一兩名通脈四逆湯厥逆下利脈不至附子加至六七錢面赤加蔥白九莖嘔加生薑五片痢止脈不出加人參三錢麥門冬二錢五味子一錢上仲景先生正傷寒方也六經正治宜依此加減用之兼有變症須參全書茲不備録又方易老九味羌活湯治春夏秋傷寒通用太陽陽明經藥也羌活防風蒼朮各一錢五分川芎白芷黃芩各一錢細辛五分生地黃八分甘草三分上作一服用生薑三片蔥白三根水二鍾煎熱服夏月本方加石膏知母名神朮散如服此湯後再不作汗本方加蘇葉喘而惡寒身熱加杏仁生地黃汗後不解宜服汗下兼行本方加大黃如釜底抽薪之法其春夏秋感冒非時傷寒亦有頭疼身熱惡寒之症脈浮緩自汗宜實表本方去蒼朮加白朮汗不止加黃耆一錢五分再不止以小柴胡加桂枝芍藥各一錢如神胸中飽悶加枳殼桔梗去生地黃結胸加同身熱不退加柴胡一