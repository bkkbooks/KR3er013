body:
  text: 卷之二暑門傷暑霍亂泄瀉痢疾瘧疾傷暑附暑風脈脈訣云脈虛身熱得之傷暑脈浮自汗或浮大而散或洪而大或弦細芤遲而隱伏而弱或虛遲無力中得洪緩皆曰暑病也或浮而虛者暑風也症戴氏云暑乃夏令炎暑也有冒有傷有中三者有輕重之分或腹痛泄瀉水者胃與大腸受之作嘔者胃口有痰此二者冒暑也宜黃連退暑熱香薷消蓄水或身熱頭疼燥亂不寧或身如針刺者為傷暑此為熱傷血分也宜人參白虎湯加黃芩柴胡或咳嗽發熱發寒盜汗不止脈數者熱在肺經乃火乘金也此為中暑宜清肺黃連香薷飲清暑益氣湯之類急治則可少遲則難治矣暑風乃相火行令也感之自口鼻而入傷心包絡之經故卒倒不省人事也其脈虛浮外症頭疼口乾面垢自汗倦怠少氣或背寒惡熱名曰暑風也治按潔古云動而得之乃辛苦之人動而火勝熱傷氣也脈洪而大宜人參白虎湯主之靜而得之乃安樂之人靜而濕勝火傷金位脈沉而實宜大順散或蒼朮白虎湯主之有陰勝陽者宜清暑益氣湯大抵暑症只宜黃連香薷飲清暑益氣湯五苓散白虎湯等藥挾痰加半夏虛加參耆之類暑風有挾火挾痰者二陳湯加黃連主之實者可用吐法昏迷不省人事者先以蘇合香丸次以黃連香薷飲加羌活或用雙解散加香薷尤妙方黃連香薷飲治暑症自汗煩渴而噪香薷三錢厚朴薑製扁豆姜炒各二錢黃連一錢五分上作一服用水二鍾煎一鍾井水沉冷服遠行受熱者加人參石膏滑石各等分甘草五分此動而得之噪渴引飲自汗脈沉加人參一錢五分麥門二錢五味一錢此靜而得之虛煩身熱自汗清暑益氣湯傷暑挾痰加半夏南星各一錢薑汁竹瀝傳送嘔吐加乾薑五分藿香半夏陳皮各一錢挾瀉加五苓散五錢暑風加防風羌活各一錢有痰壅盛再加半夏陳皮各八分又方清暑益氣湯養脾清肺補中行濕夏秋治暑通用黃耆人參白朮各一錢五分當歸蒼朮陳皮麥冬各一錢神麯澤瀉黃柏各七分青皮甘草升麻乾葛各五分五味十二粒上用姜一片棗一枚煎食遠稍熱服暑瀉加厚朴扁豆各一錢去當歸麥門冬暑痢加黃芩黃連檳榔枳殼各八分木香六分烏梅二個暑瘧加柴胡黃芩各一錢川芎草果各八分倍用青皮暑渴加石膏二錢知母粳米各一錢五分伏暑之時頭痛身熱腳軟精神短少四肢無力不思飲食怠惰嗜臥俗呼為注夏加白芍藥半夏各一錢川芎七分去澤瀉青皮暑風加防風羌活荊芥穗香薷各一錢去澤瀉青皮黃柏中暑脈微遲或隱伏渴而下利四肢厥冷不省人事本方加熟附一錢以行參耆之功達於四肢而自溫矣勿作寒治霍亂脈六脈隱伏右關弦滑浮洪者可治微而遲氣少不語者難治兩關弦緩者乃木剋土也不急治而則死症陳無擇云霍亂者心腹卒痛嘔吐下利增寒壯熱頭痛眩暈先心痛則先吐先腹痛則先痢心腹俱痛吐痢俱作甚則轉筋入腹遂斃矣蓋此症乃陰陽反戾清濁相干陽氣暴升陰氣頓絶治之則宜溫暖切禁寒涼轉筋以陽明養宗筋屬胃與大腸今暴吐下津液頓亡外感四氣內傷七情飲食甜膩攻閉諸脈枯削宗筋失養必致攣縮甚則舌卷卵縮者難治也又有乾霍亂者忽然心腹脹滿絞刺疼痛蠱毒煩冤欲吐不吐欲利不利頃刻便至悶絶最難治死在須臾以其升降不通故也惟吐法最良或下之亦妙吐下後以二陳加參朮調之治霍亂乃陽明症宜和中平胃為主治以生薑理中湯最妙吐利轉筋脅下痛脈弦者木剋土也平胃散加木瓜主之吐利轉筋腹中痛體重脈沉而細者四君加白芍藥乾薑主之四肢厥冷脈微者附子理中湯主之身熱煩渴者錢氏白朮散轉筋者男子宜以手挽其陰女子以手牽其乳此千金妙法也大抵此症急無藥惟陳氏吐法最佳後隨症調理方六和湯治伏暑霍亂人參白朮半夏杏仁各八分甘草四分砂仁六分藿香木瓜茯苓扁豆厚朴各一錢香茹一錢五分上作一服用生薑三片棗一枚水一鍾半煎八分不拘時服不渴腹痛吐利加乾薑七分渴而腹痛吐利加乾葛八分澤瀉滑石各七分麥門冬八分五味五分轉筋加酒當歸酒紅花各七分黃芩八分四肢厥冷脈微者加乾薑附子各一錢又方三因吐法用治霍亂並乾霍亂急無藥者此法極妙用極鹹鹽湯二升熱飲一升刺口探令吐宿食盡不吐更服吐訖仍服三吐乃止此法勝於他法遠矣世俗鄙而不用坐視其死哀哉吐後以二陳湯加參朮調理萬無一失泄瀉脈右關脈弦大或弦濡而滑為泄瀉脈數疾為熱沉細為寒弦而遲者氣泄心脈止者驚泄訣云下利微小即為生脈大浮洪無瘥日症經曰春傷於風夏生飧泄又曰濕多成五泄戴氏云有飧泄者謂水穀不化而完出濕兼風也溏泄者漸下汙積黏垢濕兼熱也鶩泄者利下澄徹清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁因濕勝氣脫也若此有寒熱虛實之不同其可執一而治之乎治按戴氏云瀉水腹不痛者濕也宜四苓散加二術飲食入胃不住完穀不化者氣虛也四君子湯加白芍藥升麻腹痛瀉水腸鳴痛一陳瀉一陳者火也四苓散加芩連木通或瀉或不瀉或多或少者痰也二陳加蒼白朮海石青黛黃芩神麯或用吐法腹痛甚而瀉瀉後痛減者食積也輕者保和丸重者白朮枳實山楂神麯大黃消而下之後用參苓平胃散調之大抵治瀉通用胃苓湯隨症加減方胃苓湯治瀉通用厚朴蒼朮各一錢白朮一錢五分陳皮八分甘草炙三分茯苓八分豬苓澤瀉車前子各七分桂三分上作一服姜一片紅棗一枚水一鍾半煎八分食遠服夏秋之間溫熱大行暴注水泄加黃連扁豆各八分升麻山梔木通各五分白芍藥一錢發熱燥渴加葛根石膏滑石各一錢黃疸小便赤澀加茵陳石膏各一錢山梔木通白芍藥各八分飲酒便泄此酒積也加白芍藥黃連扁豆乾葛各一錢去桂寒月溏泄清冷腹痛或傷生冷飲食者加神麯麥芽砂仁益智木香各七分乾薑五分久瀉胃氣下陷者去豬苓澤瀉車前子加人參黃耆白芍藥各一錢升麻柴胡羌活防風各四分久瀉脾胃虛滑不禁加肉豆蔻一錢訶子八分木香乾薑各五分久瀉胃虛膨悶乾嘔者加藿香砂仁半夏乾薑各七分去豬苓澤瀉車前子熱甚下泄如熱湯者加芩連木通滑石各八分去桂腹中㽲痛下泄清冷喜熱不渴此寒瀉也倍桂加乾薑肉果各八分木香五分寒甚者附子理中湯方見寒門久瀉穀道不合或脫肛此元氣下陷及大腸不行收令而然也本方去厚朴蒼朮豬苓澤瀉車前子加人參芍藥神麯訶子肉果烏梅五倍子各等分為丸防風升麻湯下完穀不化屬熱加芩連滑石各一錢屬氣虛者加人參芍藥升麻各等分去豬苓澤瀉桂食積瀉加山楂神麯麥芽白豆蔻仁各一錢甚者枳殼大黃湯凡諸瀉本方春加防風白芍藥各八分夏加黃連香薷扁豆各一錢秋加藿香檳榔枳殼各七分烏梅二個冬加乾薑砂仁各七分又方助胃丸治大人小兒諸般泄瀉厚朴蒼朮陳皮各一兩五錢甘草炙四錢豬苓澤瀉茯苓各一兩白朮一兩五錢桂三錢肉果雞蛋清炒一兩山楂二兩上為末神麯二兩打糊為丸如龍眼大每服一丸清米湯化下痢疾脈脈滑按之虛絶者必痢也寸浮數尺澀必下青膿血沉弦必下重脈數若微發熱汗出者自愈脈微弱數自止脈沉小留連者易治數大身熱者難治症痢者或膿或血或膿血相雜或腸垢或無糟粕相混雖有痛不痛大痛之異然皆裡急後重逼迫惱人者謂之痢也屬濕熱及食積三者別青黃赤白黑五色以屬五臟白者濕熱傷氣分赤者濕熱傷血分赤白相雜氣血俱傷黃者食積或云青緑雜色是風與火下如豆汁者赤白相混濕毒也錢氏云紅黃黑皆熱青白穀不化者為冷也抑考其本皆由腸胃所受飲食之積余不盡行留滯於內濕蒸熱穢鬱結日深伏而不作時逢炎暑相火司令又調攝失宜復感酷熱之毒至秋陽氣始收火氣下降蒸熱蓄積而滯下之症作矣以其積滯之滯行故名滯下即痢是也其濕熱穢積干於血分則赤干於氣分則白赤白混下氣血俱受邪矣久而不愈氣弱不運脾積不磨陳積既滑下凝猶魚腦矣甚則脾胃空虛開司失守濁液迸流色非一類錯雜混下狀如豆汁矣若脾胃下陷虛坐努簀色如白膿矣其熱傷血深濕毒積穢黏結紫色則紫黑矣其穢濁積而欲出氣滯而不與之出所以下迫窘痛後重裡急數欲便而不能便此皆大腸經有所途遏窒礙氣液不通故也宜詳審之治河間云滯下症屬濕熱鬱遏腸所致又云無積不利初起一二日元氣未虛者下之枳殼大黃之類此通因通用法也又云行血則便膿自愈當歸白芍藥桃仁紅花之類調氣則後重自除木香檳榔之類切忌止澀又云後重則宜下木香檳榔丸主之腹痛則宜和白朮白芍藥甘草陳皮當歸之類身重則宜溫姜附之類膿血稠黏以重藥竭之身冷自汗以重藥溫之風邪內縮宜汗之防風羌活之類鶩溏為利者溫之附子理中之類在表者汗之在裡者下之在上者湧之謂吐也在下者竭之謂下也身表熱者內疏之柴胡葛根之類小便澀者分利之五苓之類火熱者寒之清之芩連之類氣滯者調之木香檳榔枳殼之類積滯者去之枳實厚朴大黃之類氣虛而下陷者升舉之人參黃耆白朮甘草升麻之類血虛者補之人參當歸芍藥之類嘔者和之生薑半夏陳皮之類噤口者胃熱也人參黃連補而清之各從其類也變症多端難以枚舉姑撮其要以俟知者方加減黃芩芍藥湯治赤白痢疾黃芩炒枳殼各一錢五分白芍藥炒二錢檳榔一錢木香八分甘草炙三分當歸一錢蒼朮一錢厚朴八分白朮一錢五分陳皮八分黃連炒一錢三味乃痢必用之藥上作一服姜一片棗一枚水二鍾煎一鍾食遠服腹痛加砂仁木香各五分後重加滑石一錢五分赤痢加川芎桃仁各一錢再加當歸五分初欲下之加大黃五錢或三錢量虛實用白痢加白茯苓炒滑石各一錢初欲下之加大黃五錢並量虛實增損赤白相雜者並加上二藥蓋芎歸桃仁以理血滑石茯苓陳皮以理氣初欲下者亦加大黃五錢食積加山楂枳實各一錢五分如白痢久氣虛胃弱或下後未愈減芩連芍藥一半去檳榔枳殼厚朴加人參黃耆茯苓各一錢砂仁乾薑各五分赤痢久血虛胃弱或下後未愈減芩連枳殼三之一加川芎熟地黃阿膠各一錢赤黑相雜此濕勝也或小便不利及赤澀短少加木通澤瀉茯苓各一錢山梔八分以分利之血痢加川芎生地槐花地榆各一錢添當歸五分久不愈減芩連各七分去檳榔枳殼厚朴蒼朮加阿膠地榆側柏葉各一錢五分荊芥穗五分炒黑乾薑七分痢已久重不去此大腸墜下去檳榔枳殼加升麻荊芥穗各五分嘔吐加石膏一錢五分半夏山梔各一錢入薑汁一盞緩呷之以瀉胃口熱痢而腹痛加乾薑肉桂各七分痢久滑泄不禁腹中已消去檳榔枳殼厚朴減芩連一半加訶子肉果粟殼各一錢烏梅二個痢久氣血兩虛元氣下陷者去芩連枳殼檳榔厚朴加人參黃耆各一錢五分升麻柴胡各五分痢而渴者加麥門冬滑石各一錢五味十五粒烏梅二個秋後痢加扁豆炒黑乾薑半夏各八分減芩連三之一春冬痢加乾薑肉桂各七分藿香白豆仁砂仁各八分肉果一錢減芩連三之一痢而脈沉四肢厥自汗下如鶩溏或澄徹清冷者寒也減芩連檳榔枳殼厚朴蒼朮加人參熟附子乾薑各一錢五分以溫之又方加味香連丸治赤白痢疾裡急後重膿血稠黏者黃連去蘆毛淨一斤用吳茱萸半斤燒酒半斤濕透同黃連盒一時炒乾去吳萸木香四兩不見火肉果六兩用雞蛋清炒透滑石六兩用牡丹皮三兩同煮半日去丹皮當歸二兩酒浸焙乾枳殼麩炒二兩甘草炙一兩上為末每用粟米糊為丸緑豆大每服大人八十丸小兒五十丸赤燈心烏梅湯下白生薑粟米湯下又方參苓白朮散痢後調理甚妙方見內傷類本方加石菖蒲一兩木香五錢為末空心飲湯調服二錢瘧疾脈脈訣云瘧脈自弦弦遲多寒弦數多熱弦小緊者宜下弦遲宜溫弦數宜汗浮大而滑宜吐洪數無力為虛代散則死症內經曰夏傷於暑秋必痢瘧蓋先熱後寒名曰溫瘧但熱不寒名曰疸瘧經年不瘥結成癥瘕名為老瘧亦曰瘧母寒熱身重骨節煩疼脹滿自汗為濕瘧寒熱不除但慘戚振栗病以時作為牝瘧因傷食而得為食瘧一歲之中長幼相似謂之疫瘧愚按內經明言夏傷於暑所致何世醫悉謂脾寒而用溫熱之藥蓋戰栗惡寒者火極似水亢則害承乃制故也又按丹溪云瘧因暑邪舍於榮衛之間腠理不密復遇風寒閉而不出舍於腸胃之外與榮衛煎行晝行於陽夜行於陰並則病作離則病止並於陽則熱並於陰則寒淺則日作深則間日在氣則早在血則晏渴者燥勝不渴者濕勝也機要云在太陽經為寒瘧治多汗之陽明經為熱瘧治多下之少陽經為寒熱瘧治多汗之此三陽經受病謂之暴瘧發在夏至後處暑前乃傷之淺者在三陰經則總謂之溫瘧發在處暑後冬至前乃傷之重者此說良是其三陰經則作於子午卯酉日少陰瘧也作於寅申巳亥日厥陰瘧也辰戌丑未日太陰瘧也臨症宜詳辨之治丹溪云瘧得於暑當以汗解或汗不得出鬱而成痰宜養胃化痰發汗為主邪氣得出自然和也無汗要有汗散邪為主帶補小柴胡加川芎蒼朮升麻葛根之類有汗要無汗扶正為主帶散以參耆歸朮芍藥黃柏麥冬五味之類補而收之虛者必用參朮一二帖托住其氣不使下陷後隨症用他藥大渴大熱頭疼如破小柴胡去半夏加川芎石膏知母主之暑瘧宜人參白虎湯有痰者二陳加常山吐之不食者必從食上得當以食治平胃散加山楂神麯草果青皮主之瘧母在左脅下令人自汗作痛以青蒿鱉甲為主佐以三稜莪朮香附青皮桃仁治之凡瘧數發之後便宜小柴胡加常山草果青皮烏梅截之久則中氣虛弱病愈深而難治矣方柴苓二陳湯治諸瘧熱多寒少者宜服柴胡白朮蒼朮各一錢五分人參半夏薑製黃芩各一錢藿香川芎茯苓陳皮青皮各八分甘草三分厚朴七分上作一服姜三片棗一枚水一鍾半煎八分食遠服初發陰陽未分加豬苓澤瀉各八分桂四分若一日一發午前者邪在陽分加黃耆一錢添茯苓半夏各五分熱甚頭痛加石膏一錢五分蔥白汁二匙口渴加石膏一錢五分知母一錢麥門冬一錢間日或三日午後或夜發者加當歸芍藥地黃知母各一錢酒紅花酒柏升麻各四分此邪在陰分提起陽分方可截若間一日連二日或日夜各發者氣血俱病加黃耆一錢添人參茯苓各五分以補氣加當歸芍藥地黃各一錢五分以補血陽瘧多汗加黃耆一錢五分以斂之無汗加葛根一錢五分以發之陰瘧多汗加當歸芍藥地黃黃柏知母各二錢以斂之無汗倍柴胡蒼朮加升麻七分葛根一錢五分以發之胃弱食少或服截藥傷脾胃食少者添人參五分芍藥酒炒麥芽各一錢砂仁五分扁豆八分若因食積者加山楂神麯枳實草果各一錢黃連四分瘴瘧加檳榔知母葛根白芷各一錢烏梅三個瘧後變痢疾補虛清熱為主添人參五分加砂仁七分扁豆黃連各一錢木香七分當歸一錢二分芍藥一錢五分檳榔七分烏梅二個若欲截之加常山一錢五分檳榔草果各一錢烏梅七個水二鍾煎空心服若日久虛瘧或痎瘧連歲不已本方去厚朴蒼朮川芎藿香青皮減柴胡黃芩一半加黃耆當歸各一錢五分白芍藥知母青蒿地骨皮各一錢鱉甲九稜或七稜者炙二錢熱多棗少者或大渴者加石膏一錢五分知母葛根各一錢麥冬山梔各八分添黃芩五分寒多熱少或但寒不熱加丁香七分官桂一錢乾薑一錢草果一錢甚者加附子一錢減柴芩一半春瘧加防風乾葛白芷各一錢夏瘧加黃連扁豆各一錢香薷一錢五分麥冬一錢五味五分秋瘧加知母歸身貝母杏仁麥冬各一錢冬瘧加杏仁一錢桂枝八分乾薑七分寒多更加丁香五分若日久寒熱不多或無寒而但微熱者邪氣已盡夏月用清暑益氣湯余月用補中益氣湯加麥冬黃柏短母各八分滋補氣血截後調理亦同此條又方截瘧丹截諸瘧神效歷試有驗人參二兩去蘆雄黃一兩六錢另研辰砂六錢另研上三味各為末稱定於五月五日取五家粽為丸豆大大人十丸小兒五丸發日五更空心無根水煎青蒿湯送下忌生冷雞魚一月濕門傷濕腫脹黃疸諸痛喘嗽傷濕附痞脾腳氣脈沉細微緩或澀或濡皆為濕脈浮濡為風濕沉澀為寒濕滑疾身熱煩喘胸滿口燥發黃為濕熱自甚洪而動濕熱為痛症內經云地之濕氣感則害人皮肉筋脈又云諸濕腫滿皆屬於脾土按戴氏云東南地下多陰雨地濕凡受多從外入多從下起腿腫腳氣者多治當汗散久者宜疏利滲泄西北地高多食生冷濕面乳酪魚肉辛香炙爆之物或飲酒後寒氣拂鬱濕熱之邪不能發越故作腫脹甚則水氣脹滿通身浮腫如泥按之不起此則自內出也辨其多少通利二便而滲泄之賈氏云濕為土氣火熱能生濕土故夏熱而萬物濕潤秋涼則萬物乾燥濕本不自生因熱拂鬱而不能宣行故停滯而生濕也況脾脆弱之人易於感冒豈必水不流而後為濕哉人只知風寒之威嚴不知暑濕之炎暄感人於冥冥之中也治濕之法宜理脾清熱利小便為上故曰治濕不利小便非知治也治丹溪云六氣之中濕熱為病十居八九濕有自外入者謂陰雨地濕皆自外入宜微汗散經曰濕上甚而熱治以苦溫佐以甘辛以防風羌活白朮蒼朮茯苓甘草微汗為動而已不欲汗多故不用麻黃桂枝等劑濕在中下宜淡滲利小便也在下宜升提賈氏謂治濕用葶藶木香散煎下神芎丸下水濕消腫脹利小便理脾胃無出乎此亦妙法也方加味五苓散治諸濕身重小便不利白朮二錢白茯苓一錢五分豬苓一錢肉桂五分澤瀉蒼朮各二錢羌活一錢五分上作一服姜一片棗一枚煎服如濕在上肩背疼頭重項強者加防風白芷各一錢升麻五分微汗之濕在中腹脹臍突小便不利加木通姜皮各一錢五分濕在下腰膝痛足重不能移加薏芯仁二錢木瓜漢防己黃柏各一錢濕熱鬱成黃疸兩服及遍身如金色者加茵陳石膏各二錢寒濕在下腰重足痛加酒防己附子各一錢濕症汗多者加黃耆一錢桂枝當歸各七分麻黃根一錢五分風寒濕三氣合而為痹手足緩弱肌體不仁加防風防己當歸牛蒡子威靈仙各等分諸痿因肺熱所致加人參黃耆生地黃麥門冬防己黃柏各一錢五味子十五粒薏芯仁一錢五分風濕相摶一身盡痛手足痿痹加防風白芷各一錢當歸一錢五分烏藥五加皮各一錢二分木香五分臂痛加當歸一錢五分白芍藥防風川芎白芷各一錢升麻五分去豬苓澤瀉桂腳氣防己當歸木瓜各一錢五分黃柏防風白芷各一錢檳榔蘇葉各七分去豬苓澤瀉忌補劑並洗諸濕浮腫並水氣上多者加防風白芷各一錢五分麻黃一錢以汗之下多者加茯苓皮生薑皮大腹皮五加皮各一錢木通一錢五分以利之暑濕熏蒸令人燥悶自汗煩渴加香薷二錢黃連扁豆厚朴各一錢去羌活名薷苓湯麻木屬氣虛濕痰及死血加人參黃耆當歸各一錢二分白芍藥防風白芷各八分柴胡升麻各五分黃柏半夏各一錢四肢百節走痛名痛風在上加川芎白芷酒芩桔梗各八分當歸一錢威靈仙一錢桂枝七分去豬苓澤瀉在下加當歸一錢五分牛膝陳皮桃仁木通黃柏防己各一錢去羌活加川獨活七分兩手攣急加半夏當歸防風天麻白芷各一錢去豬苓澤瀉桂兩腳攣急加當歸杜仲黃柏木瓜牛膝薏苡仁各一錢五分去羌活走注疼痛加當歸川芎威靈仙各一錢木香枳殼各七分腳跟痛加當歸白芍藥薏苡仁各一錢五分知母黃柏牛膝各一錢去羌活加獨活腫脹腫即水腫脹即腫滿脈脈沉而濡或浮而數者為水腫弦而實洪而數者為脹滿兩關弦緩兩尺緊澀皆為腫脹浮大者可治沉細而濡者難治唇腫齒焦臍腫凸出掌內無紋者皆不治症內經曰諸濕腫滿口屬於脾又曰諸脹腹大皆屬於熱蓋腫脹之症起自中宮由土虛不能制水水漬妄行故通身面目手足皆浮腫名曰水腫或腹大如豉而面目四肢不浮者名曰脹滿又名鼓腫皆脾上濕熱為病腫輕而脹重也治按丹溪云宜補脾又須養肺以制木使脾無賊邪之患滋腎水以制火使肺得清化之源卻鹽味以防助病邪斷妄想以保母氣無有不安仲景云腰以上腫者宜汗之麻黃桂枝之類腰以下腫者宜利小便五苓散之類大概宜補中行濕利小便切不可下當以人參白朮茯苓為主佐以陳皮黃芩麥門冬以制肝木厚朴蒼朮以消脹氣不運加木香木通以行之氣下陷加升麻柴胡以提之血虛加補血藥痰盛加利痰藥隨症加減用無不效方索矩三和湯治腫脹白朮二錢陳皮一錢厚朴蒼朮各一錢五分甘草二分木通一錢五分紫蘇檳榔各七分海金砂一錢上作一服水一鍾半燈心二分同煎食遠服氣虛加人參白茯苓各一錢五分血虛加當歸白芍藥各一錢五分腰以上腫者加麻黃二錢杏仁一錢防風一錢以汗之腰以下腫者加茯苓一錢五分豬苓澤瀉木通各一錢以利之惱怒加香附一錢五分青皮五分木香三分小便不利加澤瀉山梔各一錢木通一錢五分大便溏加人參厚朴各一錢蒼朮白芍藥各一錢五分腹脹大而堅者加蘿蔔子莪朮各一錢有痰加半夏茯苓各一錢五分有熱加黃芩山梔麥門冬木通各一錢元氣下陷加升麻四分柴胡五分又方中滿分散丸治中滿氣脹水腫黃芩酒炒黃連薑汁炒枳實麩炒半夏薑製白朮白茯苓不去皮人參陳皮厚朴蒼朮各一兩豬苓澤瀉去毛薑黃乾薑砂仁知母各五錢上為末炊餅為丸梧桐子大每服百丸滾白湯送下黃疸脈脈多沉數渴欲飲水小便不利皆發黃也脈浮緊乃因暴熱入冷水熱伏胸中身面目悉如金色名曰黃疸脈緊數乃飢發熱大食傷胃食則腹滿名曰旻疸陽明病脈遲者食難用飽飽則發煩頭眩者小便難欲作谷疸脈沉弦或緊細因酒百脈熱當風入水懊憹心煩足熱名曰酒疸脈浮者先吐之脈沉弦者先下之寸脈微而弱微則惡寒弱則發熱當發不發骨節疼痛當煩不煩而極汗出趺陽脈緩而遲胃氣反強飽則煩滿滿則發熱客熱消穀食已則飢谷強肌瘦名曰谷疸尺脈緊為傷腎跌陽脈緊為傷脾風寒相摶食已則眩穀氣不消胃中濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸脈浮緊乃大熱交接入水腎氣虛流濕於脾額黑日晡熱小腹急足下熱大便黑時溏名曰女勞疸腹如水狀不治症內經曰中央黃色入通於脾夫黃疸為病肌必虛腫而色黃蓋濕熱鬱積於脾胃之中久而不散故其土色形於外蓋脾主肌肉肺主皮毛母能令子虛母病子亦病矣丹溪云不必分五疸同是濕熱如盒曲相似外有傷寒熱病陽內實當下而不得下當汗而不得汗當分利而不得分利故使濕熱拂鬱內甚皆能令人發黃也治病雖有五同是濕熱治宜滲濕清熱五苓散加茵陳黃連之類食積者量其虛實下之其餘但利小便小便利則黃自退在上者尤宜發汗為佳方茵陳五苓散治濕熱發黃白朮二錢茯苓一錢五分豬苓一錢澤瀉一錢桂枝八分茵陳三錢上作一服用姜三片棗一枚燈心一彈丸煎服濕甚加蒼朮二錢厚朴一錢熱甚加黃連一錢五分山梔一錢痰甚加半夏一錢五分枳實一錢或用吐法食積加山楂神麯三稜莪朮各一錢五分針砂枳實各一錢共為丸妙酒疸加葛根黃連各一錢五分鬱金石膏各一錢谷疸加厚朴枳實梔子各一錢大黃二錢五分脾胃不和黃腫小便赤澀加滑石一錢五分厚朴蒼朮陳皮各一錢腎疸目黃小便赤澀加黃柏蒼朮各一錢五分桂五分黃疸脈沉細而遲肢體逆冷腰以上冷汗本方去豬苓澤瀉加乾薑附子各一錢五分甘草五分發黃而喘加桑白皮黃芩各一錢五分葶藶子炒一錢瘀血發黃加當歸桃仁各一錢五分犀角一錢去豬苓澤瀉諸黃小便自利不渴加黃耆桂枝白芍藥甘草減半余各等分去豬苓澤瀉諸黃小便不利而渴加麥門冬山梔木通各一錢五分滑石一錢婦人小兒諸疸同大人加減用諸痛頭心脾腹脅腰背是也脈諸痛脈弦緊痛甚則沉伏兼浮者風兼沉者氣兼數則熱兼遲則寒兩寸弦滑頭痛兩寸浮緊傷寒頭痛浮緩傷風頭痛脈訣云頭痛短澀應須死浮滑風痰病易除仲景云頭痛脈浮緊屬太陽弦細屬少陽浮大而長屬陽明沉屬太陰沉細屬少陰沉緩屬厥陰東垣頭痛論宜考陽微陰弦短而數者心痛左寸弦緊胃脘當心而痛右寸滑而實胃脘痰積而痛兩關弦大而芤者死血沉細而遲者可治浮大弦長者難治兩關脈弦為脾疼痛必當心連於兩脅腹痛脈多細小緊急陰弦則腹痛尺脈弦急小腹痛尺脈緊臍下痛兩尺短澀屬血虛兩尺沉微屬氣虛弦為食滑為痰細為濕數為熱遲為寒細小而遲者生浮大而疾者死兩手脈雙弦者肝氣有餘兩脅作痛沉澀屬郁細緊或弦者怒氣腰痛之脈多沉而弦兼浮者風緊者寒濡細為濕實則挫閃左尺脈大為腎虛澀為瘀血滑疾為痰脈促上擎者肩背痛寸關洪而大沉而滑者皆主肩背痛症頭痛之候東垣論之詳矣按東垣云東風生於春病在肝腧在頸項故春氣者病在頭又諸陽會於頭面夫風泛上受之風寒傷於上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生氣虛頭痛也心煩頭痛者病在耳過在手巨陽少陰乃濕熱頭痛也如氣上不下頭疾顛疾下虛上實也過在足少陽巨陽甚則入腎此寒濕頭痛也如頭半寒痛者先取手少陽陽明此偏頭痛也其真頭痛者甚則腦甚痛手足寒至節死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主胸逆故令頭痛齒亦痛凡頭痛皆以風藥治之者以風藥能上行也又有傷風頭痛或半邊偏疼皆因風冷所傷遇風冷即發其脈浮食積痛者因胃中有陰冷宿食不化上攻而疼其脈右寸緊盛氣虛者因下部氣虛上攻溫溫而痛異乎邪毒所致其脈浮症各不同宜詳辨而治之丹溪云心痛即胃脘痛有熱厥寒厥大實死血食積痰蟲之類機要云熱厥心痛身熱足寒甚則煩躁而吐額自汗出脈洪可汗刺太溪崑崙寒厥心痛手足逆通身冷汗便溺清利不渴氣脈微弱可溫朮附湯厥逆心疼者寒邪傷心包絡也良薑菖蒲辛熱之劑主之大實心痛卒然發痛大便或祕久而注悶心腹高起按之則痛不能飲食可下煮雄丸利之屬痛者痛則懊憹發作腫聚往來上下行痛有休作痛定即能食時作時止涎出嘔清水面色乍青乍白乍赤是痰者隱然痛而小便不利得辛熱湯則暫止也戴氏又云死血痛者痛有常處不動移者是食積痛者痛甚欲大便便後痛減者是宜詳審之脾疼者起於心口連於兩脅嘔吐不食乃肝木火甚乘於脾土也亦有挾痰與火者大抵因七情所觸者多腹痛丹溪云有沉寒積熱死血氣滯食積蟲痰之異亦有風寒暑濕冷熱瀉痢腳氣五臟血氣攻刺積聚疝瘕淋祕飲食客忤等痛必審虛實而施治也戴氏又云綿綿痛而無增減者寒也時作時止者熱也脈微自汗得食而略定者虛也宜補脈弦實大痛不休者實也宜下或上或下或往或來痛無定處喜溫而惡寒者氣也宜散其餘死血食積痰蟲皆與心痛相類故不細録宜詳辨之脅痛左屬肝有餘右屬肺不足有餘則乘脾土土虛則不能生金金不足則木無所制而反欺土故治必以制肝為主丹溪云有肝木氣實火盛有死血有痰有郁注云木氣實火盛者或因怒氣傷肝肝氣大逆或風中於肝皆使木氣實生火火盛則肝急而脅痛死血者因瘀血惡血血停留於肝歸於脅下而痛多在左其候則自汗而痛按之益甚痰者因痰積流注於厥陰之經亦使脅下痛肺病則咳而急引脅下痛郁者因謀不決或因怒氣逆於經絡而不散亦令胸脅作痛須詳別之腰痛戴氏云久痛不已者腎虛也日輕夜重者瘀血也遇天陰雨而痛或久坐而痛者濕也四肢緩足寒逆腰冷如冰冷汗精滑扇痛是濕熱也大抵因於房室過傷而腎虛者為多蓋腎虛則火旺火旺則陰愈消不能營養故作痛也久而不治則成骨痿蓋腰者腎之府乃一身之大關節故經曰轉搖不能腎將憊矣又或六氣乘虛而外入七情感觸而內傷如恣志傷腎鬱怒傷肝或負重損傷或行走脞閃瘀血蓄而不行皆使氣停血滯著而成病矣肩背痛因風熱乘肺太陰經肺氣鬱甚不行病則頰頷腫頸項肩臑肘臂外後膁痛汗出小便數而缺者皆風濕乘肺也小便遺失者皆肺金虛也痛不可回顧者此太陽經氣鬱而不行以風藥散之脊背項強腰似折項似拔此是太陽經不通如身重沉沉然此寒濕也宜疏風勝濕瀉火和血順氣若傷濕流於關節遍身盡痛者治如上法治按東垣治法云頭痛之候惟多以風藥治效者何蓋高巔之上惟風可到故味之薄者乃陰中之陽自地升天者也然亦有三陰三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃為主少陽經頭痛脈弦細往來寒熱小柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰頭痛三陰三陽經不流行而足寒氣逆而寒厥其脈沉細麻黃附子細辛為主厥陽頭項痛或吐痰沫厥冷其脈浮緩吳茱湯主之血虛頭痛川芎當歸為主氣虛頭痛人參黃耆為主氣血俱虛調中益氣少加川芎蔓荊子細辛之類又白朮半夏天麻湯治痰厥頭痛藥也清空膏乃風熱頭藥也羌活附子湯厥陰藥也如濕氣在上者以苦藥吐之全在活法不可執方而治心痛丹溪云須分新久若明知身犯寒氣口食冷物於初得之時便宜溫散如草豆蔻丸之類稍久則成鬱熱原病式中論之詳矣若欲行溫散寧無助火為病乎故古方多以山梔為主加熱藥為嚮導則邪易伏病易退正氣復而愈矣以二陳加川芎蒼朮乾薑焙梔子煎服豫曾試驗極妙大實心痛者金花丸主之或煮雄丸下之死血痛者桃仁承氣湯下食積痛者備急丸主之痰者吐之梨蘆末一錢入暇汁半碗探吐得痰盡為妙屬痛者理中湯加烏梅主之或苦楝根錫灰檳榔鶴風草之類為丸治之脾疼者制肝扶脾為主越鞠二陳湯加海石丸服效腹痛屬寒者宜溫吳茱萸乾薑之類甚者四逆湯屬熱者清痰降火二陳芩連山梔白芍藥順氣木香檳榔枳殼香附或越鞠丸加木香檳榔亦可死血者行血川芎當歸桃仁紅花木香玄胡索甚者桃仁承氣湯下之食積痛宜消導之白朮白芍藥木香砂仁青皮煎湯吞下保和丸甚者木香檳榔丸下之痰者二陳加枳實山梔屬痛者苦楝根檳榔鶴風之類或理中湯加烏梅亦佳其餘風寒暑濕瀉痢時氣五臟攻刺疝瘕淋祕等腹痛自有本條大抵腹痛宜分三陰部而治中脘太陰臍腹少陰小腹厥陰初起必推蕩之虛與久病宜升宜消脅痛肝木氣實火盛白芍藥當歸山梔川芎龍膽草柴胡青皮或瀉青丸死血宜行血為主潤血為佐桃仁紅花牡丹皮川芎當歸香附青皮玄明粉大黃潤而下之痰者二陳加南星白芥子枳實香附川芎郁用越鞠丸加青皮咳而痛二陳加青黛栝蔞薑汁右脅痛二陳加枳殼片芩貝母兩脅痛發寒熱者小柴胡湯加青皮諸脅痛必以柴胡枳殼青皮為主腰痛腎虛者最多大補陰丸加杜仲牛膝枸杞子五味子豬脊髓丸服或用青娥煨腎丸房勞精不足者斑龍丸痰者行痰香附半夏貝母濕者燥濕杜仲蒼朮桑寄生川獨活黃柏之類瘀血者順而消之當歸杜仲木香桃仁鬱怒憂思而痛者當歸貝母香附側柏葉杜仲黃柏大抵諸腰痛不宜補氣藥及寒涼藥亦有外感因虛而襲如太陽少陰多中寒陽明太陰多燥濕少陽厥陰多風熱臨症尤宜詳審腰胯痛多是濕痰流注經絡故氣不和而痛宜蒼朮黃柏木瓜主之腎著者體重腰冷如冰飲食如故小便自利此下傷寒濕所致宜滲濕兼溫散理中去人參加蒼朮茯苓主之肩背痛或一身盡痛皆風寒濕熱乘肺也宜通經絡益元氣散風瀉火宜羌活勝濕湯加附子防己主之或黏痛湯亦好方加味芎歸湯治諸頭痛依後加減川芎一錢當歸一錢五分柴胡一錢半夏一錢五分甘草三分防風八分羌活八分黃芩黃連各一錢酒浸炒上作一服姜三片煎食後服太陽經頭痛加麻黃一錢五分蔥白五根倍羌活去黃連少陽經頭痛倍柴胡去羌活黃連陽明經頭痛加升麻五分石膏一錢五分白芷八分太陰頭痛加蒼朮白朮各一錢分南星一錢天麻八分少陰頭痛加細辛七分蔓荊子一錢去黃連厥陰頭痛加乾薑七分吳茱萸八分去羌活芩連血虛頭痛加天麻白芍藥生地黃各一錢去羌活柴胡黃連氣虛頭痛加人參黃耆各一錢去羌活柴胡芩連氣血俱虛加參耆白朮天麻各一錢五分熟附五分蔓荊子八分細辛五分去羌活柴胡黃連火盛頭痛依本方加石膏二錢酒蒸大黃三錢痰厥頭痛加南星石膏各一錢五分倍半夏甚者吐法效諸頭痛加入川芎藁本蔓荊子白芷細辛並用此五味足矣又方越鞠二陳湯治心痛胃脘痛脾疼腹痛脅痛並宜加減用之川芎一錢蒼朮一錢二分香附醋浸炒山梔炒半黑各一錢五分半夏一錢二分陳皮一錢甘草三分乾薑炒黑一錢上作一服水一鍾半姜三片煎不拘時服屬寒而痛者加丁香草豆蔻各一錢甚者再加熟附子一錢屬熱而痛者加吳萸炒黃連一錢酒炒黃芩一錢甚者宜加大黃三錢白芍藥一錢五分桂枝五分屬痰者加枳實一錢五分倍半夏或用吐法尤妙鬱怒痛加桂枝青皮各七分白芍藥一錢五分食積痛加枳實山楂各一錢五分蘿蔔子砂仁各八分神麯一錢氣不順而痛加木香七分檳榔烏藥各一錢死血痛加枳殼當歸尾桃仁各一錢五分大黃三錢厚朴一錢去川芎半夏陳皮乾薑婦人産後痛加桃仁牡丹皮當歸各一錢五分紅花玄胡索各八分木香五分屬痛加檳榔雷丸各一錢或用苦楝丸或理中湯加烏梅脾痛加海石一錢五分青皮一錢桂五分或丸或散皆可腹痛亦宜分三陰部分加減中脘屬太陰加厚朴半夏臍腹少陰加桂木香玄胡索小腹厥陰加吳茱萸官桂白芍藥各隨症輕重度而用之虛者理中湯實者桂枝大黃湯寒熱相併大痛脈沉細實者附子理中湯合大承氣湯溫而下之其餘寒熱氣血鬱怒食積痰蠹治法皆與心痛同脅痛左屬肝木盛加白芍藥龍膽草柴胡各一錢二分青皮七分右脅痛屬肺火與痰加貝母枳殼白芥子各一錢咳而脅痛加貝母白茯苓各一錢白芥子青黛各八分薑汁半盞瘀血攻注脅痛桃仁承氣湯加桂枝芍藥青皮潤而下之氣鬱脅痛加木香七分枳殼青皮各一錢脅前發寒熱者本方去乾薑加柴胡黃芩各一錢五分青皮八分又方當歸羌活湯諸腰痛胯痛腳氣及肩背身體痛並宜加減用之當歸羌活獨活柴胡防風杜仲桑寄生各等分桂減半上作一服薑棗煎食遠服如臥寒濕地腰痛恐是太陽少陰血絡中有凝血加當歸尾蒼朮桃仁牛膝防己各等分濕熱腰痛加黃柏木瓜蒼朮川芎各等分脞閃瘀血腰痛凝滯在內加桃仁紅花蘇木各一錢五分木香五分麝香一分臨服下酒煎服腎虛腰痛宜補陰丸加胡桃肉杜仲破故紙人參天門冬各一兩五錢砂仁五味各七錢蜜丸服腰胯痛乃濕熱流注下焦加黃柏蒼朮黑醜各一錢腎著屬濕傷下焦加白朮茯苓甘草乾薑去防風羌活柴胡腰軟乃腎肝伏熱加黃柏防己各一錢五分肩背痛皆因風熱乘肺加藁本蔓荊子黃芩山梔各一錢肩背因寒濕而痛加乾薑熟附子各八分甘草五分鬱火作痛加貝母黃芩山梔香附青皮各等分去獨活桑寄生風寒濕三氣所傷體重腰冷一身盡痛如被杖加蒼朮白朮茯苓各一錢二分乾薑甘草各五分氣血不和身體痛加朮香七分紫荊皮五加皮各一錢濕流關節一身盡痛加五苓散一半濕痰流注經絡一身骨節痛加南星半夏各一錢五分薑汁半盞竹瀝一盞香附一錢五分楊梅瘡毒疼痛自有本條傷寒後身體痛有陽症陰症受濕治各不同詳傷寒門喘嗽脈脈多沉滑或浮緊而數右寸沉實者宜瀉肺左尺浮大而虛者宜滋腎右寸沉而緊者肺中有寒邪脈滑手足溫者生四肢寒者死脈數身熱者不治咳嗽脈訣云浮為風緊為寒數為熱細為濕此外因之邪目外而感者浮緊虛寒沉數實熱洪滑多痰弦澀少血此內因之邪自內而得者短澀者房勞右關濡者傷脾左關弦短傷肝浮短而澀傷肺右寸微急為咳吐膿血浮直而濡者易治喘逆上氣脈數有熱不得臥者難治咳而弦急欲絶者死症機要云喘者促促氣急喝喝息數張口抬肩搖身擷肚短氣者呼吸雖數而不能接續似喘而不搖肩似呻吟而無痛苦呼吸雖急而無痰聲逆氣者但氣上而奔急肺壅而不下宜詳辨之丹溪云喘急者因氣虛火入於肺為火所鬱而然亦有火炎上者有痰者有陰虛自小腹下起而上逆者有氣虛而致短氣者有水氣乘肺者皆令人喘急治各不同咳嗽經云秋傷於濕冬生咳嗽機要云咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也咳嗽謂有聲有痰因傷肺氣動於脾濕因咳而嗽也若傷風咳者憎寒壯熱有汗惡風口乾煩渴而燥傷寒咳嗽者㿉寒發熱惡寒煩躁不渴火咳者因火盛上炎燥肺金遂成鬱滿甚則咳嗽無痰或吐血痰勞者由好色腎虛則子能令母虛氣血俱虛陰虛則生火肺金耗散而津液氣血皆化為痰矣痰者方礙清氣升降滯氣不行遂成咳嗽肺脹者肺氣因火傷極遂成郁遏脹滿或左右不得眠者有傷暑亦令人嗽其症煩熱引飲口燥或吐沫聲嘶咯血傷濕咳者骨節煩疼四肢重著灑淅寒熱大抵風寒為病主乎肺蓋肺主皮毛而司於外傷之則腠理不疏風寒內鬱於肺清蕭之氣不利而生痰動嗽又寒入胃從脾脈上至於肺則肺寒肺寒則內外合邪壅而為咳學者必求其本而治之無不效也治丹溪云喘嗽須分虛實急喘者氣實肺盛呼吸不利肺竅壅滯右寸脈沉實者宜瀉肺桑白皮葶藶杏仁瀉之或用三拗湯蓋麻黃定喘最妙甚者加黃芩石膏虛喘者腎虛先覺呼吸氣短兩脅脹滿左尺脈大而無力宜補腎用阿膠人參五味子補之痰者清痰火者降火二陳加芩連栝蔞枳實主之水氣喘者不得臥臥則喘愈甚蓋火氣上乘於肺肺得水而浮氣壅滯而不得流通宜神祕湯又云治嗽最要分肺虛實新久而治久嗽肺虛宜款冬花紫菀五味馬兜鈴之數補之若肺實有火邪者黃芩麥門冬杏仁桑白皮瀉之新病風寒則發散之麻黃蔥白杏仁前胡金沸草之類火熱則清之芩連麥門冬之類濕熱則瀉之半夏貝母蒼朮石膏黃芩山梔之類久病便屬虛與郁氣虛則補氣血虛則補血兼痰則行痰兼鬱則開鬱滋之潤之咳之降之此治嗽之大法也方清肺飲子治喘治嗽通用依症加減黃芩一錢二分麥門冬一錢二分貝母一錢五分陳皮去白一錢白茯苓一錢甘草三分桔梗八分枳殼七分杏仁去皮尖一錢半夏薑製一錢二分上作一服姜三片煎食後服肺實而喘加麻黃桑白皮各一錢五分石膏二錢甚者再加葶藶肺虛喘加人參阿膠天門冬各一錢五味子五分去枳殼半夏食積喘加山楂神麯麥芽各一錢去麥冬杏仁痰盛而喘加栝蔞仁枳殼蘇子各一錢薑汁竹瀝各一盞火盛而喘加石膏一錢五分黃連梔子各一錢甚者酒蒸大黃水氣喘者加桑白皮蘇子葶藶子蘿蔔子各一錢肺脹嗽喘加訶子一錢五分五味七分海蛤香附青黛天花粉各一錢凡嗽春是春升之氣宜潤肺抑肝加知母一錢五味七分川芎白芍藥各八分夏是火炎上最重本方去半夏加桑皮知母各一錢石膏一錢五分五味七分秋是濕熱傷肺宜清熱瀉濕本方去半夏加桑白皮天門冬各一錢五味子七分蒼朮防風山梔各八分冬是風寒外感宜解利加麻黃桂枝防風各一錢乾薑八分如發熱頭疼鼻塞聲重再加藁本川芎前胡柴胡蘇葉各一錢清晨嗽者此胃中有食積至此時火氣流入肺中加梔子知母地骨皮當歸各一錢天門冬一錢二分五味子五分上半日嗽多者胃中有火加石膏知母各一錢五分午後嗽多者屬陰虛加當歸白芍藥熟地黃黃柏知母各一錢黃昏嗽多者本是火氣浮於肺不宜涼劑本方去黃芩半夏加天門冬百藥煎訶子各一錢五味七分斂而降之嗽而無聲有痰加白朮一錢五味七分防風八分嗽而有聲無痰加防風八分升麻五味生薑各等分嗽而有聲有痰加白朮阿膠各一錢防風八分五味五分嗽而寒熱交作者加柴胡知母地骨皮挾虛再加人參當歸白芍藥各一錢去枳殼杏仁氣虛嗽本方去半夏杏仁枳殼加門君子湯三錢款冬花天門冬阿膠各一錢五味五分血虛嗽本方去半夏枳殼加四物湯四錢紫菀阿膠知母各一錢氣血俱虛嗽本方去半夏枳殼加八物湯五錢款冬花紫菀阿膠天門冬各一錢五味七分冷嗽右寸脈弦遲本方去黃芩麥門冬杏仁加乾薑細辛白芍藥五味各七分風寒鬱於肺夜嗽者加麻黃桑白皮知母生薑各一錢喘嗽遇冬則發此寒包熱也解表熱自除加麻黃一錢五分防風紫蘇葉木通各一錢嗽而聲啞加天門冬五味烏梅二個當歸阿膠各二錢屬寒加北細辛五分生薑五片乾咳嗽乃火鬱之甚不得志者多有之用苦梗開之上用本方加山梔香附青皮各等分下用補陰降火不已則成勞勞嗽宜補陰清金屬血虛者本方去半夏枳殼加川芎生地各一錢當歸白芍藥各一錢知母天門冬紫菀阿膠各一錢二分五味七分玄參八分勞嗽屬氣虛者本方去桔梗枳殼半夏加人參白朮百合款冬花阿膠薏苡仁各一錢黃柏五分陰虛喘嗽或吐紅者加當歸白芍藥生地黃知母天門冬紫菀牡丹皮地骨皮阿膠各一錢去半夏枳殼酒嗽加葛根粉栝蔞仁黃連各八分酒嗽者因酒多傷肺也夏月熱嗽咽痛加黃連荊芥各八分肺痿宜補血養肺滋陰其症右寸脈數咳而口中有濁唾涎沫者是本方去半夏枳殼加紫菀知母阿膠各一錢五味人參當歸天門冬各八分薏苡仁一錢五分先因咳而有痰者咳為重主在肺麥門冬黃芩倍用因痰而致咳者痰為重主在脾二陳倍用燥門燥症痿症消渴膈噎燥症大便閉結附脈脈緊細而微或澀而數為火燥短澀為血虛而燥浮數而弦為風燥尺寸緊數為火盛水枯燥極之候也症按內經云諸澀枯涸幹徑皴揭皆屬於燥易曰燥萬物者莫熯乎火蓋干為天而為燥金坤為地而為濕土天地相反燥濕異用故燥金主於緊斂而濕土主於縱緩也譬猶長夏地濕則縱緩滑澤秋干則緊縮燥澀皴揭之理顯可見焉治內經云腎惡燥急食辛以潤之古方以血藥治燥者甘辛以潤之也熱者清之黃芩山梔麥門冬槐實之類燥者當歸生地黃桃仁麻仁之類風者平之天麻防風荊芥之類凡治燥藥必以清金為主養血疏風佐之方清金潤燥湯治諸燥麥門冬一錢五分黃芩一錢當歸一錢五分生地黃一錢黃柏一錢五味五分人參八分黃耆八分蜜灸防風五分枸杞子一錢上作一服水煎食遠服皮膚燥癢加白芷牛蒡子各二錢去參耆五味枸杞辰舌生瘡燥裂加黃連八分白芍藥一錢去參耆五味大便閉結亦由肺經燥熱移於大腸所致亦有血虛祕結亦有熱生風而結血祕者加桃仁麻仁大黃倍當歸甚者桃仁承氣湯下之風熱祕者加皂仁麻仁槐實大黃倍防風並減參耆枸杞五味下並用蜜導法皮肉燥濕毛髮焦枯加天麻荊芥穗地骨皮槐實各一錢痿症脈脈浮洪緩滑右寸浮大而澀浮緩為虛洪大為熱滑則多痰澀而少血症丹溪云內經言諸痿生於肺熱又謂治痿獨取陽明胃蓋肺金體燥居上而主氣畏火者也脾土性濕居中而主四肢畏木者也火性炎上若嗜欲無節則水失所養火寡於畏而侮所勝金肺得火邪而熱矣火性剛急肺受熱則金失所養木寡於畏而侮所勝土脾得木邪而傷矣肺熱則不能管攝一身脾傷則四肢不能為用而諸痿作矣經雖有筋脈骨肉之分一皆主於肺熱臨症宜詳審之治東垣取橫柏蒼朮為君黃耆當歸為佐以治諸痿無一定之方有溫多者有熱多者有溫熱相伴有挾風者臨病制方其善於治痿者歟又云瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何肺熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此雖然天産作陽厚味發熱凡病痿者若不淡薄食味必不能保其全安也方加減清燥湯治諸痿通用人參七分黃耆一錢五分歸身一錢五分麥門冬一錢黃柏一錢蒼朮一錢黃芩八分五味九粒生地黃七分升麻二分柴胡三分甘草三分白朮陳皮白茯苓各八分澤瀉五分上作一服姜一片棗一枚煎食遠服兼風者加姜活獨活桑寄生兼濕者加木瓜防己薏苡仁消渴脈兩寸脈滑者為上消兩關洪數者為中消兩尺浮大為下消濡散為氣實血虛洪大為陽盛陰虛脈沉小有力者可治實大浮澀者皆難治症內經云二陽結謂之消東垣云二陽者手足陽明也手陽明大腸主津病則目黃口乾是津不足也足陽明胃主血熱則消穀善飢胃中伏火火爍而血乾涸也津血不足而消渴生矣雖有三者之分因於火則一也上消者心移熱於肺多飲而渴少食而嘔中消者脾移熱於胃也善食而瘦大便燥而小便黃下消者腎移熱於膀胱也小便淋濁如脂膏之狀大抵渴症皆因膏粱甘肥之變或過服金石熱藥致陽盛陰虛津液不足結而不潤皆責於火也治宜養肺降火生血為主或曰上消渴是心火刑煉肺金所致治宜降火清金以黃連麥門冬蘭草白豆蔻仁梨藕汁加升麻黃柏之類清氣上升而渴自止矣中消渴者胃中伏火不生津液食已則飢不營肌肉宜芩連石膏治之甚者調胃承氣湯下消渴者煩躁引飲耳輪焦小便如膏正所謂焦煩水易虧是也此為腎消宜六味地黃丸主之聖濟總録云未傳能食者必發癰疽背瘡不能食者必得中滿豉脹背為不治之症潔古分而治之能食而渴者白虎加人參湯不能食而渴者錢氏白朮散倍加乾葛治之上下既平則不復傳下矣方五汁飲總治三消川黃連一錢五分麥門冬一錢五分天花粉一錢生甘草三分人參八分石膏一錢五分知母一錢五分歸身一錢白芍藥八分黃柏七分梨汁以下臨服加入藕汁生地黃汁人乳汁各一盞薑汁二匙竹瀝半盞上作一服加蘭草葉一錢同煎食遠服臨服時將五汁加入連藥服之外無加減噎膈脈沉緩無力為氣虛數而無力帶澀為血虛洪數有力為火寸關脈沉而滑為痰兩關弦滑為吐逆緩滑者可治澀弱者難治症內經曰三陽結謂之格注云三陽者大腸小腸膀胱也結者熱結也小腸熱結則血脈燥大腸熱結則後不通膀胱熱結則津液涸三陽既結則前後閉必反而上此所以噎食不下縱下而復出也三因雖有五噎五膈之分其實病本則一雖按法施治若不斷厚味戒惱怒慎起居縱服良劑莫能為也故張機峰云膈當神思間病惟內觀自養可以治之此言深中病情可不信哉治宜生津養血順氣清痰降火開結使陰陽和平氣順痰下則病無由而作矣用童便薑汁竹瀝蘆根汁韭汁人乳或牛羊乳氣虛入四君子血虛入四物有痰入二陳有熱入解毒切忌香燥之藥古方用人參以補肺御米以解毒竹瀝以清痰當歸以養血粟米以實胃蜜以潤燥姜以去穢不比局方悉用辛香燥烈之藥一概混治遇挾寒者間或偶效但今人悉因痰火七情所致其無寒也明矣若妄投前藥咎將誰歸方清痰養血湯治噎膈吞酸吐酸水半夏曲一錢五分白茯苓一錢當歸二錢陳皮一錢甘草三分白扁豆一錢人參一錢白朮五分御米炒八分蘿蔔子炒七分黃連吳萸同炒去吳萸一錢上作一服水一鍾半煎八分食遠服臨服加薑汁五匙竹瀝一盞蘆根汁二盞同藥攪勻服痰盛加貝母一錢枳實五分火盛加山梔仁薑汁炒黃芩酒炒各八分順氣加木香五分檳榔八分開鬱加香附童便浸炒一錢五分神麯七分養血加麥門冬一錢桃仁二十粒生地黃八分牛羊乳各一盞生津加同上再加烏梅一個潤燥加麻仁杏仁各一錢郁李仁一錢人牛羊乳各不拘多少抑肝加白芍藥橘葉各一錢青皮五分補脾加蓮子五枚倍用參朮止嘔加藿香砂仁各七分消膨加枳實砂仁各七分止瀉加白芍藥肉果各一錢去當歸吞酸吐酸加藿香八分砂仁五分倍用茱萸炒黃連心腹痛加木香五分檳榔七分青皮五分白芍藥一錢桂三分白豆蔻仁五分去參朮當歸減半大便閉結脈兩關脈實數右寸澀數兩尺弦澀蓋數者火盛也澀者血枯也由火盛而血衰服藥而脈變緩滑者易治反結促者難治集成云脾脈沉數下連於尺為熱結兩尺脈虛或沉細而遲者為陰結右尺浮為風結也症內經云腎主大便大便難取足少陰東垣曰腎主五液津液潤則大便如常若飢飽勞逸損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真陰津液虧少故大便結燥竊詳燥之為病不一有熱燥有風燥有陽結有陰結吐瀉後腸胃虛服熱藥多者為熱結宜承氣湯下之肺受風邪入腸中為風結宜麻仁丸年老氣弱津液不足或産後內亡津液而結為氣血虛也六味地黃丸主之大便閉小便數則為脾約脾約者脾血耗散肺金受火無所攝脾津液故竭宜養血潤燥若能食小便赤為實閉麻仁七宣等藥主之不能飲食小便清為虛閉為氣閉也厚朴湯主之小腸移熱於大腸為宓瘕是便澀閉也醫者不究其源一概用巴豆牽牛等藥下之損其津液燥結愈甚復下復結極則以致引導於下而不能通者遂成不救之症可不謹哉治內經云腎惡燥急食辛以潤之結者散之治法云如少陰不得大便以辛潤之太陰不得大便以苦瀉之陽結者散之陰結者溫之有物結者下之久病腹中有實熱大腸閉者以潤腸丸治之慎勿峻利脾約者謂胃脾弱約束津液不得四布但輪膀胱故小便數而大便難名曰脾約與脾約丸以下脾之結燥使腸潤結化津液入胃而愈然既曰脾約必陰枯槁內火燔約熱傷元氣故肺金受火爍而津竭必竊母氣以自救金耗則土受木傷脾失轉輸肺失傳送宜大便難小便數而無藏蓄也理宜滋養陰血使陽火不熾肺金行清化而脾土清健津液入胃腸潤而通矣今此丸用之於熱甚而氣實與西北人稟壯實者服無不安若用之於東南方人與熱雖盛而氣血不實者雖得暫安將見脾愈弱而腸愈燥矣惟知西北以開結為主東南以潤燥為主斯無誤矣方滋血潤腸湯治大便祕結或血虛祕氣滯祕風祕熱祕並治之當歸身尾一錢五分桃仁一錢五分麻仁去殼一錢五分大黃一錢五分羌活防風各一錢生地黃枳殼檳榔各八分甘草生五分皂仁七分紅花二分木香一分上作一服姜一片棗一枚煎食前服又方脾約丸治大便難而小便數名脾約以此丸治之枳實去穰麩炒厚朴薑汁製芍藥各二兩酒炒大黃酒蒸四兩麻仁去殼淨一兩三杏仁去皮尖一兩二錢上為末煉蜜丸梧子大每服三五十丸白湯下量虛實用之
